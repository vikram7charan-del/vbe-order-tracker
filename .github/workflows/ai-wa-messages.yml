# ══════════════════════════════════════════════════════════
# VBE Call Tracker — AI WhatsApp messages
# ⏸️ auto (हर 30 मिनट) बंद कर दिया गया — अब सिर्फ़ हाथ से (manual) चलेगा।
# API खर्च बचाने के लिए। फिर से auto चाहिए हो तो नीचे schedule वाली
# लाइनें uncomment कर देना।
#
# SETUP (एक बार): repo secrets में FIREBASE_SA और ANTHROPIC_KEY होने चाहिए
# ══════════════════════════════════════════════════════════
name: 🤖 AI WhatsApp Messages

on:
  # schedule:
  #   - cron: '*/30 * * * *' # (बंद) — auto हर 30 मिनट
  workflow_dispatch: # सिर्फ़ हाथ से (Actions tab → Run workflow)

concurrency:
  group: ai-wa-messages
  cancel-in-progress: false

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install firebase-admin
        run: npm install firebase-admin --no-save --no-audit --no-fund
      - name: Generate AI WhatsApp messages
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: node scripts/ai-wa-messages.js
