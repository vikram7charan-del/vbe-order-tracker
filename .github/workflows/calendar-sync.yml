# ══════════════════════════════════════════════════════════
# VBE Call Tracker — Google Calendar auto-sync (हर 15 मिनट)
# हर contact की अगली call को Google Calendar event बना देता है।
# App में follow-up बंद करते ही अगली sync में event delete भी हो जाता है।
# sync की हालत doc में calSynced/calSyncedAt से app को दिखती है।
#
# ⚠️ SETUP (एक बार):
#  1) repo secret FIREBASE_SA होना चाहिए
#  2) अपना Google Calendar service account email के साथ share करना है
#     ("Make changes to events" permission)
# ══════════════════════════════════════════════════════════
name: 📅 Calendar Sync

on:
  schedule:
    - cron: '*/15 * * * *' # हर 15 मिनट (GitHub कभी-कभी थोड़ा delay करता है)
  workflow_dispatch: # हाथ से भी

concurrency:
  group: calendar-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        # firebase-admin@13 pinned — v14 ने पुराना admin.credential API हटा दिया है
        run: npm install firebase-admin@13 googleapis --no-save --no-audit --no-fund
      - name: Sync calls to Google Calendar
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
        run: node scripts/calendar-sync.js
