# ══════════════════════════════════════════════════════════
# 📩 VBE Telegram Bot — two-way (हर 5 min, ~3.5 min long-poll)
# जवाब लगभग तुरंत। Token/chat app के _settings से आते हैं —
# कोई नया secret नहीं चाहिए (सिर्फ़ FIREBASE_SA, पहले से है)।
#
# ⚠️ यह background bot सिर्फ़ DEFAULT (main) branch से चलता है —
#    GitHub का नियम। इसलिए इसे main में merge करना ज़रूरी है।
# ══════════════════════════════════════════════════════════
name: 📩 Telegram Bot

# 🔁 हमेशा-जागता bot (free): एक run ~5.8 घंटे लगातार long-poll करता है
# (message आते ही तुरंत जवाब)। schedule हर घंटे एक ताज़ा run queue में रखता है
# जो पुराने के खत्म होते ही संभाल ले — 24/7 coverage, public repo = मुफ़्त।
# (Cloud Function webhook के लिए Blaze/billing चाहिए — इसलिए यह रास्ता।)
on:
  schedule:
    - cron: '*/5 * * * *'   # GitHub इसे ~हर घंटे चलाता है — restarter काफ़ी है
  workflow_dispatch:
    inputs:
      ref:
        description: 'किस branch से चलाएँ'
        required: false
        default: 'main'

concurrency:
  group: telegram-bot
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # ~5.8 घंटे (GitHub job की अधिकतम सीमा 6 घंटे)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install firebase-admin
        run: npm install firebase-admin --no-save --no-audit --no-fund
      - name: Run Telegram bot (long-poll ~5.8h)
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
          TG_LOOP_MS: '20400000'   # 340 min लगातार poll, फिर अगला run संभालता है
        run: node scripts/telegram-bot.js
