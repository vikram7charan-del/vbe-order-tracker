<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore,collection,doc,getDocs,setDoc,deleteDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth,signInAnonymously,onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const cfg={apiKey:"AIzaSyBCe5DKNKcthOl4umprfRm2QBfbVaFORg8",authDomain:"vbe-order-tracker-60324.firebaseapp.com",projectId:"vbe-order-tracker-60324",storageBucket:"vbe-order-tracker-60324.firebasestorage.app",messagingSenderId:"894023456122",appId:"1:894023456122:web:6ee548f0913c887c67f2c3"};
const app=initializeApp(cfg);const db=getFirestore(app);const auth=getAuth(app);
window._db=db;window._col=collection;window._doc=doc;window._getDocs=getDocs;window._setDoc=setDoc;window._deleteDoc=deleteDoc;
signInAnonymously(auth).catch(e=>console.warn(e));
onAuthStateChanged(auth,user=>{if(user){document.getElementById('auth-dot').style.background='#10b981';loadChallans();}});
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans Devanagari','Segoe UI',sans-serif;background:#050a14;color:#e2e8f0;min-height:100vh;max-width:480px;margin:0 auto}
.hdr{background:linear-gradient(135deg,#0f1e47,#1a0a3a);padding:13px 14px;position:sticky;top:0;z-index:50;border-bottom:1px solid #1e3a5f}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-title{font-size:16px;font-weight:800;background:linear-gradient(90deg,#10b981,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:10px;color:#475569;display:flex;align-items:center;gap:5px;margin-top:2px}
.back-btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit}
.srch{width:100%;padding:8px 12px;border-radius:9px;border:1px solid #1e3a5f;background:#0d1526;color:#e2e8f0;font-size:13px;font-family:inherit;outline:none}
.srch::placeholder{color:#334155}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:10px 14px 6px}
.stat{background:#0d1526;border-radius:9px;padding:8px 4px;text-align:center;border:1px solid #1e3a5f}
.sv{font-size:15px;font-weight:800}.sl{font-size:8px;color:#475569;margin-top:2px}
.body{padding:8px 14px 80px}

/* Challan Card */
.cc{background:#0d1526;border-radius:12px;margin-bottom:8px;border:1px solid #1e3a5f;overflow:hidden}
.cc.paid{border-color:#15803d}
.cc.pending-pay{border-color:#7f1d1d}
.cc-hdr{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px}
.cc-num{font-size:18px;font-weight:800;color:#10b981;font-family:monospace;white-space:nowrap;min-width:120px}
.cc-info{flex:1;min-width:0}
.cc-unit{font-size:12px;font-weight:800;color:#c7d2fe}
.cc-item{font-size:11px;color:#64748b;margin-top:1px}
.cc-date{font-size:10px;color:#475569;margin-top:1px}
.cc-right{text-align:right;flex-shrink:0}
.cc-amt{font-size:14px;font-weight:800;color:#f59e0b}
.cc-status{font-size:9px;font-weight:800;border-radius:4px;padding:2px 7px;margin-top:3px;display:inline-block}
.s-paid{background:#052e16;color:#4ade80}
.s-pending{background:#7f1d1d;color:#fca5a5}
.s-partial{background:#422006;color:#fb923c}

/* Expanded */
.cb{display:none;border-top:1px solid #0a0f1e;padding:12px 14px}
.cb.open{display:block}
.detail-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #0a0f1e;font-size:12px}
.detail-row:last-of-type{border-bottom:none}
.dl{color:#475569}.dv{color:#e2e8f0;font-weight:700;text-align:right}
.act-row{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.abtn{border:none;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit}
.ab-wa{background:#128c7e;color:#fff}
.ab-edit{background:#1e293b;color:#a5b4fc;border:1px solid #334155}
.ab-pay{background:#15803d;color:#fff}
.ab-del{background:transparent;color:#ef4444;border:1px solid #450a0a}
.ab-copy{background:#1e3a5f;color:#93c5fd}

/* Modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:flex-end;justify-content:center}
.mbg.open{display:flex}
.mbox{background:#0d1526;border-radius:18px 18px 0 0;width:100%;max-width:480px;padding:18px 16px 36px;border:1px solid #1e3a5f;max-height:92vh;overflow-y:auto}
.mtitle{font-size:15px;font-weight:800;color:#10b981;margin-bottom:16px}
.irow{margin-bottom:11px}
.ilbl{font-size:10px;color:#475569;font-weight:700;display:block;margin-bottom:3px;letter-spacing:.4px}
.inp{width:100%;padding:10px 12px;border-radius:9px;border:1px solid #1e3a5f;background:#0a0f1e;color:#e2e8f0;font-size:13px;font-family:inherit;outline:none}
.inp::placeholder{color:#334155}
textarea.inp{resize:vertical;min-height:60px}
.challan-preview{background:#0a0f1e;border:1px solid #10b98144;border-radius:10px;padding:12px;margin-bottom:12px;font-family:monospace;font-size:12px;color:#10b981;line-height:1.8}
.mbtns{display:flex;gap:8px;margin-top:14px}
.bsave{flex:1;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#10b981,#6366f1);color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}
.bcancel{padding:12px 16px;border-radius:10px;border:1px solid #334155;background:#1e293b;color:#94a3b8;font-size:13px;cursor:pointer;font-family:inherit}
.fab{position:fixed;bottom:22px;right:18px;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#10b981,#6366f1);color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(16,185,129,.5);z-index:100;display:flex;align-items:center;justify-content:center}
.nwrap{position:fixed;top:8px;left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:440px;z-index:999;pointer-events:none}
.notif{border-radius:10px;padding:9px 13px;font-size:12px;font-weight:700;color:#fff;margin-bottom:5px;display:none}
.notif.show{display:block}
.notif.ok{background:#15803d}.notif.err{background:#b91c1c}.notif.info{background:#1e40af}
.loading{text-align:center;padding:60px 20px;color:#334155;font-size:13px}
.spin{width:32px;height:32px;border:3px solid #1e293b;border-top-color:#10b981;border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:#334155}
</style>
</head>
<body>
<div class="nwrap"><div class="notif" id="notif"></div></div>

<div class="hdr">
  <div class="hdr-row">
    <div>
      <div class="hdr-title">🧾 Challan Tracker</div>
      <div class="hdr-sub">
        <span id="auth-dot" style="width:7px;height:7px;border-radius:50%;background:#334155;display:inline-block;transition:background .4s"></span>
        Vande Bharat Enterprises · TCH/26-27 Series
      </div>
    </div>
    <a href="./" class="back-btn">← वापस</a>
  </div>
  <input class="srch" id="srch" placeholder="🔍 Challan no., unit, item search..." oninput="renderChallans()"/>
</div>

<div class="stats" id="stats"></div>
<div class="body" id="body">
  <div class="loading"><div class="spin"></div>Challans load हो रहे हैं...</div>
</div>

<button class="fab" onclick="openModal()">+</button>

<!-- ADD/EDIT MODAL -->
<div class="mbg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="mbox">
    <div class="mtitle" id="mtitle">🧾 नया Challan बनाएं</div>

    <!-- Preview -->
    <div class="challan-preview" id="challan-preview">
      TCH/26-27/001 — Preview
    </div>

    <div class="irow">
      <label class="ilbl">📍 UNIT / PARTY *</label>
      <input class="inp" id="c-unit" placeholder="जैसे: 177 MH, Station HQ..." oninput="updatePreview()"/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="irow">
        <label class="ilbl">📅 Challan Date *</label>
        <input class="inp" type="date" id="c-date" oninput="updatePreview()"/>
      </div>
      <div class="irow">
        <label class="ilbl">💰 Amount (₹) *</label>
        <input class="inp" type="number" id="c-amt" placeholder="0" oninput="updatePreview()"/>
      </div>
    </div>
    <div class="irow">
      <label class="ilbl">📦 Item / सामान का विवरण *</label>
      <textarea class="inp" id="c-item" placeholder="जैसे: Sugar 50kg, Cement 10 bags..."></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="irow">
        <label class="ilbl">📊 Quantity</label>
        <input class="inp" id="c-qty" placeholder="जैसे: 50 kg"/>
      </div>
      <div class="irow">
        <label class="ilbl">🏷️ GST %</label>
        <select class="inp" id="c-gst">
          <option value="0">0% (Exempt)</option>
          <option value="5">5%</option>
          <option value="12">12%</option>
          <option value="18" selected>18%</option>
          <option value="28">28%</option>
        </select>
      </div>
    </div>
    <div class="irow">
      <label class="ilbl">💳 Payment Status</label>
      <select class="inp" id="c-pay">
        <option value="pending">⏳ Pending — नहीं मिला</option>
        <option value="partial">🔶 Partial — कुछ मिला</option>
        <option value="paid">✅ Paid — पूरा मिल गया</option>
      </select>
    </div>
    <div class="irow" id="partial-amt-row" style="display:none">
      <label class="ilbl">💰 Received Amount (₹)</label>
      <input class="inp" type="number" id="c-recv" placeholder="कितना मिला?"/>
    </div>
    <div class="irow">
      <label class="ilbl">📝 Note (Optional)</label>
      <input class="inp" id="c-note" placeholder="कोई जरूरी बात..."/>
    </div>
    <div class="irow">
      <label class="ilbl">🔗 Order ID (अगर linked है)</label>
      <input class="inp" id="c-order" placeholder="जैसे: VBE-034"/>
    </div>

    <div class="mbtns">
      <button class="bcancel" onclick="closeModal()">रद्द</button>
      <button class="bsave" onclick="saveChallan()">🧾 Challan Save करें</button>
    </div>
  </div>
</div>

<script>
let _challans=[];
let _editId=null;
let _nextNo=1;

// Payment status watch
document.getElementById('c-pay').addEventListener('change',function(){
  document.getElementById('partial-amt-row').style.display=this.value==='partial'?'block':'none';
});

// ══ CHALLAN NUMBER GENERATOR ══
function genChallanNo(seq){
  const yr = new Date().getFullYear();
  const nextYr = (yr+1).toString().slice(2);
  const currYr = yr.toString().slice(2);
  return `TCH/${currYr}-${nextYr}/${String(seq).padStart(3,'0')}`;
}

function updatePreview(){
  const unit=document.getElementById('c-unit').value||'Unit';
  const date=document.getElementById('c-date').value||new Date().toISOString().split('T')[0];
  const amt=document.getElementById('c-amt').value||'0';
  document.getElementById('challan-preview').textContent=
    `${genChallanNo(_nextNo)}\n${unit}\n₹${parseInt(amt).toLocaleString('hi-IN')}\nDate: ${date}`;
}

// ══ LOAD ══
async function loadChallans(){
  try{
    const snap=await window._getDocs(window._col(window._db,'vbe_challans'));
    _challans=[];
    snap.forEach(d=>_challans.push({id:d.id,...d.data()}));
    _challans.sort((a,b)=>(b.seqNo||0)-(a.seqNo||0));
    _nextNo=(_challans.length>0?Math.max(..._challans.map(c=>c.seqNo||0)):0)+1;
    updatePreview();
    renderChallans();
    notif('✅ Challans load हो गए','ok');
  }catch(e){
    document.getElementById('body').innerHTML='<div class="loading" style="color:#ef4444">❌ Load नहीं हुआ<br><br><button onclick="loadChallans()" style="background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:8px;padding:8px 16px;cursor:pointer">🔄 Retry</button></div>';
  }
}

// ══ RENDER ══
function renderChallans(){
  const q=(document.getElementById('srch').value||'').toLowerCase().trim();
  let list=_challans;
  if(q) list=list.filter(c=>
    (c.challanNo||'').toLowerCase().includes(q)||
    (c.unit||'').toLowerCase().includes(q)||
    (c.item||'').toLowerCase().includes(q)||
    (c.note||'').toLowerCase().includes(q)
  );

  // Stats
  const totalAmt=_challans.reduce((s,c)=>s+(c.amount||0),0);
  const paid=_challans.filter(c=>c.payStatus==='paid').reduce((s,c)=>s+(c.amount||0),0);
  const pending=_challans.filter(c=>c.payStatus==='pending').length;
  const partial=_challans.filter(c=>c.payStatus==='partial').length;
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="sv" style="color:#e2e8f0">${_challans.length}</div><div class="sl">कुल Challans</div></div>`+
    `<div class="stat"><div class="sv" style="color:#10b981">₹${fmtAmt(paid)}</div><div class="sl">Paid</div></div>`+
    `<div class="stat"><div class="sv" style="color:#ef4444">${pending}</div><div class="sl">Pending</div></div>`+
    `<div class="stat"><div class="sv" style="color:#fb923c">${partial}</div><div class="sl">Partial</div></div>`;

  if(!list.length){
    document.getElementById('body').innerHTML=q?
      `<div class="empty">🔍 "${q}" — कोई result नहीं</div>`:
      `<div class="empty"><div style="font-size:48px;margin-bottom:12px">🧾</div><div style="font-size:14px;color:#475569;font-weight:800">कोई Challan नहीं</div><div style="font-size:12px;color:#334155;margin-top:6px">+ button से नया challan बनाएं</div></div>`;
    return;
  }

  document.getElementById('body').innerHTML=list.map(c=>challanCard(c)).join('');
}

function fmtAmt(v){
  if(v>=100000) return (v/100000).toFixed(1)+'L';
  if(v>=1000) return (v/1000).toFixed(0)+'K';
  return v;
}

function challanCard(c){
  const payLabel=c.payStatus==='paid'?'✅ Paid':c.payStatus==='partial'?'🔶 Partial':'⏳ Pending';
  const payCls=c.payStatus==='paid'?'s-paid':c.payStatus==='partial'?'s-partial':'s-pending';
  const cardCls=c.payStatus==='paid'?'paid':c.payStatus==='pending'?'pending-pay':'';

  return `<div class="cc ${cardCls}" id="cc-${c.id}">
    <div class="cc-hdr" onclick="toggle('${c.id}')">
      <div>
        <div class="cc-num">${c.challanNo||'—'}</div>
        <div class="cc-date">${c.date||'—'}</div>
      </div>
      <div class="cc-info">
        <div class="cc-unit">${c.unit||'—'}</div>
        <div class="cc-item">${(c.item||'').substring(0,35)}${(c.item||'').length>35?'...':''}</div>
      </div>
      <div class="cc-right">
        <div class="cc-amt">₹${(c.amount||0).toLocaleString('hi-IN')}</div>
        <div class="cc-status ${payCls}">${payLabel}</div>
      </div>
    </div>
    <div class="cb" id="cb-${c.id}">
      <div class="detail-row"><span class="dl">Challan No.</span><span class="dv" style="color:#10b981;font-family:monospace">${c.challanNo}</span></div>
      <div class="detail-row"><span class="dl">Unit / Party</span><span class="dv">${c.unit}</span></div>
      <div class="detail-row"><span class="dl">Item</span><span class="dv">${c.item}</span></div>
      ${c.qty?`<div class="detail-row"><span class="dl">Quantity</span><span class="dv">${c.qty}</span></div>`:''}
      <div class="detail-row"><span class="dl">Amount</span><span class="dv" style="color:#f59e0b">₹${(c.amount||0).toLocaleString('hi-IN')}</span></div>
      ${c.gst?`<div class="detail-row"><span class="dl">GST</span><span class="dv">${c.gst}%</span></div>`:''}
      <div class="detail-row"><span class="dl">Payment</span><span class="dv">${payLabel}</span></div>
      ${c.receivedAmt?`<div class="detail-row"><span class="dl">Received</span><span class="dv" style="color:#10b981">₹${(c.receivedAmt||0).toLocaleString('hi-IN')}</span></div>`:''}
      ${c.orderId?`<div class="detail-row"><span class="dl">Order ID</span><span class="dv" style="color:#6366f1">${c.orderId}</span></div>`:''}
      ${c.note?`<div class="detail-row"><span class="dl">Note</span><span class="dv">${c.note}</span></div>`:''}
      <div class="detail-row"><span class="dl">Date</span><span class="dv">${c.date}</span></div>
      <div class="act-row">
        <button class="abtn ab-copy" onclick="copyChallan('${c.id}')">📋 Copy</button>
        <button class="abtn ab-wa" onclick="sendChallanWA('${c.id}')">📱 WA</button>
        ${c.payStatus!=='paid'?`<button class="abtn ab-pay" onclick="markPaid('${c.id}')">✅ Paid Mark करें</button>`:''}
        <button class="abtn ab-edit" onclick="openModal('${c.id}')">✏️ Edit</button>
        <button class="abtn ab-del" onclick="deleteChallan('${c.id}')">🗑️</button>
      </div>
    </div>
  </div>`;
}

function toggle(id){
  const cb=document.getElementById('cb-'+id);
  if(cb) cb.classList.toggle('open');
}

// ══ MODAL ══
function openModal(editId=null){
  _editId=editId;
  document.getElementById('mtitle').textContent=editId?'✏️ Challan Edit करें':'🧾 नया Challan बनाएं';
  const c=editId?_challans.find(x=>x.id===editId):null;
  document.getElementById('c-unit').value=c?.unit||'';
  document.getElementById('c-date').value=c?.date||new Date().toISOString().split('T')[0];
  document.getElementById('c-amt').value=c?.amount||'';
  document.getElementById('c-item').value=c?.item||'';
  document.getElementById('c-qty').value=c?.qty||'';
  document.getElementById('c-gst').value=c?.gst||'18';
  document.getElementById('c-pay').value=c?.payStatus||'pending';
  document.getElementById('c-recv').value=c?.receivedAmt||'';
  document.getElementById('c-note').value=c?.note||'';
  document.getElementById('c-order').value=c?.orderId||'';
  document.getElementById('partial-amt-row').style.display=(c?.payStatus==='partial')?'block':'none';
  if(!editId) _nextNo=(_challans.length>0?Math.max(..._challans.map(x=>x.seqNo||0)):0)+1;
  updatePreview();
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('c-unit').focus(),200);
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

async function saveChallan(){
  const unit=document.getElementById('c-unit').value.trim();
  const amt=parseFloat(document.getElementById('c-amt').value)||0;
  const item=document.getElementById('c-item').value.trim();
  const date=document.getElementById('c-date').value;
  if(!unit||!item||!date||!amt){notif('❌ Unit, Item, Date और Amount जरूरी है','err');return;}

  const seqNo=_editId?(_challans.find(x=>x.id===_editId)?.seqNo||_nextNo):_nextNo;
  const challanNo=_editId?(_challans.find(x=>x.id===_editId)?.challanNo||genChallanNo(seqNo)):genChallanNo(seqNo);

  const data={
    unit,item,date,
    amount:amt,
    qty:document.getElementById('c-qty').value.trim(),
    gst:document.getElementById('c-gst').value,
    payStatus:document.getElementById('c-pay').value,
    receivedAmt:parseFloat(document.getElementById('c-recv').value)||0,
    note:document.getElementById('c-note').value.trim(),
    orderId:document.getElementById('c-order').value.trim(),
    challanNo,seqNo,
    updatedAt:new Date().toISOString(),
  };

  try{
    if(_editId){
      await window._setDoc(window._doc(window._db,'vbe_challans',_editId),data);
      const idx=_challans.findIndex(x=>x.id===_editId);
      if(idx>=0) _challans[idx]={..._challans[idx],...data};
      notif('✅ Challan update हो गया','ok');
    } else {
      const id='CH'+Date.now().toString(36).toUpperCase();
      const newC={id,...data,createdAt:new Date().toISOString()};
      await window._setDoc(window._doc(window._db,'vbe_challans',id),newC);
      _challans.unshift(newC);
      _nextNo++;
      notif('✅ Challan बन गया — '+challanNo,'ok');
    }
    closeModal();
    _challans.sort((a,b)=>(b.seqNo||0)-(a.seqNo||0));
    renderChallans();
  }catch(e){notif('❌ Save नहीं हुआ','err');console.error(e);}
}

// ══ MARK PAID ══
async function markPaid(id){
  const c=_challans.find(x=>x.id===id);
  if(!c) return;
  try{
    await window._setDoc(window._doc(window._db,'vbe_challans',id),{...c,payStatus:'paid',receivedAmt:c.amount,updatedAt:new Date().toISOString()});
    c.payStatus='paid';c.receivedAmt=c.amount;
    renderChallans();notif('✅ Paid mark हो गया','ok');
  }catch(e){notif('❌ Update नहीं हुआ','err');}
}

// ══ COPY ══
function copyChallan(id){
  const c=_challans.find(x=>x.id===id);
  if(!c) return;
  const text=`Challan: ${c.challanNo}\nUnit: ${c.unit}\nItem: ${c.item}\nAmount: ₹${(c.amount||0).toLocaleString('hi-IN')}\nDate: ${c.date}`;
  navigator.clipboard.writeText(text).then(()=>notif('📋 Copied!','ok')).catch(()=>notif('Copy failed','err'));
}

// ══ WA SEND ══
function sendChallanWA(id){
  const c=_challans.find(x=>x.id===id);
  if(!c) return;
  const payLabel=c.payStatus==='paid'?'✅ Paid':c.payStatus==='partial'?'🔶 Partial':'⏳ Pending';
  const lines=[
    `🧾 *Challan — Vande Bharat Enterprises*`,
    ``,
    `📋 *Challan No.:* ${c.challanNo}`,
    `📅 *Date:* ${c.date}`,
    `📍 *Unit/Party:* ${c.unit}`,
    `📦 *Item:* ${c.item}`,
    c.qty?`📊 *Qty:* ${c.qty}`:'',
    `💰 *Amount:* ₹${(c.amount||0).toLocaleString('hi-IN')}`,
    c.gst&&c.gst!=='0'?`🏷️ *GST:* ${c.gst}%`:'',
    `💳 *Payment:* ${payLabel}`,
    c.note?`📝 *Note:* ${c.note}`:'',
    ``,
    `—`,
    `Vande Bharat Enterprises | GSTIN: 08GHDPD4384L1ZZ`,
    `Jalipa Cantt, Barmer, Rajasthan`,
  ].filter(Boolean).join('\n');
  window.open('https://wa.me/?text='+encodeURIComponent(lines));
}

// ══ DELETE ══
async function deleteChallan(id){
  if(!confirm('यह challan delete करें?')) return;
  try{
    await window._deleteDoc(window._doc(window._db,'vbe_challans',id));
    _challans=_challans.filter(x=>x.id!==id);
    renderChallans();notif('🗑️ Deleted','info');
  }catch(e){notif('❌ Delete नहीं हुआ','err');}
}

function notif(msg,type='info'){
  const el=document.getElementById('notif');
  el.textContent=msg;el.className=`notif show ${type}`;
  setTimeout(()=>el.classList.remove('show'),2500);
}
</script>
