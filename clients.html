<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let _orders = [];          // सारे orders (Firebase से)
let _clientsMeta = {};     // { phone: {name, phone, unit, role, note, manualOnly} }
let _viewMode = 'all';     // 'all' | 'active' | 'overdue'
let _sortMode = 'orders';  // 'orders' | 'recent' | 'name' | 'active'
let _editingPhone = '';
let _ordersUnsub = null;
let _metaUnsub = null;

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function notif(txt, type='ok'){
  const el = document.createElement('div');
  el.className = 'notif';
  if(type==='warn') el.style.background = '#f59e0b';
  if(type==='danger') el.style.background = '#ef4444';
  if(type==='info') el.style.background = '#6366f1';
  el.textContent = txt;
  document.getElementById('nwrap').prepend(el);
  setTimeout(()=>el.remove(), 4000);
}

function normPhone(p){
  if(!p) return '';
  return String(p).replace(/[^0-9]/g,'').replace(/^91(?=\d{10}$)/,'').slice(-10);
}

function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  if(isNaN(d)) return '—';
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'});
}

function daysAgo(iso){
  if(!iso) return null;
  const d = (Date.now()-new Date(iso))/86400000;
  if(d<1) return 'आज';
  if(d<2) return 'कल';
  return Math.floor(d)+' दिन पहले';
}

function stageBadge(stage){
  const map = {
    'received':   {t:'📥 Received', c:'#6366f1', bg:'#312e8133'},
    'confirmed':  {t:'✅ Confirmed', c:'#22c55e', bg:'#16653433'},
    'processing': {t:'⚙️ Processing', c:'#f59e0b', bg:'#78350f33'},
    'dispatched': {t:'🚚 Dispatched', c:'#06b6d4', bg:'#155e7533'},
    'delivered':  {t:'✅ Delivered', c:'#10b981', bg:'#05603a33'}
  };
  return map[stage] || {t:stage||'—', c:'#94a3b8', bg:'#1e293b'};
}

// ══════════════════════════════════════════
//  CLIENT AGGREGATION (mobile-number-based)
// ══════════════════════════════════════════
function buildClients(){
  // Group orders by normalized phone
  const map = {};
  _orders.forEach(o => {
    const ph = normPhone(o.phone);
    if(!ph || ph.length < 10) return; // बिना phone वाले orders skip
    if(!map[ph]){
      map[ph] = {
        phone: ph,
        names: {},     // name frequency
        units: {},     // unit frequency
        orders: [],
        firstOrder: null,
        lastOrder: null
      };
    }
    const c = map[ph];
    if(o.customer){ c.names[o.customer] = (c.names[o.customer]||0) + 1; }
    if(o.unitName){ c.units[o.unitName] = (c.units[o.unitName]||0) + 1; }
    c.orders.push(o);
    const t = new Date(o.createdAt||0).getTime();
    if(!c.firstOrder || t < c.firstOrder) c.firstOrder = t;
    if(!c.lastOrder  || t > c.lastOrder ) c.lastOrder = t;
  });

  // Add manual-only clients (no orders yet)
  Object.keys(_clientsMeta).forEach(ph => {
    const p = normPhone(ph);
    if(!p) return;
    if(!map[p]){
      map[p] = {
        phone: p,
        names: {},
        units: {},
        orders: [],
        firstOrder: null,
        lastOrder: null,
        manualOnly: true
      };
    }
  });

  // Convert to array with computed stats
  const list = Object.values(map).map(c => {
    const meta = _clientsMeta[c.phone] || {};
    // Best name: manual override → most-frequent from orders
    let bestName = meta.name || '';
    if(!bestName){
      const arr = Object.entries(c.names).sort((a,b)=>b[1]-a[1]);
      bestName = arr[0] ? arr[0][0] : '(नाम नहीं)';
    }
    // Units list (sorted by frequency)
    const unitList = Object.entries(c.units).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
    if(meta.unit && !unitList.includes(meta.unit)) unitList.unshift(meta.unit);

    const total = c.orders.length;
    const delivered = c.orders.filter(o=>o.stage==='delivered').length;
    const active = c.orders.filter(o=>o.stage!=='delivered' && !o.isLater).length;
    const later = c.orders.filter(o=>o.isLater && o.stage!=='delivered').length;
    const overdue = c.orders.filter(o=>{
      if(o.stage==='delivered' || o.isLater) return false;
      return new Date(o.deadline) < new Date();
    }).length;

    return {
      phone: c.phone,
      name: bestName,
      role: meta.role || '',
      note: meta.note || '',
      units: unitList,
      orders: c.orders.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)),
      total, delivered, active, later, overdue,
      firstOrder: c.firstOrder,
      lastOrder: c.lastOrder,
      manualOnly: !!c.manualOnly
    };
  });

  return list;
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function setView(v){ _viewMode = v;
  ['all','active','overdue'].forEach(x=>{
    const el = document.getElementById('tg-'+(x==='all'?'all':x==='active'?'act':'ov'));
    if(el) el.classList.toggle('on', x===v);
  });
  renderList();
}
function setSort(s){ _sortMode = s;
  ['orders','recent','name','active'].forEach(x=>{
    const el = document.getElementById('sort-'+x);
    if(el) el.classList.toggle('on', x===s);
  });
  renderList();
}

function renderList(){
  const clients = buildClients();
  const q = (document.getElementById('srch').value||'').toLowerCase().trim();

  // Filter by search
  let filt = clients.filter(c => {
    if(q){
      const hay = (c.name+' '+c.phone+' '+c.units.join(' ')+' '+c.role+' '+c.note).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    if(_viewMode==='active' && c.active===0) return false;
    if(_viewMode==='overdue' && c.overdue===0) return false;
    return true;
  });

  // Sort
  if(_sortMode==='orders'){
    filt.sort((a,b)=> b.total - a.total || (b.lastOrder||0)-(a.lastOrder||0));
  } else if(_sortMode==='recent'){
    filt.sort((a,b)=> (b.lastOrder||0) - (a.lastOrder||0));
  } else if(_sortMode==='name'){
    filt.sort((a,b)=> a.name.localeCompare(b.name,'hi'));
  } else if(_sortMode==='active'){
    filt.sort((a,b)=> b.active - a.active || b.total-a.total);
  }

  // KPIs
  document.getElementById('kpi-tot').textContent = clients.length;
  document.getElementById('kpi-act').textContent = clients.filter(c=>c.active>0).length;
  document.getElementById('kpi-ord').textContent = clients.reduce((s,c)=>s+c.total,0);

  // Render cards
  const list = document.getElementById('list');
  if(filt.length===0){
    list.innerHTML = `<div class="empty">${q?'❌ कोई client नहीं मिला':'अभी कोई client नहीं है।<br>Orders से auto-add हो जाएंगे, या ➕ नया से जोड़ें।'}</div>`;
    return;
  }

  list.innerHTML = filt.map((c, i) => {
    const isTop = (i===0 && _sortMode==='orders' && c.total>0);
    const phoneDisplay = c.phone ? `📞 ${c.phone}` : '<span class="cphone-no">📞 नंबर नहीं है</span>';
    const unitsHtml = c.units.length > 0
      ? `<div class="cunits">🏛️ ${c.units.slice(0,4).map(u=>`<span class="u-tag">${escHtml(u)}</span>`).join('')}${c.units.length>4?` +${c.units.length-4}`:''}</div>`
      : '';
    const lastOrderTxt = c.lastOrder ? `🕐 ${daysAgo(new Date(c.lastOrder).toISOString())}` : '🆕 कोई order नहीं';
    return `
      <div class="client-card ${isTop?'top':''}" onclick="openDetail('${c.phone}')">
        <div class="client-row1">
          <div class="cname">${escHtml(c.name)}${c.role?` <span style="font-size:10px;color:#94a3b8;font-weight:600">· ${escHtml(c.role)}</span>`:''}</div>
          <div class="crank">#${i+1}</div>
        </div>
        <div class="${c.phone?'cphone':'cphone-no'}">${phoneDisplay} ${c.phone?` <span style="color:#475569;font-size:10px">· ${lastOrderTxt}</span>`:''}</div>
        <div class="cstats">
          ${c.total>0?`<div class="cstat cstat-tot">📦 ${c.total} Total</div>`:`<div class="cstat" style="color:#22d3ee;border-color:#22d3ee55">🆕 New (कोई order नहीं)</div>`}
          ${c.active>0?`<div class="cstat cstat-act">🔥 ${c.active} Active</div>`:''}
          ${c.delivered>0?`<div class="cstat cstat-done">✅ ${c.delivered} Done</div>`:''}
          ${c.overdue>0?`<div class="cstat cstat-over">⚠️ ${c.overdue} Overdue</div>`:''}
        </div>
        ${unitsHtml}
        <div class="cactions" onclick="event.stopPropagation()">
          ${c.phone?`<a class="cact cact-call" href="tel:${c.phone}">📞 Call</a>`:`<button class="cact cact-call" disabled style="opacity:0.4">📞 Call</button>`}
          ${c.phone?`<a class="cact cact-wa" href="https://wa.me/91${c.phone}" target="_blank">💬 WA</a>`:`<button class="cact cact-wa" disabled style="opacity:0.4">💬 WA</button>`}
          <button class="cact cact-view" onclick="openDetail('${c.phone}')">📋 खोलो</button>
        </div>
      </div>`;
  }).join('');
}

function escHtml(s){
  return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ══════════════════════════════════════════
//  DETAIL MODAL
// ══════════════════════════════════════════
function openDetail(phone){
  const clients = buildClients();
  const c = clients.find(x => x.phone === phone);
  if(!c){ notif('Client नहीं मिला','danger'); return; }
  document.getElementById('d-name').innerHTML = `${escHtml(c.name)}${c.role?` <span style="font-size:11px;color:#94a3b8;font-weight:600">· ${escHtml(c.role)}</span>`:''}`;

  const orderListHtml = c.orders.length === 0
    ? '<div style="text-align:center;color:#475569;padding:18px;font-size:12px">अभी कोई order नहीं है</div>'
    : c.orders.map(o => {
        const sb = stageBadge(o.stage);
        const isOverdue = o.stage!=='delivered' && !o.isLater && new Date(o.deadline) < new Date();
        const cls = o.stage==='delivered' ? 'delivered' : (isOverdue ? 'overdue' : '');
        return `<div class="order-mini ${cls}">
          <div class="om-row1">
            <span class="om-id">${escHtml(o.orderNo||o.id||'—')}</span>
            <span class="om-stage" style="background:${sb.bg};color:${sb.c}">${sb.t}</span>
          </div>
          <div class="om-item">${escHtml(o.item||'—')}${o.qty?` <span style="color:#64748b;font-weight:600">· ${escHtml(o.qty)}</span>`:''}</div>
          <div class="om-meta">📅 ${fmtDate(o.createdAt)} ${o.unitName?`· 🏛️ ${escHtml(o.unitName)}`:''} ${o.staff?`· 👤 ${escHtml(o.staff)}`:''}</div>
        </div>`;
      }).join('');

  const unitsBlock = c.units.length > 0
    ? `<div class="detail-section"><h4>🏛️ Units / Brigades (${c.units.length})</h4>
        <div class="unit-pill-list">${c.units.map(u=>`<span class="unit-pill">${escHtml(u)}</span>`).join('')}</div></div>`
    : '';

  const noteBlock = c.note
    ? `<div class="detail-section"><h4>📝 Note</h4><div style="background:#0d1526;border:1px solid #1e3a5f;border-radius:8px;padding:9px 11px;font-size:12px;color:#cbd5e1;line-height:1.5;white-space:pre-wrap">${escHtml(c.note)}</div></div>`
    : '';

  const dateBlock = c.firstOrder ? `<div style="font-size:11px;color:#64748b;margin-top:6px">पहला order: ${fmtDate(new Date(c.firstOrder).toISOString())} · आख़िरी: ${fmtDate(new Date(c.lastOrder).toISOString())}</div>` : '';

  document.getElementById('d-body').innerHTML = `
    <div style="background:#0d1526;border:1px solid #1e3a5f;border-radius:9px;padding:9px 11px;margin-bottom:10px">
      <div style="font-size:13px;color:#22d3ee;font-family:monospace;font-weight:700">${c.phone?`📞 ${c.phone}`:'📞 नंबर नहीं है'}</div>
      ${dateBlock}
    </div>

    <div class="detail-stat-row">
      <div class="dstat"><div class="dstat-v" style="color:#f59e0b">${c.total}</div><div class="dstat-l">Total</div></div>
      <div class="dstat"><div class="dstat-v" style="color:#6366f1">${c.active}</div><div class="dstat-l">Active</div></div>
      <div class="dstat"><div class="dstat-v" style="color:#10b981">${c.delivered}</div><div class="dstat-l">Done</div></div>
      <div class="dstat"><div class="dstat-v" style="color:#ef4444">${c.overdue}</div><div class="dstat-l">Overdue</div></div>
    </div>

    ${unitsBlock}
    ${noteBlock}

    <div class="detail-section"><h4>📦 सारे Orders (${c.orders.length})</h4>${orderListHtml}</div>

    <div class="detail-actions">
      ${c.phone?`<a class="dact dact-call" href="tel:${c.phone}">📞 Call</a>`:`<button class="dact dact-call" disabled style="opacity:0.4">📞 Call</button>`}
      ${c.phone?`<a class="dact dact-wa" href="https://wa.me/91${c.phone}?text=${encodeURIComponent(buildSummaryMsg(c))}" target="_blank">💬 Summary भेजो</a>`:`<button class="dact dact-wa" disabled style="opacity:0.4">💬 Summary</button>`}
      <button class="dact dact-edit" onclick="openEdit('${c.phone}')">✏️ Edit Info</button>
      <button class="dact dact-edit" onclick="copySummary('${c.phone}')" style="color:#22d3ee;border-color:#22d3ee55">📋 Copy</button>
    </div>
  `;

  document.getElementById('m-detail').classList.add('open');
}

function closeDetail(){
  document.getElementById('m-detail').classList.remove('open');
}

window.openDetail = openDetail;
window.closeDetail = closeDetail;
window.setView = setView;
window.setSort = setSort;
window.renderList = renderList;

// ══════════════════════════════════════════
//  SUMMARY MESSAGE BUILDER
// ══════════════════════════════════════════
function buildSummaryMsg(c){
  let msg = `🙏 नमस्कार ${c.name} जी,\n\n`;
  msg += `*Vande Bharat Enterprises · Barmer*\n`;
  msg += `आपके orders का status:\n\n`;
  msg += `📦 कुल Orders: *${c.total}*\n`;
  msg += `✅ Delivered: *${c.delivered}*\n`;
  if(c.active>0) msg += `🔥 Active: *${c.active}*\n`;
  if(c.overdue>0) msg += `⚠️ Overdue: *${c.overdue}*\n`;
  msg += `\n`;
  if(c.orders.length>0){
    const recent = c.orders.slice(0, 5);
    msg += `*हाल के Orders:*\n`;
    recent.forEach(o => {
      const sb = stageBadge(o.stage);
      msg += `• ${o.orderNo||''} — ${o.item||'—'}${o.qty?' ('+o.qty+')':''} → ${sb.t}\n`;
    });
    if(c.orders.length > 5) msg += `_... और ${c.orders.length-5} orders_\n`;
    msg += `\n`;
  }
  msg += `📞 Vikram Sa: 9509553600\n`;
  msg += `🏢 Vande Bharat Enterprises, Jalipa Cantt`;
  return msg;
}

function copySummary(phone){
  const c = buildClients().find(x => x.phone === phone);
  if(!c) return;
  const msg = buildSummaryMsg(c);
  navigator.clipboard.writeText(msg).then(()=>{
    notif('📋 Summary copy हो गई!','ok');
  }).catch(()=>{
    notif('Copy fail — manually select करो','warn');
  });
}
window.copySummary = copySummary;

// ══════════════════════════════════════════
//  ADD / EDIT
// ══════════════════════════════════════════
function openAdd(){
  _editingPhone = '';
  document.getElementById('add-title').textContent = '➕ नया Client';
  document.getElementById('ad-name').value = '';
  document.getElementById('ad-phone').value = '';
  document.getElementById('ad-phone').disabled = false;
  document.getElementById('ad-unit').value = '';
  document.getElementById('ad-role').value = '';
  document.getElementById('ad-note').value = '';
  document.getElementById('ad-del').style.display = 'none';
  document.getElementById('m-add').classList.add('open');
}

function openEdit(phone){
  closeDetail();
  const c = buildClients().find(x => x.phone === phone);
  if(!c) return;
  _editingPhone = phone;
  document.getElementById('add-title').textContent = '✏️ Edit Client';
  document.getElementById('ad-name').value = c.name;
  document.getElementById('ad-phone').value = c.phone;
  document.getElementById('ad-phone').disabled = true; // phone = unique ID, can't change
  document.getElementById('ad-unit').value = (_clientsMeta[phone]||{}).unit || c.units[0] || '';
  document.getElementById('ad-role').value = c.role;
  document.getElementById('ad-note').value = c.note;
  document.getElementById('ad-del').style.display = (_clientsMeta[phone] ? 'block' : 'none');
  document.getElementById('m-add').classList.add('open');
}

function closeAdd(){
  document.getElementById('m-add').classList.remove('open');
}

window.openAdd = openAdd;
window.openEdit = openEdit;
window.closeAdd = closeAdd;

async function saveClient(){
  const name = document.getElementById('ad-name').value.trim();
  const phone = normPhone(document.getElementById('ad-phone').value);
  const unit = document.getElementById('ad-unit').value.trim();
  const role = document.getElementById('ad-role').value.trim();
  const note = document.getElementById('ad-note').value.trim();

  if(!name){ notif('नाम डालो','warn'); return; }
  if(!phone || phone.length !== 10){ notif('सही 10-digit mobile number डालो','warn'); return; }

  const data = { name, phone, unit, role, note, updatedAt: new Date().toISOString() };
  try {
    await window._setDoc(window._doc(window._db, 'vbe_clients_meta', phone), data);
    _clientsMeta[phone] = data;
    notif('✅ Client save हो गया','ok');
    closeAdd();
    renderList();
  } catch(e){
    console.error(e);
    notif('❌ Save fail: '+e.message,'danger');
  }
}
window.saveClient = saveClient;

async function deleteClient(){
  if(!_editingPhone) return;
  if(!confirm('क्या आप sure हैं? Client meta delete हो जाएगी (orders नहीं हटेंगे)।')) return;
  try {
    await window._deleteDoc(window._doc(window._db, 'vbe_clients_meta', _editingPhone));
    delete _clientsMeta[_editingPhone];
    notif('🗑️ Delete हो गया','ok');
    closeAdd();
    renderList();
  } catch(e){
    notif('❌ Delete fail: '+e.message,'danger');
  }
}
window.deleteClient = deleteClient;

// ══════════════════════════════════════════
//  FIREBASE LIVE LISTENERS
// ══════════════════════════════════════════
function init(){
  // Orders live
  if(_ordersUnsub) _ordersUnsub();
  _ordersUnsub = window._onSnapshot(window._collection(window._db,'vbe_orders'), (snap)=>{
    _orders = [];
    snap.forEach(d => _orders.push(d.data()));
    renderList();
  }, (err)=>{
    console.error('Orders listen error',err);
    notif('Orders load fail','danger');
  });

  // Client meta live
  if(_metaUnsub) _metaUnsub();
  _metaUnsub = window._onSnapshot(window._collection(window._db,'vbe_clients_meta'), (snap)=>{
    _clientsMeta = {};
    snap.forEach(d => { const x = d.data(); if(x.phone) _clientsMeta[x.phone] = x; });
    renderList();
  }, (err)=>{
    console.warn('Meta listen error (collection may be empty - that\'s OK)', err);
    // Empty collection is fine
  });
}
window._init = init;
</script>
