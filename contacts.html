<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged }
                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp }
                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyBCe5DKNKcthOl4umprfRm2QBfbVaFORg8",
  authDomain:        "vbe-order-tracker-60324.firebaseapp.com",
  projectId:         "vbe-order-tracker-60324",
  storageBucket:     "vbe-order-tracker-60324.firebasestorage.app",
  messagingSenderId: "894023456122",
  appId:             "1:894023456122:web:6ee548f0913c887c67f2c3"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── UNITS LIST ────────────────────────────────────────────────────────────────
window.UNITS = [
  {id:'u01',name:'17 Guards',       loc:'Jalipa Cantt'},
  {id:'u02',name:'MES',             loc:'Jalipa Cantt'},
  {id:'u03',name:'17 MAC',          loc:'Jalipa Cantt'},
  {id:'u04',name:'18 MAC',          loc:'Jalipa Cantt'},
  {id:'u05',name:'177 MH',          loc:'Jalipa Cantt'},
  {id:'u06',name:'Station HQ',      loc:'Jalipa Cantt'},
  {id:'u07',name:'NCC',             loc:'Jalipa Cantt'},
  {id:'u08',name:'318 Workshop',    loc:'Jalipa Cantt'},
  {id:'u09',name:'74 Armd Regt',    loc:'Jalipa Cantt'},
  {id:'u10',name:'60 Armd Regt',    loc:'Jalipa Cantt'},
  {id:'u11',name:'110 Brigade',     loc:'Jalipa Cantt'},
  {id:'u12',name:'110 Signals',     loc:'Jalipa Cantt'},
  {id:'u13',name:'694 Tatra',       loc:'Jalipa Cantt'},
  {id:'u14',name:'625 Tatra',       loc:'Jalipa Cantt'},
  {id:'u15',name:'KV Jalipa',       loc:'Jalipa Cantt'},
  {id:'u16',name:'MCO',             loc:'Jalipa Cantt'},
  {id:'u17',name:'5 MAC',           loc:'Jalipa Cantt'},
  {id:'u18',name:'414 Engr',        loc:'Jalipa Cantt'},
  {id:'u19',name:'6340 DBS',        loc:'Jalipa Cantt'},
  {id:'u20',name:'6340 (74)',        loc:'Jalipa Cantt'},
  {id:'u21',name:'32 ELent',        loc:'Jalipa Cantt'},
  {id:'u22',name:'177 Wet Canteen', loc:'Jalipa Cantt'},
  {id:'u23',name:'ECHS Polyclinic', loc:'Jalipa Cantt'},
  {id:'u30',name:'747 Armd Regt',   loc:'Jasai'},
  {id:'u31',name:'2 Lancer',        loc:'Jasai'},
  {id:'u32',name:'25 Ammo Depot',   loc:'Jasai'},
  {id:'u33',name:'496 Depot',       loc:'Jasai'},
  {id:'u34',name:'FWC 812 JASAI',   loc:'Jasai'},
  {id:'u40',name:'MARWAR RASOI',    loc:'अन्य'},
  {id:'u41',name:'ALFA COM',        loc:'अन्य'},
];

window.CONTACTS = [];
window._db = db;

// ── AUTH → LOAD ───────────────────────────────────────────────────────────────
signInAnonymously(auth).catch(e => {
  document.getElementById('load-txt').textContent = '❌ Auth Error: ' + e.message;
});

onAuthStateChanged(auth, async user => {
  if (!user) return;
  try {
    document.getElementById('load-txt').textContent = '📥 Contacts लोड हो रहे हैं...';
    const snap = await getDocs(collection(db, 'vbe_parties'));
    const all = [];
    snap.forEach(d => {
      const v = d.data();
      const mob = (v.call || v.mobile || '').replace(/\D/g,'').slice(-10);
      // duplicate check by mobile
      if (mob && all.find(x => x.mobile === mob)) return;
      const name = v.name || '';
      if (!name) return;
      // fuzzy unit match
      const rawUnit = v.unit || v.cat || '';
      const matched = window.UNITS.find(u =>
        u.name.toLowerCase() === rawUnit.toLowerCase() ||
        u.name.toLowerCase().includes(rawUnit.toLowerCase()) ||
        rawUnit.toLowerCase().includes(u.name.toLowerCase())
      );
      all.push({
        id:    d.id,
        fbId:  d.id,
        name,
        mobile: mob,
        wa:    (v.wa || v.whatsapp || '').replace(/\D/g,'').slice(-10) || mob,
        unit:  matched ? matched.name : (rawUnit || 'अन्य'),
        notes: v.note || v.notes || v.addr || '',
      });
    });
    window.CONTACTS = all;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
  } catch(e) {
    document.getElementById('load-txt').textContent = '❌ Error: ' + e.message;
    document.getElementById('load-retry').style.display = 'inline-block';
  }
});

// ── FIREBASE SAVE/DELETE ──────────────────────────────────────────────────────
window.fbSave = async (form, fbId) => {
  const p = {
    name: form.name, call: form.mobile, wa: form.wa || form.mobile,
    note: form.notes, unit: form.unit, cat: form.unit,
    updatedAt: serverTimestamp()
  };
  if (fbId) {
    await updateDoc(doc(db,'vbe_parties',fbId), p);
    return fbId;
  } else {
    const r = await addDoc(collection(db,'vbe_parties'), {...p, createdAt: serverTimestamp()});
    return r.id;
  }
};

window.fbDelete = async (fbId) => {
  if (fbId) await deleteDoc(doc(db,'vbe_parties',fbId));
};
</script>

<style>

/* CONTACT LIST */

.add-here{width:100%;padding:8px;border:none;background:linear-gradient(135deg,#f59e0b18,#ef444418);color:#f59e0b;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;border-top:1px solid #1e293b;border-radius:0 0 12px 12px}

/* LIST VIEW */

/* MODAL */

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let curLoc   = 'ALL';
let curView  = 'units';
let openUnit = null;
let newULoc  = 'Jalipa Cantt';

const LC = {
  'Jalipa Cantt':{bg:'#052e16',text:'#4ade80',bdr:'#15803d'},
  'Jasai':       {bg:'#431407',text:'#fb923c',bdr:'#c2410c'},
  'अन्य':         {bg:'#2e1065',text:'#c084fc',bdr:'#7e22ce'},
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function ava(name){
  const ini=(name||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const hue=[...(name||'')].reduce((a,c)=>a+c.charCodeAt(0),0)%360;
  return `<div class="avatar" style="background:hsl(${hue},55%,30%)">${ini}</div>`;
}
function lbadge(loc){
  const c=LC[loc]||LC['अन्य'];
  return `<span class="lbadge" style="background:${c.bg};color:${c.text}">📍${loc}</span>`;
}
function cntOf(uname){return (window.CONTACTS||[]).filter(c=>c.unit===uname).length;}
function toast(msg,col='#10b981'){
  const t=document.createElement('div');
  t.className='toast';t.style.cssText=`color:${col};border-color:${col}44`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}

// ── ACTION BUTTONS HTML ───────────────────────────────────────────────────────
function actBtns(c, stopProp=''){
  const sp = stopProp ? 'event.stopPropagation();' : '';
  return `<div class="act-btns">
    <div class="arow">
      ${c.mobile?`<a href="tel:${c.mobile}" class="abtn ab-call" onclick="${sp}">📞 Call</a>`:''}
      ${c.mobile?`<a href="https://wa.me/91${c.wa||c.mobile}" target="_blank" class="abtn ab-wa" onclick="${sp}">💬 WA</a>`:''}
    </div>
    <div class="arow">
      <button class="abtn ab-edit" onclick="${sp}openEdit('${c.id}')">✏️ Edit</button>
      <button class="abtn ab-del"  onclick="${sp}delContact('${c.id}')">🗑️</button>
    </div>
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const q=(document.getElementById('srch')?.value||'').toLowerCase().trim();
  const contacts=window.CONTACTS||[];
  const units=window.UNITS||[];

  // stats
  document.getElementById('st-total').textContent=contacts.length;
  document.getElementById('st-units').textContent=units.length;
  document.getElementById('st-jalipa').textContent=units.filter(u=>u.loc==='Jalipa Cantt').length;
  document.getElementById('st-jasai').textContent=units.filter(u=>u.loc==='Jasai').length;

  renderUnits(q,contacts,units);
  renderList(q,contacts,units);
}

function renderUnits(q,contacts,units){
  const el=document.getElementById('view-u');
  const filtered=units.filter(u=>{
    if(curLoc!=='ALL'&&u.loc!==curLoc)return false;
    if(q){
      const nm=u.name.toLowerCase().includes(q);
      const cm=contacts.filter(c=>c.unit===u.name).some(c=>c.name.toLowerCase().includes(q)||(c.mobile||'').includes(q));
      if(!nm&&!cm)return false;
    }
    return true;
  });

  if(!filtered.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-txt">कोई unit नहीं मिली</div></div>`;return;}

  el.innerHTML=filtered.map(u=>{
    const cnt=cntOf(u.name);
    const lc=LC[u.loc]||LC['अन्य'];
    const cts=contacts.filter(c=>c.unit===u.name);
    const preview=cts.slice(0,3).map(c=>c.name).join(', ');
    const isOpen=openUnit===u.id;

    const innerHTML=isOpen?`<div class="clist-inner">
      ${cts.length===0?'<div class="empty"><div class="empty-icon">👤</div><div class="empty-txt">कोई contact नहीं</div></div>':''}
      ${cts.map(c=>`<div class="citem">
        ${ava(c.name)}
        <div style="flex:1;min-width:0">
          <div class="cname">${c.name}</div>
          ${c.mobile?`<div class="cnum">📞 ${c.mobile}</div>`:''}
          ${c.notes?`<div class="cnote">💬 ${c.notes}</div>`:''}
        </div>
        ${actBtns(c,'event.stopPropagation();')}
      </div>`).join('')}
      <button class="add-here" onclick="event.stopPropagation();openAdd('${u.name}')">＋ इस Unit में Contact जोड़ें</button>
    </div>`:'';

    return `<div class="ucard${isOpen?' open':''}" onclick="toggleUnit('${u.id}')">
      <div class="ucard-hdr">
        <div class="uicon" style="background:${lc.bg}">🏛️</div>
        <div style="flex:1;min-width:0">
          <div class="uname">${u.name}</div>
          <div class="umeta">
            ${lbadge(u.loc)}
            <span style="color:${cnt>0?lc.text:'#334155'};font-weight:700">${cnt>0?cnt+' contacts':'कोई नहीं'}</span>
          </div>
          ${preview?`<div class="upreview">${preview}${cnt>3?' +'+(cnt-3)+' और':''}</div>`:''}
        </div>
        <div class="uarrow">›</div>
      </div>
      ${innerHTML}
    </div>`;
  }).join('');
}

function renderList(q,contacts,units){
  const el=document.getElementById('view-l');
  const filtered=contacts.filter(c=>{
    if(curLoc!=='ALL'){const u=units.find(u=>u.name===c.unit);if(!u||u.loc!==curLoc)return false;}
    if(q&&!c.name.toLowerCase().includes(q)&&!(c.mobile||'').includes(q)&&!c.unit.toLowerCase().includes(q))return false;
    return true;
  });

  if(!filtered.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-txt">कोई contact नहीं मिला</div></div>`;return;}

  el.innerHTML=`<div style="font-size:10px;color:#334155;margin-bottom:7px;font-weight:700">${filtered.length} contacts</div>`+
    filtered.map(c=>{
      const u=units.find(u=>u.name===c.unit);
      const lc=LC[u?.loc]||LC['अन्य'];
      return `<div class="litem">
        ${ava(c.name)}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <span class="cname">${c.name}</span>
            ${u?lbadge(u.loc):''}
          </div>
          <div style="font-size:10px;color:${lc.text};font-weight:700;margin-top:1px">${c.unit}</div>
          ${c.mobile?`<div class="cnum">📞 ${c.mobile}</div>`:''}
          ${c.notes?`<div class="cnote">💬 ${c.notes}</div>`:''}
        </div>
        ${actBtns(c,'')}
      </div>`;
    }).join('');
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
function setLoc(btn,loc){
  curLoc=loc;
  document.querySelectorAll('#loc-bar .chip').forEach(b=>b.className='chip chip-off');
  btn.className='chip chip-on';
  render();
}
function setView(v){
  curView=v;
  document.getElementById('view-u').style.display=v==='units'?'block':'none';
  document.getElementById('view-l').style.display=v==='list'?'block':'none';
  document.getElementById('tab-u').className='vtab '+(v==='units'?'on':'off');
  document.getElementById('tab-l').className='vtab '+(v==='list'?'on':'off');
}
function toggleUnit(id){openUnit=openUnit===id?null:id;render();}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// ── UNIT SELECT POPULATE ──────────────────────────────────────────────────────
function populateUnitSel(val){
  const sel=document.getElementById('f-unit');
  sel.innerHTML='<option value="">— यूनिट चुनें —</option>';
  ['Jalipa Cantt','Jasai','अन्य'].forEach(loc=>{
    const us=(window.UNITS||[]).filter(u=>u.loc===loc);
    if(!us.length)return;
    const g=document.createElement('optgroup');
    g.label='📍 '+loc;
    us.forEach(u=>{
      const o=document.createElement('option');
      o.value=u.name;o.textContent=u.name;
      if(u.name===val)o.selected=true;
      g.appendChild(o);
    });
    sel.appendChild(g);
  });
}

// ── ADD / EDIT ────────────────────────────────────────────────────────────────
function openAdd(unitName){
  document.getElementById('form-title').textContent='➕ नया Contact जोड़ें';
  document.getElementById('edit-fbid').value='';
  document.getElementById('edit-cid').value='';
  document.getElementById('f-name').value='';
  document.getElementById('f-mob').value='';
  document.getElementById('f-wa').value='';
  document.getElementById('f-note').value='';
  document.getElementById('dup-warn').style.display='none';
  populateUnitSel(unitName||'');
  document.getElementById('modal-form').classList.add('open');
}

function openEdit(cid){
  const c=(window.CONTACTS||[]).find(x=>x.id===cid);
  if(!c)return;
  document.getElementById('form-title').textContent='✏️ Edit: '+c.name;
  document.getElementById('edit-fbid').value=c.fbId||c.id;
  document.getElementById('edit-cid').value=c.id;
  document.getElementById('f-name').value=c.name;
  document.getElementById('f-mob').value=c.mobile||'';
  document.getElementById('f-wa').value=c.wa||'';
  document.getElementById('f-note').value=c.notes||'';
  document.getElementById('dup-warn').style.display='none';
  populateUnitSel(c.unit);
  document.getElementById('modal-form').classList.add('open');
}

async function saveContact(){
  const name=document.getElementById('f-name').value.trim();
  const mob=document.getElementById('f-mob').value.trim();
  const wa=document.getElementById('f-wa').value.trim();
  const unit=document.getElementById('f-unit').value;
  const notes=document.getElementById('f-note').value.trim();
  const fbId=document.getElementById('edit-fbid').value;
  const cid=document.getElementById('edit-cid').value;

  if(!name){toast('❌ नाम लिखें','#ef4444');return;}
  if(!unit){toast('❌ यूनिट चुनें','#ef4444');return;}
  if(mob&&!/^\d{10}$/.test(mob)){toast('❌ 10 अंकों का नंबर चाहिए','#ef4444');return;}

  // Duplicate check
  if(mob){
    const dup=(window.CONTACTS||[]).find(c=>c.mobile===mob&&c.id!==cid);
    if(dup){
      document.getElementById('dup-warn').style.display='block';
      document.getElementById('dup-name').textContent=dup.name+' ('+dup.unit+')';
      return;
    }
  }

  const btn=document.querySelector('#modal-form .save-btn');
  btn.textContent='⏳ सहेज रहे हैं...';btn.disabled=true;

  try{
    const form={name,mobile:mob,wa:wa||mob,unit,notes};
    const newFbId=await window.fbSave(form,fbId||null);

    if(cid){
      // edit
      const i=(window.CONTACTS||[]).findIndex(c=>c.id===cid);
      if(i>=0)window.CONTACTS[i]={...window.CONTACTS[i],...form,fbId:newFbId};
    } else {
      // add
      window.CONTACTS.push({id:newFbId,fbId:newFbId,...form});
    }

    closeModal('modal-form');
    render();
    toast(cid?'✏️ '+name+' अपडेट हुआ':'✅ '+name+' जोड़ा गया','#10b981');
  }catch(e){
    toast('❌ Error: '+e.message,'#ef4444');
  }finally{
    btn.textContent='✅ Firebase में सहेजें';btn.disabled=false;
  }
}

async function delContact(cid){
  const c=(window.CONTACTS||[]).find(x=>x.id===cid);
  if(!c||!confirm('"'+c.name+'" को हटाएं?'))return;
  try{
    await window.fbDelete(c.fbId);
    window.CONTACTS=window.CONTACTS.filter(x=>x.id!==cid);
    render();
    toast('🗑️ '+c.name+' हटाया गया','#f59e0b');
  }catch(e){toast('❌ '+e.message,'#ef4444');}
}

// ── UNIT MANAGER ──────────────────────────────────────────────────────────────
function openUnitMgr(){renderUMgr();document.getElementById('modal-units').classList.add('open');}
function pickULoc(btn){
  newULoc=btn.dataset.loc;
  document.querySelectorAll('#uloc-btns .chip').forEach(b=>b.className='chip chip-off');
  btn.className='chip chip-on';
}
function addUnit(){
  const nm=document.getElementById('new-uname').value.trim();
  if(!nm){toast('❌ नाम लिखें','#ef4444');return;}
  if((window.UNITS||[]).find(u=>u.name.toLowerCase()===nm.toLowerCase())){toast('❌ पहले से मौजूद है','#ef4444');return;}
  window.UNITS.push({id:'u'+Date.now(),name:nm,loc:newULoc});
  document.getElementById('new-uname').value='';
  renderUMgr();render();
  toast('✅ '+nm+' जोड़ी गई','#10b981');
}
function delUnit(id,name){
  const cnt=cntOf(name);
  if(cnt>0){toast('❌ पहले '+cnt+' contacts move करें','#ef4444');return;}
  if(!confirm('"'+name+'" हटाएं?'))return;
  window.UNITS=window.UNITS.filter(u=>u.id!==id);
  renderUMgr();render();
  toast('🗑️ '+name+' हटाई गई','#f59e0b');
}
function renderUMgr(){
  const el=document.getElementById('umgr-list');
  el.innerHTML=['Jalipa Cantt','Jasai','अन्य'].map(loc=>{
    const us=(window.UNITS||[]).filter(u=>u.loc===loc);
    if(!us.length)return'';
    const lc=LC[loc];
    return `<div style="margin-bottom:11px">
      <div style="background:${lc.bg};color:${lc.text};padding:2px 9px;border-radius:11px;font-size:9px;font-weight:800;display:inline-block;margin-bottom:6px">📍 ${loc}</div>
      ${us.map(u=>`<div style="display:flex;align-items:center;gap:7px;padding:7px 10px;background:#080e1c;border-radius:8px;margin-bottom:4px;border:1px solid #1e293b">
        <div style="flex:1">
          <div style="font-weight:800;font-size:12px">${u.name}</div>
          <div style="font-size:9px;color:${cntOf(u.name)>0?lc.text:'#334155'};margin-top:1px">${cntOf(u.name)>0?cntOf(u.name)+' contacts':'कोई नहीं'}</div>
        </div>
        <button onclick="delUnit('${u.id}','${u.name}')" style="background:#1a0505;color:#f87171;border:1px solid #7f1d1d;border-radius:6px;padding:4px 8px;font-size:10px;cursor:pointer;font-family:inherit">🗑️</button>
      </div>`).join('')}
    </div>`;
  }).join('');
}

// ── LOAD CONTACTS (called from refresh button) ────────────────────────────────
async function loadContacts(){
  toast('🔄 Refresh हो रहा है...','#6366f1');
  // re-trigger by reloading page is simplest; or re-fetch:
  location.reload();
}
</script>
