<script>
const UNITS=[
  {id:'j01',name:'17 Guards',addr:'जालीपा कैंट'},{id:'j02',name:'MES',addr:'जालीपा कैंट'},
  {id:'j03',name:'17 MAC',addr:'जालीपा कैंट'},{id:'j04',name:'177 MH',addr:'जालीपा कैंट'},
  {id:'j05',name:'Station HQ',addr:'जालीपा कैंट'},{id:'j06',name:'NCC',addr:'जालीपा कैंट'},
  {id:'j07',name:'318 Workshop',addr:'जालीपा कैंट'},{id:'j08',name:'74 Armd Regt',addr:'जालीपा कैंट'},
  {id:'j09',name:'60 Armd Regt',addr:'जालीपा कैंट'},{id:'j10',name:'18 MAC',addr:'जालीपा कैंट'},
  {id:'j11',name:'5 MAC',addr:'जालीपा कैंट'},{id:'j12',name:'414 Engr',addr:'जालीपा कैंट'},
  {id:'j13',name:'6340 DBS',addr:'जालीपा कैंट'},{id:'j14',name:'6340 (74)',addr:'जालीपा कैंट'},
  {id:'j15',name:'32 ELent',addr:'जालीपा कैंट'},{id:'j16',name:'110 Brigade',addr:'जालीपा कैंट'},
  {id:'j17',name:'110 Signals',addr:'जालीपा कैंट'},{id:'j18',name:'694 Tatra',addr:'जालीपा कैंट'},
  {id:'j19',name:'625 Tatra',addr:'जालीपा कैंट'},{id:'j20',name:'KV Jalipa',addr:'जालीपा कैंट'},
  {id:'j21',name:'MCO',addr:'जालीपा कैंट'},
  {id:'z01',name:'747 Armd Regt',addr:'जसाई, जैसलमेर'},{id:'z02',name:'2 Lancer',addr:'जसाई, जैसलमेर'},
  {id:'z03',name:'25 Ammo Depot',addr:'जसाई, जैसलमेर'},{id:'z04',name:'496 Depot',addr:'जसाई, जैसलमेर'},
];
const STAGES={
  received:{e:'📋',hi:'ऑर्डर मिला',c:'#6366f1'},
  confirmed:{e:'✅',hi:'Confirm हुआ',c:'#f59e0b'},
  processing:{e:'⚙️',hi:'तैयारी हो रही',c:'#3b82f6'},
  packed:{e:'📦',hi:'Pack हो गया',c:'#8b5cf6'},
  dispatched:{e:'🚚',hi:'निकल गया',c:'#f97316'},
  delivered:{e:'🎯',hi:'पहुंच गया ✓',c:'#10b981'},
};
let _contacts={},_orders=[],_editUnit='',_editIdx=-1;
let _customUnits=[]; // Firebase से load होंगी

// सभी units — hardcoded + custom
function getAllUnits(){
  return [...UNITS,..._customUnits];
}

async function loadAll(){
  try{
    // Contacts load करो
    const cs=await window._getDocs(window._col(window._db,'fvhq_contacts'));
    cs.forEach(d=>{_contacts[d.id]=d.data().list||[];});
    // Orders load करो
    const os=await window._getDocs(window._col(window._db,'vbe_orders'));
    _orders=[];os.forEach(d=>{_orders.push({id:d.id,...d.data()});});
    // Custom Units load करो — नई units जो index.html से add हुई हैं
    try{
      const cu=await window._getDocs(window._col(window._db,'fvhq_custom_units'));
      _customUnits=[];
      cu.forEach(d=>{
        const u=d.data();
        // Duplicate check — same id पहले से नहीं हो
        if(!UNITS.find(x=>x.id===u.id)){
          _customUnits.push({id:u.id,name:u.name,addr:u.addr||u.loc||'अन्य',custom:true});
        }
      });
    }catch(e){ console.warn('custom units load:',e); }
    renderAll();
    notif('✅ सब load हो गया'+(  _customUnits.length?' · '+_customUnits.length+' custom units':''),'ok');
  }catch(e){
    console.error(e);
    document.getElementById('body').innerHTML='<div class="loading" style="color:#ef4444">❌ Load नहीं हुआ<br><br><button onclick="loadAll()" style="background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:8px;padding:8px 16px;cursor:pointer">🔄 Retry</button></div>';
  }
}

function getUnitOrders(uid,uname){
  const n=uname.toLowerCase();
  // Unit name keywords map — customer field se match karo
  const keyMap={
    'j01':['17 guard','17guard','22 guard','22guard'],
    'j02':['mes','military engineer'],
    'j03':['17 mac','17mac'],
    'j04':['177 mh','177mh','military hospital','mil hosp','177 mil'],
    'j05':['station hq','stn hq','station hq'],
    'j06':['ncc'],
    'j07':['318 workshop','318workshop','318 wksp','318wksp'],
    'j08':['74 armd','74armd','74 arm'],
    'j09':['60 armd','60armd','60 arm'],
    'j10':['18 mac','18mac'],
    'j11':['5 mac','5mac'],
    'j12':['414 engr','414engr','414 engineer'],
    'j13':['6340 dbs','6340dbs'],
    'j14':['6340','74 ws','74ws'],
    'j15':['32 elent','32elent','32 el'],
    'j16':['110 brigade','110bde','110 bde','armd bde'],
    'j17':['110 signals','110 sig'],
    'j18':['694 tatra','694tatra'],
    'j19':['625 tatra','625tatra','625 tpt'],
    'j20':['kv jalipa','kendriya vidyalaya','kv sch'],
    'j21':['mco'],
    'z01':['747 armd','747armd'],
    'z02':['2 lancer','2lancer'],
    'z03':['25 ammo','25ammo'],
    'z04':['496 depot','496depot'],
  };
  const keys=keyMap[uid]||[];
  return _orders.filter(o=>{
    const c=(o.customer||o.party||o.unitName||'').toLowerCase();
    if(o.unitId===uid) return true;
    if(c.includes(n)) return true;
    return keys.some(k=>c.includes(k));
  });
}

function renderAll(){
  const q=(document.getElementById('srch').value||'').toLowerCase().trim();
  let tOver=0,tPend=0,tCts=0,tUnits=0;
  let items=getAllUnits().map(u=>{
    const cts=_contacts[u.id]||[];
    const orders=getUnitOrders(u.id,u.name);
    const active=orders.filter(o=>o.stage!=='delivered'&&new Date(o.deadline)>=new Date());
    const over=orders.filter(o=>o.stage!=='delivered'&&new Date(o.deadline)<new Date());
    const done=orders.filter(o=>o.stage==='delivered');
    const matchU=u.name.toLowerCase().includes(q)||u.addr.toLowerCase().includes(q);
    const matchC=cts.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.phone||'').includes(q)||(c.role||'').toLowerCase().includes(q));
    if(q&&!matchU&&!matchC.length) return null;
    const showCts=(q&&matchC.length)?matchC:cts;
    const score=over.length*3+active.length;
    tOver+=over.length;tPend+=active.length+over.length;tCts+=cts.length;
    if(orders.length>0||cts.length>0) tUnits++;
    return {u,cts,showCts,orders,active,over,done,score};
  }).filter(Boolean);
  if(!q) items.sort((a,b)=>b.score-a.score);
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="sv" style="color:#ef4444">'+tOver+'</div><div class="sl">Overdue</div></div>'+
    '<div class="stat"><div class="sv" style="color:#6366f1">'+tPend+'</div><div class="sl">Pending</div></div>'+
    '<div class="stat"><div class="sv" style="color:#10b981">'+tUnits+'</div><div class="sl">Active Units</div></div>'+
    '<div class="stat"><div class="sv" style="color:#f59e0b">'+tCts+'</div><div class="sl">Contacts</div></div>';
  document.getElementById('sort-hint').textContent=q?'':'⬆ सबसे ज्यादा pending काम वाली unit सबसे ऊपर';
  if(!items.length){document.getElementById('body').innerHTML='<div class="loading">🔍 "'+q+'" — कोई result नहीं</div>';return;}
  document.getElementById('body').innerHTML=items.map(x=>unitCard(x)).join('');
}

function unitCard({u,cts,showCts,orders,active,over,done}){
  const hasO=over.length>0,hasA=active.length>0;
  const autoOpen=hasO||hasA;
  const cls=hasO?'overdue':hasA?'active-ord':'';
  const icon=hasO?'🔴':hasA?'🟡':cts.length>0?'🟢':'⚫';
  const customBadge=u.custom?'<span style="font-size:9px;background:#312e81;color:#a5b4fc;padding:1px 6px;border-radius:4px;font-weight:800;margin-left:4px">★ Custom</span>':'';
  let badges='';
  if(over.length) badges+='<span class="bo">⚠ '+over.length+' Overdue</span>';
  if(active.length) badges+='<span class="ba">🔵 '+active.length+' Active</span>';
  if(done.length) badges+='<span class="bd">✓ '+done.length+' Done</span>';
  if(cts.length) badges+='<span class="bc">👤 '+cts.length+'</span>';
  const pending=[...over,...active];
  let ordHtml='';
  if(pending.length){
    ordHtml='<div class="ord-section"><div class="sec-title">📦 PENDING ORDERS ('+pending.length+')</div>'+
    pending.slice(0,6).map(o=>{
      const st=STAGES[o.stage]||{e:'?',hi:o.stage,c:'#475569'};
      const dl=new Date(o.deadline);
      const isO=dl<new Date()&&o.stage!=='delivered';
      const dlS=dl.toLocaleString('hi-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      return '<div class="ord-row"><div style="flex:1;min-width:0"><div class="ord-item">'+
        (o.item||'—')+(o.qty?' ('+o.qty+')':'')+'</div><div class="ord-meta">'+
        (o.staff?'👤 '+o.staff:'')+'</div></div><div style="text-align:right">'+
        '<div class="stage-pill" style="background:'+st.c+'22;color:'+st.c+'">'+st.e+' '+st.hi+'</div>'+
        '<div class="ord-dl '+( isO?'over':'ok')+'">'+( isO?'⚠ ':'')+dlS+'</div></div></div>';
    }).join('')+
    (pending.length>6?'<div style="font-size:10px;color:#475569;text-align:center;padding:4px">+'+(pending.length-6)+' और</div>':'')+
    '</div>';
  }
  const un=u.name.replace(/'/g,"\\'");
  const ctsHtml=showCts.length===0?'<div class="empty-ct">कोई contact नहीं — Add करें</div>':
    showCts.map(c=>{
      const ri=cts.findIndex(x=>x.name===c.name&&x.phone===c.phone);
      return '<div class="ct-row"><div class="ct-left"><div class="ct-name">'+
        (c.name||'—')+'</div>'+(c.role?'<div class="ct-role">'+c.role+'</div>':'')+
        (c.phone?'<div class="ct-ph"><a href="tel:'+c.phone+'" style="color:#10b981;text-decoration:none">'+c.phone+'</a></div>':'')+
        (c.note?'<div style="font-size:10px;color:#475569;margin-top:1px">'+c.note+'</div>':'')+
        '</div><div class="ct-actions">'+
        (pending.length&&c.phone?'<button class="bsum" onclick="sendSummary(\''+u.id+'\',\''+un+'\','+ri+')">📊</button>':'')+
        (c.phone?'<button class="bwa" onclick="window.open(\'https://wa.me/91'+c.phone+'\')">WA</button>':'')+
        (c.phone?'<button class="bcall" onclick="window.open(\'tel:'+c.phone+'\')">📞</button>':'')+
        '<button class="bedit" onclick="openModal(\''+u.id+'\',\''+(c.name||'').replace(/\'/g,"\\\\\\'")+'\',\''+(c.role||'')+'\',\''+(c.phone||'')+'\','+ri+')">✏</button>'+
        '<button class="bdel" onclick="delContact(\''+u.id+'\','+ri+')">🗑</button>'+
        '</div></div>';
    }).join('');
  return '<div class="uc '+cls+'" id="uc-'+u.id+'">'+
    '<div class="uc-hdr" onclick="toggle(\''+u.id+'\')">'+
    '<div class="uc-icon" style="background:'+(hasO?'#7f1d1d22':hasA?'#312e8122':'#1e293b')+'">'+icon+'</div>'+
    '<div class="uc-info"><div class="uc-name">'+u.name+customBadge+'</div><div class="uc-addr">'+u.addr+'</div>'+
    (badges?'<div class="uc-badges">'+badges+'</div>':'')+'</div>'+
    '<span class="arr'+(autoOpen?' open':'')+'" id="arr-'+u.id+'">▶</span></div>'+
    '<div class="ub'+(autoOpen?' open':'')+'" id="ub-'+u.id+'">'+ordHtml+
    '<div class="ct-section"><div class="sec-title">👤 CONTACTS ('+cts.length+')</div>'+ctsHtml+
    '<button class="add-btn" onclick="openModal(\''+u.id+'\',\'\',\'\',\'\',-1)">+ Contact Add करें</button></div></div></div>';
}

function toggle(id){
  const ub=document.getElementById('ub-'+id),ar=document.getElementById('arr-'+id);
  if(!ub)return;const o=ub.classList.toggle('open');if(ar)ar.classList.toggle('open',o);
}

function sendSummary(uid,uname,idx){
  const c=(_contacts[uid]||[])[idx];
  if(!c||!c.phone){notif('❌ Phone नहीं है','err');return;}
  const pending=getUnitOrders(uid,uname).filter(o=>o.stage!=='delivered');
  if(!pending.length){notif('कोई pending order नहीं','info');return;}
  const now=new Date();
  let lines=['🙏 नमस्ते '+c.name+(c.role?' ('+c.role+')':'')+'!','',
    '📍 *'+uname+'* — Pending Orders की जानकारी:',
    '📅 '+now.toLocaleString('hi-IN',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'}),''];
  pending.forEach((o,i)=>{
    const st=STAGES[o.stage]||{e:'?',hi:o.stage};
    const dl=new Date(o.deadline);const isO=dl<now;
    const dlS=dl.toLocaleString('hi-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    lines.push((i+1)+'. *'+(o.item||'—')+(o.qty?' ('+o.qty+')':'')+'*');
    lines.push('   '+st.e+' Status: *'+st.hi+'*');
    lines.push('   📅 Deadline: '+dlS+(isO?' ⚠ *Overdue*':'')); 
    if(o.staff) lines.push('   👤 Staff: *'+o.staff+'*');
    lines.push('');
  });
  lines.push('—');lines.push('Vande Bharat Enterprises | Jalipa Cantt, Barmer');
  window.open('https://wa.me/91'+c.phone+'?text='+encodeURIComponent(lines.join('\n')));
}

function openModal(uid,name,role,phone,idx){
  _editUnit=uid;_editIdx=idx;
  document.getElementById('mtitle').textContent=idx===-1?'+ Contact Add करें':'✏ Contact Edit करें';
  document.getElementById('m-name').value=name||'';
  document.getElementById('m-role').value=role||'';
  document.getElementById('m-phone').value=phone||'';
  document.getElementById('m-note').value='';
  document.getElementById('m-unit').innerHTML=getAllUnits().map(u=>'<option value="'+u.id+'"'+(u.id===uid?' selected':'')+'>'+u.name+(u.custom?' ★':'')+'</option>').join('');
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('m-name').focus(),200);
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

async function saveContact(){
  const uid=document.getElementById('m-unit').value;
  const name=document.getElementById('m-name').value.trim();
  const role=document.getElementById('m-role').value.trim();
  const phone=document.getElementById('m-phone').value.trim();
  const note=document.getElementById('m-note').value.trim();
  if(!name){notif('❌ नाम जरूरी है','err');return;}
  if(!phone||phone.length<10){notif('❌ Phone 10 digit चाहिए','err');return;}
  const list=[...(_contacts[uid]||[])];
  const entry={name,role,phone,note};
  if(_editIdx>=0) list[_editIdx]=entry; else list.push(entry);
  try{
    await window._setDoc(window._doc(window._db,'fvhq_contacts',uid),{list});
    _contacts[uid]=list;closeModal();renderAll();notif('✅ Save हो गया','ok');
  }catch(e){notif('❌ Save नहीं हुआ','err');}
}

async function delContact(uid,idx){
  if(!confirm('यह contact delete करें?')) return;
  const list=[...(_contacts[uid]||[])];list.splice(idx,1);
  try{
    await window._setDoc(window._doc(window._db,'fvhq_contacts',uid),{list});
    _contacts[uid]=list;renderAll();notif('🗑 Deleted','info');
  }catch(e){notif('❌ Delete नहीं हुआ','err');}
}

function notif(msg,type='info'){
  const el=document.getElementById('notif');
  el.textContent=msg;el.className='notif show '+type;
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ══ NEW UNIT ADD ══
function openAddUnitModal(){
  document.getElementById('nu-name').value='';
  document.getElementById('nu-note').value='';
  document.getElementById('nu-loc').value='jalipa';
  document.getElementById('nu-err').style.display='none';
  const m=document.getElementById('add-unit-modal');
  m.style.display='flex';
  setTimeout(()=>document.getElementById('nu-name').focus(),200);
}
function closeAddUnitModal(){
  document.getElementById('add-unit-modal').style.display='none';
}

async function saveNewUnit(){
  const name=document.getElementById('nu-name').value.trim();
  const loc=document.getElementById('nu-loc').value;
  const note=document.getElementById('nu-note').value.trim();
  const errEl=document.getElementById('nu-err');

  if(!name){
    errEl.textContent='❌ Unit का नाम जरूरी है';
    errEl.style.display='block'; return;
  }
  // Duplicate check
  if(getAllUnits().some(u=>u.name.toLowerCase()===name.toLowerCase())){
    errEl.textContent='⚠️ यह Unit पहले से है — '+name;
    errEl.style.display='block'; return;
  }
  errEl.style.display='none';

  const id='cu_'+Date.now().toString(36).toUpperCase();
  const addr=loc==='jalipa'?'जालीपा कैंट, बाड़मेर':loc==='jaisalmer'?'जसाई, जैसलमेर':'अन्य';
  const newUnit={id,name,loc,addr,note,createdAt:new Date().toISOString()};

  try{
    await window._setDoc(window._doc(window._db,'fvhq_custom_units',id),newUnit);
    _customUnits.push({id,name,addr,custom:true});
    // Contact list में भी add करो (खाली)
    _contacts[id]=[];
    closeAddUnitModal();
    renderAll();
    notif('✅ '+name+' add हो गई!','ok');
    // नई unit को scroll करके दिखाओ
    setTimeout(()=>{
      const el=document.getElementById('uc-'+id);
      if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
    },400);
  }catch(e){
    errEl.textContent='❌ Save नहीं हुआ — Internet check करो';
    errEl.style.display='block';
    console.error(e);
  }
}
</script>
