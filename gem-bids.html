<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>GeM Bid Docs — VBE</title>
<style>
/* ============================================================
   APP UI STYLES  (hidden on print)
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
     background:#050a14;color:#e2e8f0;min-height:100vh;-webkit-tap-highlight-color:transparent}

/* --- header --- */
#app-shell{max-width:480px;margin:0 auto;padding-bottom:136px}
.gh{display:flex;align-items:center;gap:12px;padding:14px 16px;
    background:#0d1526;border-bottom:1px solid #1e3a5f;
    position:sticky;top:0;z-index:50}
.gh-back{color:#f59e0b;text-decoration:none;font-size:22px;padding:2px 6px 2px 0;line-height:1}
.gh-info{flex:1}
.gh-title{font-size:16px;font-weight:700;color:#f1f5f9}
.gh-sub{font-size:10px;color:#475569;margin-top:1px}
.gh-editbtn{background:none;border:1px solid #1e3a5f;border-radius:8px;
            color:#94a3b8;padding:6px 11px;font-size:12px;cursor:pointer;
            touch-action:manipulation}
.gh-editbtn:active{border-color:#f59e0b;color:#f59e0b}

/* --- labels --- */
.slbl{padding:14px 16px 6px;font-size:10.5px;font-weight:700;
      letter-spacing:.09em;text-transform:uppercase;color:#475569}

/* --- firm grid --- */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 4px}
.fcard{border:2px solid #1e3a5f;border-radius:12px;padding:11px 10px;
       cursor:pointer;background:#0d1526;touch-action:manipulation;
       position:relative;overflow:hidden;transition:border-color .2s}
.fcard::before{content:'';position:absolute;inset:0;
               background:var(--fprim);opacity:0;
               transition:opacity .2s;pointer-events:none;border-radius:10px}
.fcard.sel{border-color:var(--fgold)}
.fcard.sel::before{opacity:.09}
.fcard-badge{width:38px;height:38px;border-radius:50%;display:flex;
             align-items:center;justify-content:center;
             font-weight:800;font-size:11px;margin-bottom:7px;
             border:2px solid var(--fgold);background:var(--fprim);color:var(--fgold)}
.fcard-name{font-size:11.5px;font-weight:700;color:#e2e8f0;line-height:1.3}
.fcard-prop{font-size:10px;color:#64748b;margin-top:2px;line-height:1.3}
.fcard-miss{font-size:9.5px;color:#f59e0b;margin-top:5px;display:none;line-height:1.3}
.fcard.sel .fcard-miss{display:block}

/* --- warn --- */
.wbar{margin:6px 16px;padding:9px 13px;background:rgba(124,45,18,.13);
      border:1px solid rgba(245,158,11,.35);border-radius:8px;
      font-size:11.5px;color:#fbbf24;display:none;line-height:1.4}
.wbar.on{display:block}

/* --- preset / doc list --- */
.prow{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 8px}
.pset{padding:6px 13px;border-radius:20px;border:1px solid #1e3a5f;
      background:transparent;color:#94a3b8;font-size:11px;cursor:pointer;
      touch-action:manipulation;transition:background .15s,color .15s}
.pset:active{background:#1e3a5f;color:#e2e8f0}
.dlist{padding:0 16px 4px;display:grid;gap:6px}
.ditem{display:flex;align-items:center;gap:10px;padding:10px 12px;
       background:#0d1526;border:1px solid #1e3a5f;border-radius:10px;
       cursor:pointer;touch-action:manipulation}
.ditem input[type=checkbox]{accent-color:#f59e0b;width:17px;height:17px;
                             cursor:pointer;flex-shrink:0}
.ditem-ttl{font-size:13px;font-weight:600;color:#e2e8f0}
.ditem-sub{font-size:10px;color:#64748b}

/* --- inputs --- */
.igrid{padding:0 16px;display:grid;gap:10px}
.ilbl{font-size:10.5px;font-weight:700;color:#64748b;text-transform:uppercase;
      letter-spacing:.04em;margin-bottom:4px;display:block}
.inp{background:#0d1526;border:1px solid #1e3a5f;border-radius:8px;
     padding:10px 12px;color:#e2e8f0;font-size:14px;width:100%;
     outline:none;-webkit-appearance:none;transition:border-color .15s}
.inp:focus{border-color:rgba(245,158,11,.4);box-shadow:0 0 0 2px rgba(245,158,11,.1)}
.inp::placeholder{color:#334155}
.irow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ibox{background:rgba(13,21,38,.5);border:1px solid #1e3a5f;
      border-radius:10px;padding:12px;margin-top:4px}
.ibox-hdr{font-size:10.5px;font-weight:700;color:#94a3b8;
          text-transform:uppercase;letter-spacing:.05em;
          margin-bottom:10px;display:flex;align-items:center;gap:8px}
.tog{width:34px;height:20px;border-radius:10px;border:none;
     background:#0a1020;position:relative;cursor:pointer;flex-shrink:0;
     transition:background .2s;touch-action:manipulation;outline:none}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;
            border-radius:50%;background:#fff;transition:left .2s;
            box-shadow:0 1px 3px rgba(0,0,0,.25)}
.tog.on{background:#f59e0b}
.tog.on::after{left:17px}
#past-fields{display:none;margin-top:10px}

/* --- action bar --- */
#gem-actions{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
             width:100%;max-width:480px;padding:10px 16px 16px;
             background:linear-gradient(transparent,#050a14 30%);
             z-index:40;display:flex;flex-direction:column;gap:7px}
.btn-pri{padding:14px;border-radius:12px;font-size:15px;font-weight:700;
         cursor:pointer;border:none;touch-action:manipulation;
         background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;
         transition:opacity .15s}
.btn-pri:active{opacity:.85}
.btn-sec{background:#0d1526;border:1px solid #1e3a5f;color:#94a3b8;
         padding:10px;border-radius:10px;font-size:13px;font-weight:600;
         cursor:pointer;touch-action:manipulation;width:100%;
         transition:border-color .15s,color .15s}
.btn-sec.on{border-color:#f59e0b;color:#f59e0b}

/* --- preview area --- */
#preview-area{display:none;padding:12px 16px 0;max-width:480px;margin:0 auto}
#preview-area.on{display:block}
.pgwrap{background:#fff;border-radius:4px;overflow:hidden;
        margin-bottom:14px;box-shadow:0 4px 32px rgba(0,0,0,.7)}

/* --- edit modal --- */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:60;
          display:none;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal-sheet{background:#0d1526;border-radius:20px 20px 0 0;
             padding:20px 16px 24px;max-width:480px;width:100%;
             max-height:92vh;overflow-y:auto;border-top:1px solid #1e3a5f}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-ttl{font-size:15px;font-weight:700;color:#f1f5f9}
.modal-x{font-size:22px;color:#64748b;cursor:pointer;padding:4px;touch-action:manipulation}
.chkrow{display:flex;align-items:center;gap:8px;font-size:13px;
        color:#94a3b8;cursor:pointer;touch-action:manipulation;padding:2px 0}
.chkrow input{accent-color:#f59e0b;width:16px;height:16px;cursor:pointer}
.savebtn{width:100%;margin-top:16px;padding:13px;
         background:linear-gradient(135deg,#f59e0b,#d97706);
         border:none;border-radius:10px;font-weight:700;font-size:14px;
         cursor:pointer;touch-action:manipulation;color:#000}

/* ============================================================
   PRINT — show ONLY the preview pages, reset all transforms
   ============================================================ */
@media print{
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  body{background:#fff !important}
  body > *{display:none !important}
  #preview-area{display:block !important;padding:0 !important;
                max-width:none !important;margin:0 !important}
  .pgwrap{margin:0 !important;box-shadow:none !important;
          border-radius:0 !important;overflow:visible !important;
          height:297mm !important}
  .doc-page{transform:none !important;width:210mm !important;
            height:297mm !important;page-break-after:always !important;
            break-after:page !important}
  #gem-actions{display:none !important}
  @page{size:A4;margin:0}
}

/* ============================================================
   DOCUMENT PAGE STYLES  (print-quality letterhead)
   ============================================================ */
.doc-page{
  width:210mm;height:297mm;position:relative;
  font-family:Georgia,Cambria,'Times New Roman',Times,serif;
  background:#fff;color:#111;overflow:hidden;
  page-break-after:always;break-after:page;
}

/* Decorative borders */
.doc-ob{position:absolute;inset:8mm;
        border:2.5px solid var(--fprim);pointer-events:none;z-index:2}
.doc-ib{position:absolute;inset:11mm;
        border:0.75pt solid var(--fgold);pointer-events:none;z-index:2}

/* Four corner diamonds */
.doc-dm{position:absolute;width:10px;height:10px;
        background:var(--fgold);transform:rotate(45deg);z-index:3}
.doc-dm.tl{top:7.2mm;left:7.2mm}
.doc-dm.tr{top:7.2mm;right:7.2mm}
.doc-dm.bl{bottom:7.2mm;left:7.2mm}
.doc-dm.br{bottom:7.2mm;right:7.2mm}

/* Main content container */
.doc-ct{position:absolute;inset:13.5mm;
        display:flex;flex-direction:column;overflow:hidden}

/* ---- LETTERHEAD HEADER ---- */
.doc-hdr-bg{
  background:var(--fprim);opacity:.04;
  position:absolute;left:0;right:0;top:0;height:62mm;
  pointer-events:none;z-index:0;
}
.doc-hdr{position:relative;z-index:1;flex-shrink:0}

.doc-seal{
  width:68px;height:68px;border-radius:50%;
  background:var(--fprim);border:2.5px solid var(--fgold);
  display:flex;align-items:center;justify-content:center;
  color:var(--fgold);font-weight:900;font-size:18px;
  margin:0 auto 7px;letter-spacing:.5px;
  font-family:Georgia,serif;
  box-shadow:0 2px 10px rgba(0,0,0,.2),0 0 0 4px rgba(255,255,255,.8),
             0 0 0 5px var(--fgold);
}
.doc-fname{
  text-align:center;font-size:15.5pt;font-weight:bold;
  color:var(--fprim);letter-spacing:.6px;line-height:1.2;margin-bottom:3px;
}
.doc-tline{
  text-align:center;font-size:6.5pt;text-transform:uppercase;
  letter-spacing:.15em;color:var(--fgold);margin-bottom:5px;
  font-family:Georgia,serif;
}
/* Gold divider */
.doc-div{display:flex;align-items:center;gap:6px;margin:4px 0;position:relative;z-index:1}
.doc-div::before,.doc-div::after{
  content:'';flex:1;height:1px;background:var(--fgold);opacity:.7}
.doc-dmd{
  width:8px;height:8px;background:var(--fgold);
  transform:rotate(45deg);display:inline-block;flex-shrink:0}
.doc-ids{
  text-align:center;font-size:6.5pt;color:#444;
  letter-spacing:.03em;line-height:1.6;margin-bottom:2px;
  font-family:'Times New Roman',Times,serif;
}
.doc-addr{
  text-align:center;font-size:6.5pt;color:#555;line-height:1.55;
  font-family:'Times New Roman',Times,serif;
}

/* Bid ref strip */
.doc-strip{
  background:#f6f6f6;border-top:1px solid #e2e2e2;border-bottom:1px solid #e2e2e2;
  padding:5px 12px;margin:6px 0;font-size:7.5pt;color:#333;
  text-align:center;line-height:1.7;flex-shrink:0;
  font-family:Georgia,serif;
}
.doc-strip b{color:var(--fprim);font-weight:bold}

/* ---- DOCUMENT BODY ---- */
.doc-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;position:relative;z-index:1}
.doc-ey{
  font-size:6.5pt;text-transform:uppercase;letter-spacing:.14em;
  color:var(--fgold);margin-bottom:3px;font-family:Georgia,serif;
}
.doc-ttl{
  font-size:13pt;font-weight:bold;text-transform:uppercase;
  color:var(--fprim);letter-spacing:.04em;margin-bottom:5px;line-height:1.25;
}
.doc-to{
  font-size:8pt;color:#333;margin-bottom:6px;
  border-left:3px solid var(--fgold);padding-left:9px;line-height:1.55;
  background:rgba(0,0,0,.015);padding:5px 5px 5px 9px;
  border-radius:0 3px 3px 0;
}
.doc-intro{
  font-size:8.5pt;font-style:italic;color:#444;
  margin-bottom:8px;line-height:1.6;
}
.doc-cls{list-style:none;display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.doc-cl{display:flex;gap:8px;font-size:8pt;line-height:1.6;color:#222;align-items:flex-start}
.doc-cn{
  width:20px;height:20px;border-radius:50%;
  background:var(--fprim);color:#fff;font-size:7pt;font-weight:bold;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.doc-ctxt{flex:1}
.doc-note{
  background:#fffdf0;border:1px solid var(--fgold);
  border-left:3px solid var(--fgold);
  border-radius:0 3px 3px 0;
  padding:6px 10px;font-size:7pt;color:#555;
  font-style:italic;margin:5px 0;line-height:1.55;
}
.doc-note b{color:var(--fprim);font-style:normal}
.doc-closing{
  font-size:8pt;font-style:italic;color:#444;
  margin-top:5px;line-height:1.5;
  border-top:1px dashed #ddd;padding-top:5px;
}

/* Signature block */
.doc-sig{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-top:auto;padding-top:8px;border-top:1px solid #ccc;flex-shrink:0;
}
.doc-sig-l{font-size:8pt;color:#555;line-height:1.8;font-family:'Times New Roman',serif}
.doc-sig-r{text-align:right}
.doc-sig-for{font-size:8pt;color:#555;margin-bottom:24px;font-style:italic}
.doc-sig-name{
  border-top:1px solid #222;padding-top:4px;
  font-size:9.5pt;font-weight:bold;color:#111;letter-spacing:.5px;
}
.doc-sig-sub{font-size:7.5pt;color:#555;margin-top:2px}

/* Footer */
.doc-ft{
  border-top:1px solid var(--fgold);padding-top:3px;margin-top:6px;
  font-size:6pt;color:#888;display:flex;justify-content:space-between;
  align-items:center;flex-shrink:0;letter-spacing:.02em;
}

/* ---- COVER PAGE extras ---- */
.cov-box{
  border:2px solid var(--fprim);border-radius:4px;
  padding:12px 16px;margin:10px 0;
  background:rgba(0,0,0,.015);
}
.cov-row{
  display:flex;gap:10px;padding:5px 0;
  font-size:8.5pt;color:#333;border-bottom:1px solid #eee;line-height:1.5;
}
.cov-row:last-child{border:none}
.cov-lbl{font-weight:bold;color:var(--fprim);min-width:100px;
         flex-shrink:0;font-size:8pt}

/* ---- PROFILE tables ---- */
.ptbl{width:100%;border-collapse:collapse;font-size:8pt;margin:7px 0}
.ptbl td{padding:5px 9px;border:1px solid #ddd;vertical-align:top;line-height:1.5}
.ptbl td:first-child{font-weight:bold;color:var(--fprim);background:#f8f8f8;width:36%}
.pidx{width:100%;border-collapse:collapse;font-size:8pt;margin-top:8px}
.pidx th{background:var(--fprim);color:#fff;padding:5px 9px;
         text-align:left;font-weight:bold;font-size:7.5pt}
.pidx td{padding:5px 9px;border:1px solid #ddd;vertical-align:top;line-height:1.45}
.pidx tr:nth-child(even) td{background:#f9f9f9}
.pidx td:first-child{text-align:center;font-weight:bold;
                     color:var(--fprim);width:10%}

/* ---- EMD table ---- */
.etbl{width:100%;border-collapse:collapse;font-size:8.5pt;margin:6px 0}
.etbl th{background:var(--fprim);color:#fff;padding:6px 11px;
         text-align:left;font-weight:bold;font-size:8pt}
.etbl td{padding:6px 11px;border:1px solid #ddd}

/* ============================================================
   5 FIRM VISUAL THEMES — each firm has a distinct document identity
   ============================================================ */

/* --- SH (index 0): Classic — default style, no overrides needed --- */

/* --- VBE (index 1): Navy Block — square corners, no inner border, bold sans --- */
.th-vbe .doc-ob{border-radius:0}
.th-vbe .doc-ib{display:none}
.th-vbe .doc-dm{border-radius:0;transform:none;width:16px;height:16px}
.th-vbe .doc-dm.tl{top:6.8mm;left:6.8mm}
.th-vbe .doc-dm.tr{top:6.8mm;right:6.8mm}
.th-vbe .doc-dm.bl{bottom:6.8mm;left:6.8mm}
.th-vbe .doc-dm.br{bottom:6.8mm;right:6.8mm}
.th-vbe .doc-seal{border-radius:6px;font-size:13px}
.th-vbe .doc-fname{font-family:'Arial Black',Arial,Helvetica,sans-serif;
                   letter-spacing:.9px;font-size:14pt}
.th-vbe .doc-tline{font-family:Arial,Helvetica,sans-serif}
.th-vbe .doc-cn{border-radius:3px;font-family:Arial,Helvetica,sans-serif}
.th-vbe .doc-ttl{font-family:'Arial Black',Arial,Helvetica,sans-serif;letter-spacing:.5px}
.th-vbe .doc-strip{border-top:2px solid var(--fprim);border-bottom:2px solid var(--fprim);
                   background:#f4f6fb}

/* --- BI (index 2): Heritage — double border, hexagon seal, small-roman clauses --- */
.th-bi .doc-ob{border-width:2.5px;border-radius:0}
.th-bi .doc-ib{inset:11mm;border-width:1pt;border-radius:0;border-style:double}
.th-bi .doc-dm{transform:none;border-radius:0;width:11px;height:11px}
.th-bi .doc-seal{
  clip-path:polygon(50% 0%,95% 25%,95% 75%,50% 100%,5% 75%,5% 25%);
  border-radius:0;width:66px;height:66px;font-size:14px;
}
.th-bi .doc-fname{font-size:13.5pt;letter-spacing:.7px;
                  font-family:'Book Antiqua',Palatino,Georgia,serif}
.th-bi .doc-tline{font-family:'Book Antiqua',Palatino,Georgia,serif;letter-spacing:.18em}
.th-bi .doc-cn{
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  border-radius:0;width:22px;height:22px;font-size:6pt;
}
.th-bi .doc-ttl{letter-spacing:.06em}

/* --- BCT (index 3): Modern — rounded corners, no diamonds, clean sans --- */
.th-bct .doc-ob{border-radius:6px;border-width:2px}
.th-bct .doc-ib{display:none}
.th-bct .doc-dm{display:none}
.th-bct .doc-seal{border-radius:8px;width:60px;height:60px;
                  font-size:13px;font-weight:900}
.th-bct .doc-fname{font-family:'Trebuchet MS','Segoe UI',Arial,sans-serif;
                   font-size:14pt;letter-spacing:.4px}
.th-bct .doc-tline{font-family:'Trebuchet MS','Segoe UI',Arial,sans-serif;
                   letter-spacing:.14em}
.th-bct .doc-cn{border-radius:2px;width:18px;height:18px;font-size:7pt;
                font-family:'Trebuchet MS',sans-serif}
.th-bct .doc-ttl{font-family:'Trebuchet MS','Segoe UI',Arial,sans-serif}
.th-bct .doc-strip{border-radius:4px;margin:6px 0}

/* --- UB (index 4): Bold — thick border, large seal, heavy typography --- */
.th-ub .doc-ob{border-width:3.5px;border-radius:0}
.th-ub .doc-ib{inset:12mm;border-width:2pt;border-radius:0}
.th-ub .doc-dm{width:13px;height:13px}
.th-ub .doc-seal{width:72px;height:72px;font-size:19px;font-weight:900;border-width:3px}
.th-ub .doc-fname{font-size:15.5pt;font-weight:900;letter-spacing:1.2px}
.th-ub .doc-tline{letter-spacing:.2em;font-weight:bold}
.th-ub .doc-cn{width:22px;height:22px;border-radius:2px;
               font-size:8pt;font-weight:900}
.th-ub .doc-ttl{font-size:13.5pt;font-weight:900;letter-spacing:.07em}
.th-ub .doc-strip{background:#ebebeb;border-top:2.5px solid var(--fprim);
                  border-bottom:2.5px solid var(--fprim)}

/* ============================================================
   RUBBER STAMP — appears in every signature block
   ============================================================ */
.doc-stamp{
  width:82px;height:82px;border-radius:50%;
  border:2.5px solid var(--fprim);
  display:inline-flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;flex-shrink:0;
  opacity:.82;
}
.doc-stamp-ring{
  position:absolute;inset:4px;border-radius:50%;
  border:1px dashed var(--fprim);opacity:.55;pointer-events:none;
}
.doc-stamp-badge{
  font-size:13.5pt;font-weight:900;color:var(--fprim);
  font-family:Georgia,serif;letter-spacing:.5px;
  position:relative;z-index:1;
}
.doc-stamp-firm{
  font-size:4.5pt;text-transform:uppercase;letter-spacing:.13em;
  color:var(--fprim);text-align:center;line-height:1.35;
  max-width:62px;position:relative;z-index:1;margin-top:3px;
}

/* Signature upload — app UI */
.sig-upload-row{display:flex;align-items:center;gap:10px;
                margin-top:10px;padding:10px 12px;
                background:#0d1526;border:1px solid #1e3a5f;border-radius:8px}
.sig-upload-row label{font-size:12px;color:#94a3b8;cursor:pointer;flex:1}
.sig-upload-row .sig-thumb{width:48px;height:36px;object-fit:contain;
                            border-radius:4px;border:1px solid #1e3a5f;
                            background:#050a14;display:none}
.sig-upload-clr{background:none;border:1px solid #ef4444;color:#ef4444;
                border-radius:6px;font-size:11px;padding:4px 8px;
                cursor:pointer;display:none}
</style>
</head>

function lsG(k,d){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}}
function lsS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function loadFirms(){
  var s=lsG('gem_firms',null);
  if(!s||s.length!==FD.length)return JSON.parse(JSON.stringify(FD));
  // Merge saved with defaults (new fields get defaults)
  return s.map(function(sf,i){return Object.assign({},FD[i],sf);});
}

/* ============================================================
   DATES
   ============================================================ */
var MONS=['January','February','March','April','May','June','July',
          'August','September','October','November','December'];
function ord(n){
  n=parseInt(n,10);
  var s=['th','st','nd','rd'],v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}
function docDate(d){return ord(d.getDate())+' '+MONS[d.getMonth()]+' '+d.getFullYear();}
function fmtD(s){
  if(!s)return '';
  var p=s.split('-');
  if(p.length===3)return ord(parseInt(p[2],10))+' '+MONS[parseInt(p[1],10)-1]+' '+p[0];
  return s;
}

/* ============================================================
   FIRM GRID
   ============================================================ */
function renderFirmGrid(){
  var g=document.getElementById('firm-grid');
  g.innerHTML=firms.map(function(f,i){

    var miss=missFields(f);
    var wHtml=(sel&&miss.length)?'<div class="fcard-miss">⚠ Missing: '+miss.join(', ')+'</div>':'';
    return '<div class="fcard '+sel+'" style="--fprim:'+f.prim+';--fgold:'+f.gold+'"'+
           ' onclick="selFirm('+i+')" role="button" tabindex="0">'+
      '<div class="fcard-badge">'+xe(f.badge)+'</div>'+
      '<div class="fcard-name">'+xe(f.name)+'</div>'+
      '<div class="fcard-prop">'+(f.prop?xe(f.prop):'<em style="color:#475569">Tap Edit Firm</em>')+'</div>'+
      wHtml+
    '</div>';
  }).join('');
}

function missFields(f){
  var m=[];
  if(!f.prop)m.push('Proprietor');
  if(!f.addr)m.push('Address');
  if(!f.gstin)m.push('GSTIN');
  return m;
}

function selFirm(i){
  selF=i; lsS('gem_selfirm',i);
  var pl=document.getElementById('i-place');
  if(pl&&!pl.value)pl.value=firms[i].place||'';
  renderFirmGrid(); renderWarn(); renderSigUI();
  if(prevOpen)renderPreview();
}

/* ============================================================
   SIGNATURE UPLOAD
   ============================================================ */
function renderSigUI(){
  var f=firms[selF];
  var lbl=document.getElementById('sig-firm-name');
  var thumb=document.getElementById('sig-thumb-img');
  var clrBtn=document.getElementById('sig-clr-btn');
  if(lbl) lbl.textContent=f.name;
  var stored=lsG('gem_sig_'+f.id,null);
  if(stored){
    if(thumb){thumb.src=stored;thumb.style.display='block';}
    if(clrBtn)clrBtn.style.display='inline-block';
  } else {
    if(thumb){thumb.src='';thumb.style.display='none';}
    if(clrBtn)clrBtn.style.display='none';
  }
}

function loadSig(input){
  if(!input.files||!input.files[0])return;
  var f=firms[selF];
  var reader=new FileReader();
  reader.onload=function(e){
    lsS('gem_sig_'+f.id,e.target.result);
    renderSigUI();
    if(prevOpen)renderPreview();
  };
  reader.readAsDataURL(input.files[0]);
  input.value='';
}

function clearSig(){
  var f=firms[selF];
  localStorage.removeItem('gem_sig_'+f.id);
  renderSigUI();
  if(prevOpen)renderPreview();
}

function renderWarn(){
  var f=firms[selF], miss=missFields(f), bar=document.getElementById('warn-bar');
  if(miss.length){
    bar.textContent='⚠ "'+f.name+'" — Missing: '+miss.join(', ')+'. Tap Edit Firm to complete.';
    bar.classList.add('on');
  } else { bar.classList.remove('on'); }
}

function onChk(k){

function setPreset(n){

var IDS=['ref','bd','dd','item','buyer','off','con','place','date',
         'e1','e2','pcn','pcd','pfam','pitm','pto'];

function loadInputs(){
  var s=lsG('gem_inp',{});
  IDS.forEach(function(id){
    var el=document.getElementById('i-'+id);
    if(el&&s[id]!==undefined&&s[id]!=='')el.value=s[id];

function saveInputs(){
  var s={};
  IDS.forEach(function(id){var el=document.getElementById('i-'+id);if(el)s[id]=el.value;});

function gv(id){var el=document.getElementById('i-'+id);return el?el.value.trim():'';}

  return{
    ref  : gv('ref'),

    item : gv('item')||'[Item Not Specified]',

    pcn:gv('pcn'), pcd:fmtD(gv('pcd')),

/* ============================================================

function togglePreview(){
  prevOpen=!prevOpen;
  var btn=document.getElementById('prev-btn');
  var area=document.getElementById('preview-area');
  var shell=document.getElementById('app-shell');
  if(prevOpen){
    saveInputs(); renderPreview();
    area.classList.add('on');
    shell.style.display='none';
    btn.textContent='← Back to Editor';
    btn.classList.add('on');
  } else {
    area.classList.remove('on');
    shell.style.display='block';
    btn.textContent='👁 Preview Documents';
    btn.classList.remove('on');
  }
}

function doPrint(){
  saveInputs(); renderPreview();
  document.getElementById('preview-area').classList.add('on');
  // Reset transforms before printing (critical for correct PDF size)
  resetForPrint();
  setTimeout(function(){window.print();}, 150);
}

function resetForPrint(){
  document.querySelectorAll('.doc-page').forEach(function(p){
    p.style.transform='none'; p.style.width=''; p.style.height='';
  });
  document.querySelectorAll('.pgwrap').forEach(function(w){
    w.style.height=''; w.style.overflow='';
  });
}

// Also handle browser-native beforeprint / afterprint
window.addEventListener('beforeprint', function(){ resetForPrint(); });
window.addEventListener('afterprint',  function(){ if(prevOpen) scalePages(); });

function renderPreview(){
  var f=firms[selF], inp=getInp();
  var keys=DOCS.filter(function(d){return selDocs[d.k];}).map(function(d){return d.k;});
  var tot=keys.length;
  if(!tot){
    document.getElementById('preview-pages').innerHTML=
      '<div style="padding:28px;text-align:center;color:#475569;font-size:13px">'+
      'No documents selected.<br>Please tick at least one document above.</div>';
    return;
  }
  document.getElementById('preview-pages').innerHTML=keys.map(function(k,i){
    return '<div class="pgwrap">'+genDoc(k,f,inp,i+1,tot)+'</div>';
  }).join('');
  scalePages();
}

function scalePages(){
  var area=document.getElementById('preview-area');
  if(!area) return;
  var cw=area.offsetWidth-24; // minus 12px padding each side
  if(cw<80) cw=400;
  var pw=794; // 210mm @ 96dpi
  var ph=1122; // 297mm @ 96dpi
  var sc=cw/pw;
  document.querySelectorAll('.pgwrap').forEach(function(wrap){
    var pg=wrap.querySelector('.doc-page');
    if(pg){
      pg.style.transform='scale('+sc.toFixed(4)+')';
      pg.style.transformOrigin='top left';
      wrap.style.height=Math.round(ph*sc)+'px';
      wrap.style.overflow='hidden';
    }
  });
}

/* ============================================================
   HTML ESCAPE
   ============================================================ */
function xe(s){
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ============================================================
   SHARED DOCUMENT HELPERS
   ============================================================ */
function taglineStr(f){
  var p=[];
  if(f.mse)   p.push('MSE');
  if(f.woman) p.push('Woman-Owned');
  if(f.obc)   p.push('OBC');
  if(f.udyam) p.push('Udyam Registered');
  return p.join(' • ')||'Registered Enterprise';
}

function idsStr(f){
  var p=[];
  if(f.gem)   p.push('GeM&nbsp;ID: '+xe(f.gem));
  if(f.gstin) p.push('GSTIN: '+xe(f.gstin));
  if(f.udyam) p.push('Udyam: '+xe(f.udyam));
  return p.join('&nbsp;&nbsp;•&nbsp;&nbsp;');
}

function addrLine(f){
  var parts=[];
  if(f.addr)  parts.push(xe(f.addr));
  var contact=[];
  if(f.phone) contact.push('Mob: '+xe(f.phone));
  if(f.email) contact.push(xe(f.email));
  if(contact.length) parts.push(contact.join('&nbsp;&nbsp;&nbsp;'));
  return parts.join('<br>');
}

var FIRM_THEME={sh:'th-sh',vbe:'th-vbe',bi:'th-bi',bct:'th-bct',ub:'th-ub'};

function fvars(f){return 'style="--fprim:'+f.prim+';--fgold:'+f.gold+'"';}

/* Document letterhead (used by every page) */
function hdr(f){
  var ids=idsStr(f), addr=addrLine(f);
  return '<div class="doc-hdr-bg"></div>'+
    '<div class="doc-hdr">'+
      '<div class="doc-seal">'+xe(f.badge)+'</div>'+
      '<div class="doc-fname">'+xe(f.name)+'</div>'+
      '<div class="doc-tline">'+taglineStr(f)+'</div>'+
      '<div class="doc-div"><span class="doc-dmd"></span></div>'+
      (ids ?'<div class="doc-ids">'+ids+'</div>':'') +
      (addr?'<div class="doc-addr">'+addr+'</div>':'')+
    '</div>';
}

function bidStrip(inp){
  var s='Bid&nbsp;Ref: <b>'+(inp.ref||'[Reference No.]')+'</b>';
  if(inp.bd) s+='&nbsp;&nbsp;•&nbsp;&nbsp;Bid&nbsp;Date: <b>'+inp.bd+'</b>';
  if(inp.dd) s+='&nbsp;&nbsp;•&nbsp;&nbsp;Due: <b>'+inp.dd+'</b>';
  return '<div class="doc-strip">'+s+'</div>';
}

function toLine(f,inp){
  return '<div class="doc-to">To:&nbsp;<b>'+xe(inp.off)+'</b>'+
    (inp.buyer?',&nbsp;'+xe(inp.buyer)+', Indian Army, Ministry of Defence':
               ', Indian Army, Ministry of Defence')+
  '</div>';

function clauses(f,arr){
  var rom=['i','ii','iii','iv','v','vi','vii','viii'];
  return '<ul class="doc-cls">'+arr.map(function(c,i){
    var lbl=(f.id==='bi') ? rom[i]||String(i+1) : String(i+1);
    return '<li class="doc-cl">'+
      '<span class="doc-cn">'+lbl+'</span>'+
      '<span class="doc-ctxt">'+c+'</span>'+
    '</li>';
  }).join('')+'</ul>';
}

function sigBlock(f,inp){
  var stored=lsG('gem_sig_'+f.id,null);
  var sigImg=stored
    ? '<img src="'+stored+'" style="height:46px;max-width:110px;object-fit:contain;display:block;margin:0 0 3px auto">'
    : '<div style="height:46px;border-bottom:1px solid #bbb;margin-bottom:3px"></div>';
  var stamp=
    '<div class="doc-stamp">'+
      '<div class="doc-stamp-ring"></div>'+
      '<div class="doc-stamp-badge">'+xe(f.badge)+'</div>'+
      '<div class="doc-stamp-firm">'+xe(f.name)+'</div>'+
    '</div>';
  return '<div class="doc-sig">'+
    '<div class="doc-sig-l">'+
      'Place:&nbsp;<b>'+xe(inp.place||f.place)+'</b><br>'+
      'Date:&nbsp;<b>'+xe(inp.date)+'</b>'+
    '</div>'+
    '<div class="doc-sig-r" style="display:flex;align-items:flex-end;gap:8px">'+
      stamp+
      '<div style="text-align:right">'+
        '<div style="font-size:8pt;color:#555;margin-bottom:2px;font-style:italic">For M/s '+xe(f.name)+'</div>'+
        sigImg+
        '<div class="doc-sig-name">'+(xe(f.sign)||'____________________')+'</div>'+
        '<div class="doc-sig-sub">Proprietor / Authorised Signatory</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function footer(f,inp,lbl,n,tot){
  return '<div class="doc-ft">'+
    '<span>'+xe(f.name)+'</span>'+
    '<span>'+xe(lbl)+'&nbsp;•&nbsp;'+(inp.ref||'Bid Ref')+'</span>'+
    '<span>Page '+n+' of '+tot+'</span>'+
  '</div>';
}

function page(f,inp,body,lbl,n,tot){
  var th=FIRM_THEME[f.id]||'';
  return '<div class="doc-page'+(th?' '+th:'')+'" '+fvars(f)+'>'+
    '<div class="doc-ob"></div>'+
    '<div class="doc-ib"></div>'+
    '<div class="doc-dm tl"></div>'+
    '<div class="doc-dm tr"></div>'+
    '<div class="doc-dm bl"></div>'+
    '<div class="doc-dm br"></div>'+
    '<div class="doc-ct">'+
      hdr(f)+
      bidStrip(inp)+
      '<div class="doc-body">'+body+'</div>'+
      footer(f,inp,lbl,n,tot)+
    '</div>'+
  '</div>';
}

/* ============================================================
   DOCUMENT ROUTER
   ============================================================ */
function genDoc(k,f,inp,n,tot){
  switch(k){
    case 'cover':   return genCover(f,inp,n,tot);
    case 'profile': return genProfile(f,inp,n,tot);
    case 's1': return genSub(1,f,inp,n,tot);
    case 's2': return genSub(2,f,inp,n,tot);
    case 's3': return genSub(3,f,inp,n,tot);
    case 's4': return genSub(4,f,inp,n,tot);
    case 's5': return genSub(5,f,inp,n,tot);
    case 's6': return genSub(6,f,inp,n,tot);
    case 'emd': return genEMD(f,inp,n,tot);
    default: return '';
  }
}

/* ============================================================
   COVER PAGE
   ============================================================ */
function genCover(f,inp,n,tot){
  var tl=[];
  if(f.mse)   tl.push('MSE');
  if(f.woman) tl.push('WOMAN-OWNED');
  if(f.obc)   tl.push('OBC');
  if(f.udyam) tl.push('UDYAM REGISTERED');
  var ids=idsStr(f);

  var body=
    '<div class="doc-ey" style="text-align:center;margin-top:6px">GeM Government e-Marketplace &mdash; Bid Compliance Documents</div>'+
    '<div class="doc-ttl" style="text-align:center;font-size:15pt;letter-spacing:.05em;margin-bottom:5px">'+
      'BID COMPLIANCE<br>&amp; DECLARATIONS'+
    '</div>'+
    '<div style="text-align:center;font-size:8.5pt;color:#555;font-style:italic;margin-bottom:12px">'+
      'Submitted with respect &amp; compliance by the Bidder'+
    '</div>'+
    '<div class="doc-div"><span class="doc-dmd"></span></div>'+
    '<div class="cov-box">'+
      '<div class="cov-row"><span class="cov-lbl">Bid Reference</span><span>'+
        (inp.ref||'&mdash;')+(inp.bd?' &nbsp;&nbsp; Dated: <b>'+inp.bd+'</b>':'')+
      '</span></div>'+
      '<div class="cov-row"><span class="cov-lbl">Buyer</span><span>'+
        xe(inp.buyer)+', Indian Army, Ministry of Defence'+
      '</span></div>'+
      '<div class="cov-row"><span class="cov-lbl">Requirement</span><span>'+xe(inp.item)+'</span></div>'+
      '<div class="cov-row"><span class="cov-lbl">Consignee</span><span>'+xe(inp.con)+'</span></div>'+
      (inp.dd?'<div class="cov-row"><span class="cov-lbl">Bid Due Date</span><span>'+inp.dd+'</span></div>':'')+
      '<div class="cov-row"><span class="cov-lbl">Bidder Status</span><span>'+
        (tl.join(' &bull; ')||'Registered Enterprise')+
      '</span></div>'+
    '</div>'+
    '<div class="doc-div" style="margin-top:12px"><span class="doc-dmd"></span></div>'+
    '<div style="text-align:center;font-size:7pt;color:#666;margin-top:12px;line-height:2">'+
      (f.addr ? xe(f.addr)+'<br>' : '')+
      (ids    ? ids+'<br>'        : '')+
      'Document Prepared on: <b>'+xe(inp.date)+'</b>'+
    '</div>'+
    '<div style="flex:1"></div>';

  return page(f,inp,body,'Cover Page',n,tot);
}

/* ============================================================
   SECTION A — BIDDER PROFILE
   ============================================================ */
function genProfile(f,inp,n,tot){
  var ec='Micro &amp; Small Enterprise'+(f.woman?' &mdash; Woman-Owned':'');
  var rows=[
    ['Name of Firm','M/s '+xe(f.name)+' ('+xe(f.biz)+')'],
    ['Proprietor', xe(f.prop)||'&mdash;'],
    ['Enterprise Class', ec],
  ];
  if(f.obc)   rows.push(['Social Category','Other Backward Class (OBC)']);
  if(f.gem)   rows.push(['GeM Seller ID', xe(f.gem)]);
  if(f.gstin) rows.push(['GSTIN', xe(f.gstin)]);
  if(f.udyam) rows.push(['Udyam Reg. No.', xe(f.udyam)]);
  rows.push(['Registered Address', xe(f.addr)||'&mdash;']);
  if(f.phone) rows.push(['Mobile', xe(f.phone)]);
  if(f.email) rows.push(['Email',  xe(f.email)]);
  if(f.bank)  rows.push(['Bank Account',
    xe(f.bank)+'<br>A/c No.: <b>'+xe(f.acc)+'</b>&nbsp;&nbsp;|&nbsp;&nbsp;IFSC: <b>'+xe(f.ifsc)+'</b>']);

  var idx=[
    ['I',   'Past Performance &amp; Experience &mdash; with MSE Relaxation'],
    ['II',  'Turnover Eligibility &mdash; MSE Relaxation'],
    ['III', 'Financial Standing &amp; Solvency'],
    ['IV',  'Acceptance of Terms &amp; Buyer-added Conditions (ATC)'],
    ['V',   'Make-in-India / Local Content Declaration'],
    ['VI',  'Land-Border Eligibility &amp; Authenticity of Goods'],
  ];

  var body=
    '<div class="doc-ey">Section A</div>'+
    '<div class="doc-ttl">Bidder Profile &amp; Index of Submissions</div>'+
    '<div class="doc-div"><span class="doc-dmd"></span></div>'+
    toLine(f,inp)+
    '<table class="ptbl">'+
      rows.map(function(r){return'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>';}).join('')+
    '</table>'+
    '<div style="font-size:8.5pt;color:#333;margin:9px 0 5px;font-style:italic">'+
      'We are honoured to enclose the following submissions for the kind perusal of the Buyer:'+
    '</div>'+
    '<table class="pidx">'+
      '<tr><th>Sub.</th><th>Submission Title</th></tr>'+
      idx.map(function(r){return'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>';}).join('')+
    '</table>'+
    sigBlock(f,inp);

  return page(f,inp,body,'Section A — Bidder Profile',n,tot);
}

/* ============================================================
   SUBMISSIONS I – VI
   ============================================================ */
function genSub(num,f,inp,n,tot){
  var ROM=['','I','II','III','IV','V','VI'];
  var ey='Submission '+ROM[num];
  var nm=xe(f.name);
  var udyam=f.udyam
    ? '<b>'+xe(f.udyam)+'</b>'
    : '[Udyam No. — update via Edit Firm]';

  var titles=['',
    'Past Performance &amp; Experience',
    'Turnover Eligibility &mdash; MSE Relaxation',
    'Financial Standing &amp; Solvency',
    'Acceptance of Terms &amp; Conditions',
    'Make-in-India / Local Content',
    'Land-Border Eligibility &amp; Authenticity of Goods',
  ];

  var cs=[],note='',closing='';

  if(num===1){
    cs=['That M/s '+nm+' is an established and reputed supplier to the Indian Army and Defence establishments, with a consistent record of satisfactory performance on the GeM portal.'];
    if(inp.hasPast){
      cs.push('That, most pertinently, we have already supplied <b>'+xe(inp.pfam)+'</b> to this very Buyer — vide GeM Contract <b>'+xe(inp.pcn)+'</b> dated <b>'+inp.pcd+'</b> for <b>'+xe(inp.pitm)+'</b> to <b>'+xe(inp.pto)+'</b> — which was delivered well within the stipulated timeline to the entire satisfaction of the consignee.');
      cs.push('That the said contract, being for goods of the same product family and to the same consignee as the present Bid, demonstrates our proven capability and reliability for the instant requirement.');
    }
    cs.push('That our firm, being a duly registered Micro &amp; Small Enterprise (Udyam No. '+udyam+'), is additionally entitled to the complete relaxation of the Experience Criterion graciously extended to MSEs under this Bid (MSE Relaxation: Yes | Complete).');
    cs.push('That we therefore respectfully submit that the experience and past-performance requirement stands amply met, and that all particulars stated herein are true and correct to the best of our knowledge and belief.');
    closing='The above declarations are made in good faith and shall be substantiated by documentary evidence upon request.';
  }
  else if(num===2){
    cs=[
      'That M/s '+nm+' is a duly registered Micro &amp; Small Enterprise vide Udyam Registration No. '+udyam+', valid and subsisting as on the date of bid opening.',
      'That the Bid Document kindly extends complete relaxation of the Bidder\'s Average Annual Turnover criterion to MSEs (MSE Relaxation for Turnover: Yes | Complete), and we respectfully seek the benefit of the said provision.',
      'That this relaxation is sought solely on the strength of our valid MSE status, and without prejudice to our capability to honour the contract in full.',
      'That the requirement pertaining to the OEM\'s Average Annual Turnover shall be duly substantiated through the certificate of the Original Equipment Manufacturer, furnished separately.',
      'That the particulars stated above are true and correct to the best of our knowledge and belief.',
    ];
    closing='This declaration is furnished in compliance with the Bid Document requirements and in good faith.';
  }
  else if(num===3){
    cs=[
      'That our firm is not under liquidation, court receivership or any like proceeding, nor has it been declared bankrupt or insolvent under any law in force.',
      'That M/s '+nm+' is financially sound and solvent, and is fully capable of executing the contract, should the same be entrusted to us, in accordance with the Bid terms.',
      'That no proceeding is pending against our firm or its Proprietor which would render us ineligible to participate in this Bid.',
      'That this affirmation is furnished in good faith in fulfilment of the Buyer\'s requirement to certify our financial standing.',
      'That the statements made herein are true and correct to the best of our knowledge and belief.',
    ];
    closing='This declaration is made on behalf of the firm and its Proprietor; the undersigned is duly authorised to make this declaration.';
  }
  else if(num===4){
    cs=[
      'That we have carefully studied the General Terms &amp; Conditions, the Special Terms and all Buyer-added Bid-Specific Conditions (ATC), and accept the same unconditionally and without deviation.',
      'That we shall effect delivery, installation, commissioning and demonstration (as applicable) at <b>'+xe(inp.con)+'</b>, within the stipulated delivery period.',
      'That we shall honour the prescribed warranty and attend to any defect during the warranty period at no additional cost to the Buyer.',
      'That we shall furnish all documents for Vendor Code creation (PAN, GSTIN, Cancelled Cheque, EFT Mandate) and raise GeM invoices in the prescribed manner.',
      'That we accept GST reimbursement as per actuals or the applicable rate, whichever is lower, subject to our quoted GST.',
      'That the goods supplied shall be genuine and sourced through authorised OEM channels, with chain documents furnished at delivery, and that we shall abide by all applicable labour laws.',
      'That every declaration made by us in this Bid is true and correct, and any misstatement shall render our bid / contract liable to such action as the Buyer may deem fit.',
    ];
    closing='We remain committed to the letter and spirit of the Bid terms and look forward to serving the Buyer with distinction.';
  }
  else if(num===5){
    cs=[
      'That the goods offered — <b>'+xe(inp.item)+'</b> — conform to the minimum local content prescribed to qualify as a Class-I / Class-II Local Supplier under the Public Procurement (Preference to Make-in-India) Order, 2017, as amended.',
      'That we shall furnish, wherever required, the OEM\'s certificate specifying the percentage of local content and the place(s) of local value addition, in support of any purchase preference claimed.',
      'That we are conscious of the consequences attaching to any incorrect declaration of local content under the said Order, and we accept the same.',
      'That the particulars stated above are true and correct to the best of our knowledge and belief.',
    ];
    note='The precise local-content percentage may kindly be read from the OEM\'s certificate before the Class-I claim is finalised; the applicable class may be amended accordingly.';
    closing='This declaration is made in sincere compliance with the Public Procurement (Preference to Make-in-India) Order, 2017.';
  }
  else if(num===6){
    cs=[
      'That our firm is an Indian entity and does not attract any restriction applicable to bidders from a country sharing a land border with India under GeM GTC Clause 26, and that no registration with the Competent Authority is attracted in our case.',
      'That we are fully eligible to participate in this Bid in our own right.',
      'That the goods to be supplied shall be genuine, brand-new and unused, drawn from an authorised distributor / dealer / channel partner of the OEM, with the requisite chain / GST documents furnished at delivery.',
      'That we accept that any incorrect declaration or non-compliance herein shall constitute valid ground for termination of the contract and such further action as may be warranted in law.',
      'That every statement made herein is true and correct to the best of our knowledge and belief.',
    ];
    closing='This declaration is made in compliance with GeM General Terms &amp; Conditions and the Bid Document requirements.';
  }

  var body=
    '<div class="doc-ey">'+ey+'</div>'+
    '<div class="doc-ttl">'+titles[num]+'</div>'+
    '<div class="doc-div"><span class="doc-dmd"></span></div>'+
    toLine(f,inp)+
    '<div class="doc-intro">We, M/s '+nm+', hereby solemnly affirm and declare as under:</div>'+
    clauses(f,cs)+
    (note?'<div class="doc-note"><b>Note: </b>'+note+'</div>':'')+
    (closing?'<div class="doc-closing">'+closing+'</div>':'')+
    sigBlock(f,inp);

  return page(f,inp,body,ey,n,tot);
}

/* ============================================================
   EMD EXEMPTION REQUEST
   ============================================================ */
function genEMD(f,inp,n,tot){
  var udyam=f.udyam?'<b>'+xe(f.udyam)+'</b>':'[Udyam No. — update via Edit Firm]';
  var rows='';
  if(inp.e1) rows+='<tr><td>Schedule 1</td><td><b>&#x20B9; '+xe(inp.e1)+'/-</b></td></tr>';
  if(inp.e2) rows+='<tr><td>Schedule 2</td><td><b>&#x20B9; '+xe(inp.e2)+'/-</b></td></tr>';
  if(!rows)  rows='<tr><td colspan="2" style="text-align:center;color:#999;font-style:italic">EMD amount not entered — please fill in the form</td></tr>';

  var cs=[
    'That M/s '+xe(f.name)+' is a duly registered Micro &amp; Small Enterprise vide Udyam Registration No. '+udyam+', valid and subsisting as on the date of bid opening.',
    'That, in keeping with the GeM General Terms &amp; Conditions and the Public Procurement Policy for MSEs, 2012, bidders registered as MSEs are exempted from payment of Earnest Money Deposit (EMD), and we respectfully seek the benefit of the said exemption against this Bid.',
    'That the EMD applicable to the Bid, from which exemption is sought, is as under:'+
      '<table class="etbl" style="margin:6px 0">'+
        '<thead><tr><th>Schedule</th><th>EMD Amount</th></tr></thead>'+
        '<tbody>'+rows+'</tbody>'+
      '</table>',
    'That a copy of our valid Udyam Registration Certificate is enclosed herewith in support of this request.',
    'That, in the event this exemption is found inadmissible under the specific terms of the Bid, we respectfully undertake to deposit the applicable EMD as required.',
    'That the particulars stated above are true and correct to the best of our knowledge and belief.',
  ];

  var body=
    '<div class="doc-ey">EMD Exemption Request</div>'+
    '<div class="doc-ttl">Earnest Money Deposit —<br>Exemption under MSE / Udyam</div>'+
    '<div class="doc-div"><span class="doc-dmd"></span></div>'+
    toLine(f,inp)+
    '<div class="doc-intro">With reference to Bid No.&nbsp;<b>'+(inp.ref||'&mdash;')+'</b>'+
      (inp.bd?' dated <b>'+inp.bd+'</b>':'')+
      ', we respectfully submit the following in the matter of Earnest Money Deposit:'+
    '</div>'+
    clauses(f,cs)+
    '<div class="doc-note"><b>Note: </b>This exemption is sought solely on the basis of valid MSE (Udyam) registration. Should the Bid\'s specific terms confine EMD exemption to manufacturers of the bid item, the bidder shall deposit the applicable EMD accordingly.</div>'+
    '<div class="doc-closing">We request that this application for EMD exemption may kindly be considered and accepted in its true spirit.</div>'+
    sigBlock(f,inp);

  return page(f,inp,body,'EMD Exemption Request',n,tot);
}

/* ============================================================
   FIRM EDIT MODAL
   ============================================================ */
var FLDS=[
  {k:'name', l:'Firm Name',               t:'text'},
  {k:'prop', l:'Proprietor Name',         t:'text'},
  {k:'sign', l:'Signature Name (CAPITALS)',t:'text'},
  {k:'addr', l:'Registered Address',      t:'text'},
  {k:'place',l:'Place / City',            t:'text'},
  {k:'phone',l:'Mobile',                  t:'tel'},
  {k:'email',l:'Email',                   t:'email'},
  {k:'gstin',l:'GSTIN',                   t:'text'},
  {k:'udyam',l:'Udyam Reg. No.',          t:'text'},
  {k:'gem',  l:'GeM Seller ID',           t:'text'},
  {k:'bank', l:'Bank Name & Branch',      t:'text'},
  {k:'acc',  l:'Account No.',             t:'text'},
  {k:'ifsc', l:'IFSC Code',               t:'text'},
];

function openEdit(){
  editIdx=selF;
  var f=firms[editIdx];
  document.getElementById('edit-modal-ttl').textContent='Edit: '+f.name;
  var html='<div style="display:grid;gap:10px">';
  FLDS.forEach(function(fld){
    html+='<div>'+
      '<label class="ilbl" for="ef-'+fld.k+'">'+fld.l+'</label>'+
      '<input class="inp" id="ef-'+fld.k+'" type="'+fld.t+'" value="'+xe(f[fld.k]||'')+'">'+
    '</div>';
  });
  html+='<div style="display:grid;gap:8px;padding:4px 0;margin-top:4px">'+
    mkChk('mse',  'MSE (Micro & Small Enterprise)', f.mse)+
    mkChk('woman','Woman-Owned Enterprise',         f.woman)+
    mkChk('obc',  'OBC Category',                  f.obc)+
  '</div></div>';
  document.getElementById('edit-fields').innerHTML=html;
  document.getElementById('edit-modal').classList.add('on');
}

function mkChk(k,lbl,val){
  return '<label class="chkrow">'+
    '<input type="checkbox" id="ef-'+k+'" '+(val?'checked':'')+'>'+lbl+'</label>';
}

function saveEdit(){
  var f=firms[editIdx];
  FLDS.forEach(function(fld){
    var el=document.getElementById('ef-'+fld.k);
    if(el)f[fld.k]=el.value.trim();
  });
  ['mse','woman','obc'].forEach(function(k){
    var el=document.getElementById('ef-'+k); if(el)f[k]=el.checked;
  });
  lsS('gem_firms',firms);
  document.getElementById('edit-modal').classList.remove('on');
  renderFirmGrid(); renderWarn();
  if(prevOpen) renderPreview();
}

function closeEdit(){
  document.getElementById('edit-modal').classList.remove('on');
}
function closeEditBg(ev){
  if(ev.target===document.getElementById('edit-modal')) closeEdit();
}

/* ============================================================
   INIT
   ============================================================ */
(function init(){
  selF=lsG('gem_selfirm',0);
  if(selF<0||selF>=firms.length) selF=0;

  var sd=lsG('gem_docs',null);
  if(sd){ selDocs=sd; }
  else  { DOCS.forEach(function(d){ selDocs[d.k]=(d.k!=='emd'); }); }

  renderFirmGrid();
  renderWarn();
  renderDocList();
  renderSigUI();
  loadInputs();

  document.getElementById('app-shell').addEventListener('input', saveInputs);
  window.addEventListener('resize', function(){ if(prevOpen) scalePages(); });
})();

window.selFirm       = selFirm;
window.setPreset     = setPreset;
window.onChk         = onChk;
window.togglePast    = togglePast;
window.togglePreview = togglePreview;
window.doPrint       = doPrint;
window.openEdit      = openEdit;
window.saveEdit      = saveEdit;
window.closeEdit     = closeEdit;
window.closeEditBg   = closeEditBg;
window.loadSig       = loadSig;
window.clearSig      = clearSig;

})();
</script>
</body>
</html>
