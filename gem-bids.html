<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>GeM Bid Docs — VBE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Archivo:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&family=Jost:wght@300;400;500;600&family=Cinzel:wght@400;600;700&family=Marcellus&family=Mukta:wght@400;600;700&family=Sora:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   APP UI STYLES  (hidden on print)
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
     background:#050a14;color:#e2e8f0;min-height:100vh;-webkit-tap-highlight-color:transparent}

/* --- header --- */
#app-shell{max-width:480px;margin:0 auto;padding-bottom:136px}
.gh{display:flex;align-items:center;gap:12px;padding:14px 16px;
    background:#0d1526;border-bottom:1px solid #1e3a5f;
    position:sticky;top:0;z-index:50}
.gh-back{color:#f59e0b;text-decoration:none;font-size:22px;padding:2px 6px 2px 0;line-height:1}
.gh-info{flex:1}
.gh-title{font-size:16px;font-weight:700;color:#f1f5f9}
.gh-sub{font-size:10px;color:#475569;margin-top:1px}
.gh-editbtn{background:none;border:1px solid #1e3a5f;border-radius:8px;
            color:#94a3b8;padding:6px 11px;font-size:12px;cursor:pointer;
            touch-action:manipulation}
.gh-editbtn:active{border-color:#f59e0b;color:#f59e0b}

/* --- labels --- */
.slbl{padding:14px 16px 6px;font-size:10.5px;font-weight:700;
      letter-spacing:.09em;text-transform:uppercase;color:#475569}

/* --- firm grid --- */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 4px}
.fcard{border:2px solid #1e3a5f;border-radius:12px;padding:11px 10px;
       cursor:pointer;background:#0d1526;touch-action:manipulation;
       position:relative;overflow:hidden;transition:border-color .2s}
.fcard::before{content:'';position:absolute;inset:0;
               background:var(--fprim);opacity:0;
               transition:opacity .2s;pointer-events:none;border-radius:10px}
.fcard.sel{border-color:var(--fgold)}
.fcard.sel::before{opacity:.09}
.fcard-badge{width:38px;height:38px;border-radius:50%;display:flex;
             align-items:center;justify-content:center;
             font-weight:800;font-size:11px;margin-bottom:7px;
             border:2px solid var(--fgold);background:var(--fprim);color:var(--fgold)}
.fcard-name{font-size:11.5px;font-weight:700;color:#e2e8f0;line-height:1.3}
.fcard-prop{font-size:10px;color:#64748b;margin-top:2px;line-height:1.3}
.fcard-miss{font-size:9.5px;color:#f59e0b;margin-top:5px;display:none;line-height:1.3}
.fcard.sel .fcard-miss{display:block}

/* --- warn --- */
.wbar{margin:6px 16px;padding:9px 13px;background:rgba(124,45,18,.13);
      border:1px solid rgba(245,158,11,.35);border-radius:8px;
      font-size:11.5px;color:#fbbf24;display:none;line-height:1.4}
.wbar.on{display:block}

/* --- preset / doc list --- */
.prow{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 8px}
.pset{padding:6px 13px;border-radius:20px;border:1px solid #1e3a5f;
      background:transparent;color:#94a3b8;font-size:11px;cursor:pointer;
      touch-action:manipulation;transition:background .15s,color .15s}
.pset:active{background:#1e3a5f;color:#e2e8f0}
.dlist{padding:0 16px 4px;display:grid;gap:6px}
.ditem{display:flex;align-items:center;gap:10px;padding:10px 12px;
       background:#0d1526;border:1px solid #1e3a5f;border-radius:10px;
       cursor:pointer;touch-action:manipulation}
.ditem input[type=checkbox]{accent-color:#f59e0b;width:17px;height:17px;
                             cursor:pointer;flex-shrink:0}
.ditem-ttl{font-size:13px;font-weight:600;color:#e2e8f0}
.ditem-sub{font-size:10px;color:#64748b}

/* --- inputs --- */
.igrid{padding:0 16px;display:grid;gap:10px}
.ilbl{font-size:10.5px;font-weight:700;color:#64748b;text-transform:uppercase;
      letter-spacing:.04em;margin-bottom:4px;display:block}
.inp{background:#0d1526;border:1px solid #1e3a5f;border-radius:8px;
     padding:10px 12px;color:#e2e8f0;font-size:14px;width:100%;
     outline:none;-webkit-appearance:none;transition:border-color .15s}
.inp:focus{border-color:rgba(245,158,11,.4);box-shadow:0 0 0 2px rgba(245,158,11,.1)}
.inp::placeholder{color:#334155}
.irow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ibox{background:rgba(13,21,38,.5);border:1px solid #1e3a5f;
      border-radius:10px;padding:12px;margin-top:4px}
.ibox-hdr{font-size:10.5px;font-weight:700;color:#94a3b8;
          text-transform:uppercase;letter-spacing:.05em;
          margin-bottom:10px;display:flex;align-items:center;gap:8px}
.tog{width:34px;height:20px;border-radius:10px;border:none;
     background:#0a1020;position:relative;cursor:pointer;flex-shrink:0;
     transition:background .2s;touch-action:manipulation;outline:none}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;
            border-radius:50%;background:#fff;transition:left .2s;
            box-shadow:0 1px 3px rgba(0,0,0,.25)}
.tog.on{background:#f59e0b}
.tog.on::after{left:17px}
#past-fields{display:none;margin-top:10px}

/* --- action bar --- */
#gem-actions{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
             width:100%;max-width:480px;padding:10px 16px 16px;
             background:linear-gradient(transparent,#050a14 30%);
             z-index:40;display:flex;flex-direction:column;gap:7px}
.btn-pri{padding:14px;border-radius:12px;font-size:15px;font-weight:700;
         cursor:pointer;border:none;touch-action:manipulation;
         background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;
         transition:opacity .15s}
.btn-pri:active{opacity:.85}
.btn-sec{background:#0d1526;border:1px solid #1e3a5f;color:#94a3b8;
         padding:10px;border-radius:10px;font-size:13px;font-weight:600;
         cursor:pointer;touch-action:manipulation;width:100%;
         transition:border-color .15s,color .15s}
.btn-sec.on{border-color:#f59e0b;color:#f59e0b}

/* --- preview area --- */
#preview-area{display:none;padding:12px 16px 0;max-width:480px;margin:0 auto}
#preview-area.on{display:block}
.pgwrap{background:#fff;border-radius:4px;overflow:hidden;
        margin-bottom:14px;box-shadow:0 4px 32px rgba(0,0,0,.7)}

/* --- edit modal --- */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:60;
          display:none;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal-sheet{background:#0d1526;border-radius:20px 20px 0 0;
             padding:20px 16px 24px;max-width:480px;width:100%;
             max-height:92vh;overflow-y:auto;border-top:1px solid #1e3a5f}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-ttl{font-size:15px;font-weight:700;color:#f1f5f9}
.modal-x{font-size:22px;color:#64748b;cursor:pointer;padding:4px;touch-action:manipulation}
.chkrow{display:flex;align-items:center;gap:8px;font-size:13px;
        color:#94a3b8;cursor:pointer;touch-action:manipulation;padding:2px 0}
.chkrow input{accent-color:#f59e0b;width:16px;height:16px;cursor:pointer}
.savebtn{width:100%;margin-top:16px;padding:13px;
         background:linear-gradient(135deg,#f59e0b,#d97706);
         border:none;border-radius:10px;font-weight:700;font-size:14px;
         cursor:pointer;touch-action:manipulation;color:#000}

/* ============================================================
   PRINT — show ONLY the preview pages, reset all transforms
   ============================================================ */
@media print{
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  body{background:#fff !important}
  body > *{display:none !important}
  #preview-area{display:block !important;padding:0 !important;
                max-width:none !important;margin:0 !important}
  .pgwrap{margin:0 !important;box-shadow:none !important;
          border-radius:0 !important;overflow:visible !important;
          height:297mm !important}
  .doc-page{transform:none !important;width:210mm !important;
            height:297mm !important;page-break-after:always !important;
            break-after:page !important}
  #gem-actions{display:none !important}
  @page{size:A4;margin:0}
}

/* ============================================================
   DOCUMENT PAGE STYLES  (print-quality letterhead)
   ============================================================ */
.doc-page{
  width:210mm;height:297mm;position:relative;
  background:#fff;color:#111;overflow:hidden;
  page-break-after:always;break-after:page;
}

/* Shared gold divider (used in content generators) */
.doc-div{display:flex;align-items:center;gap:6px;margin:4px 0;position:relative;z-index:1}
.doc-div::before,.doc-div::after{content:'';flex:1;height:1px;background:var(--fgold);opacity:.7}
.doc-dmd{width:8px;height:8px;background:var(--fgold);transform:rotate(45deg);display:inline-block;flex-shrink:0}

/* ---- DOCUMENT BODY ---- */
.doc-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;position:relative;z-index:1}
.doc-ey{font-size:5.8pt;text-transform:uppercase;letter-spacing:.22em;color:var(--fgold);margin-bottom:4px;font-weight:700;}
.doc-ttl{font-size:13.5pt;font-weight:800;text-transform:uppercase;color:var(--fprim);letter-spacing:.05em;margin-bottom:4px;line-height:1.2;padding-bottom:5px;border-bottom:2.5px solid var(--fgold);}
.doc-to{font-size:7.5pt;color:#222;margin-bottom:7px;border-left:4px solid var(--fprim);line-height:1.6;background:rgba(0,0,0,.028);padding:6px 8px 6px 10px;border-radius:0 3px 3px 0;}
.doc-to-lbl{font-size:5.5pt;text-transform:uppercase;letter-spacing:.15em;color:var(--fprim);font-weight:700;margin-bottom:2px;display:block;}
.doc-intro{font-size:8.5pt;font-style:italic;color:#3a3a3a;margin-bottom:7px;line-height:1.65;border-left:2px solid var(--fgold);padding-left:8px;}
.doc-cls{list-style:none;display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.doc-cl{display:flex;gap:9px;font-size:8pt;line-height:1.65;color:#1a1a1a;align-items:flex-start}
.doc-cn{width:19px;height:19px;border-radius:3px;background:var(--fprim);color:#fff;font-size:6.5pt;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.doc-ctxt{flex:1}
.doc-note{background:rgba(0,0,0,.022);border:1px solid var(--fgold);border-left:3.5px solid var(--fgold);border-radius:0 3px 3px 0;padding:6px 10px;font-size:7pt;color:#444;font-style:italic;margin:5px 0;line-height:1.6;}
.doc-note b{color:var(--fprim);font-style:normal}
.doc-closing{font-size:7.5pt;font-style:italic;color:#555;margin-top:6px;line-height:1.55;border-top:1px solid #ddd;padding-top:6px;text-align:right;}

/* Key data highlight box */
.doc-kbox{border:1.5px solid var(--fprim);border-top:3px solid var(--fprim);border-radius:3px;padding:8px 12px;margin:8px 0;background:rgba(0,0,0,.018);}
.doc-kbox-ttl{font-size:5.5pt;text-transform:uppercase;letter-spacing:.18em;color:var(--fprim);font-weight:700;margin-bottom:5px;}
.doc-kbox-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px 14px;}
.doc-kbox-item{display:flex;flex-direction:column;gap:1px;}
.doc-kbox-lbl{font-size:5.2pt;text-transform:uppercase;letter-spacing:.12em;color:#888;font-weight:600;}
.doc-kbox-val{font-size:8pt;font-weight:700;color:var(--fprim);letter-spacing:.02em;line-height:1.3;}
.doc-kbox-val.mono{font-family:'Courier New',monospace;font-size:7.5pt;}
/* Certification badges */
.doc-certs{display:flex;gap:4px;flex-wrap:wrap;margin:5px 0 7px;}
.doc-cert-tag{font-size:5.2pt;text-transform:uppercase;letter-spacing:.12em;font-weight:700;padding:2px 7px;border-radius:2px;border:1px solid var(--fprim);color:var(--fprim);background:rgba(0,0,0,.025);}

/* Signature block */
.doc-sig{display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto;padding-top:8px;border-top:2px solid var(--fprim);flex-shrink:0;}
.doc-sig-l{font-size:7.5pt;color:#444;line-height:2;font-family:'Times New Roman',serif}
.doc-sig-l b{color:var(--fprim)}
.doc-sig-r{text-align:right}
.doc-sig-for{font-size:7.5pt;color:#666;margin-bottom:3px;font-style:italic}
.doc-sig-name{border-top:2px solid var(--fprim);padding-top:4px;font-size:9.5pt;font-weight:800;color:var(--fprim);letter-spacing:.6px;}
.doc-sig-sub{font-size:7pt;color:#666;margin-top:2px}

/* ---- COVER PAGE extras ---- */
.cov-box{border:1.5px solid #ddd;border-top:3px solid var(--fprim);border-radius:3px;padding:10px 14px;margin:8px 0;background:#fff;}
.cov-row{display:flex;gap:10px;padding:5px 0;font-size:8pt;color:#222;border-bottom:1px solid #f0f0f0;line-height:1.55;align-items:baseline;}
.cov-row:last-child{border:none}
.cov-lbl{font-weight:700;color:var(--fprim);min-width:115px;flex-shrink:0;font-size:7pt;text-transform:uppercase;letter-spacing:.06em;}

/* ---- PROFILE tables ---- */
.ptbl{width:100%;border-collapse:collapse;font-size:7.8pt;margin:6px 0}
.ptbl td{padding:5px 10px;border:1px solid #e8e8e8;vertical-align:top;line-height:1.55}
.ptbl td:first-child{font-weight:700;color:var(--fprim);background:#f7f8f9;width:35%;font-size:7pt;text-transform:uppercase;letter-spacing:.05em;}
.ptbl tr:first-child td{border-top:2px solid var(--fprim);}
.pidx{width:100%;border-collapse:collapse;font-size:8pt;margin-top:6px}
.pidx th{background:var(--fprim);color:#fff;padding:5px 10px;text-align:left;font-weight:700;font-size:6.5pt;text-transform:uppercase;letter-spacing:.1em;}
.pidx td{padding:5px 10px;border:1px solid #e8e8e8;vertical-align:top;line-height:1.5}
.pidx tr:nth-child(even) td{background:#fafafa}
.pidx td:first-child{text-align:center;font-weight:800;color:var(--fprim);width:10%}

/* ---- EMD table ---- */
.etbl{width:100%;border-collapse:collapse;font-size:8.5pt;margin:6px 0}
.etbl th{background:var(--fprim);color:#fff;padding:6px 12px;text-align:left;font-weight:700;font-size:7.5pt;text-transform:uppercase;letter-spacing:.08em;}
.etbl td{padding:6px 12px;border:1px solid #e8e8e8}

/* ============================================================
   5-LAYOUT DOCUMENT IDENTITIES
   ============================================================ */

/* LAYOUT 1: SH — sidebar-spine (emerald teal) */
.sh-page{font-family:'Manrope',Arial,sans-serif;display:flex;flex-direction:row;}
.sh-sidebar{width:54mm;flex-shrink:0;background:#0F6E63;display:flex;flex-direction:column;overflow:hidden;position:relative;padding:9mm 5mm 7mm 6mm;}
.sh-spine{position:absolute;bottom:10mm;left:-10mm;transform:rotate(-90deg);transform-origin:right center;font-family:'Archivo',Arial,sans-serif;font-size:5pt;font-weight:800;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.15);white-space:nowrap;width:75mm;text-align:right;pointer-events:none;}
.sh-logo{width:50px;height:50px;border-radius:50%;border:2px solid #C9A227;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#C9A227;font-weight:900;font-size:14px;margin-bottom:7px;font-family:'Archivo',Arial,sans-serif;}
.sh-firm{font-family:'Archivo',Arial,sans-serif;font-size:8.5pt;font-weight:800;color:#fff;letter-spacing:.4px;line-height:1.3;margin-bottom:8px;text-transform:uppercase;}
.sh-grule{height:1.5px;background:#C9A227;margin-bottom:9px;opacity:.75;}
.sh-lbl{font-size:5pt;text-transform:uppercase;letter-spacing:.12em;color:#C9A227;margin-top:5px;margin-bottom:1px;}
.sh-det{font-size:5.5pt;color:rgba(255,255,255,.78);line-height:1.55;word-break:break-word;}
.sh-spacer{flex:1;}
.sh-ids{font-size:5pt;color:rgba(255,255,255,.5);line-height:1.65;border-top:1px solid rgba(201,162,39,.3);padding-top:5px;margin-top:5px;}
.sh-spine-rule{width:3px;flex-shrink:0;background:linear-gradient(to bottom,transparent 5%,#C9A227 18%,#C9A227 82%,transparent 95%);}
.sh-main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:8mm 8mm 6mm 6mm;}
.sh-bid{border-left:3px solid #C9A227;background:rgba(15,110,99,.06);padding:4px 8px;margin-bottom:5px;font-size:7pt;color:#16201e;line-height:1.7;flex-shrink:0;}
.sh-bid b{color:#0F6E63;font-weight:700;}
.sh-ft{border-top:2px solid #0F6E63;padding-top:3px;margin-top:4px;font-size:5.5pt;color:#5b6b67;display:flex;justify-content:space-between;flex-shrink:0;}

/* LAYOUT 2: VBE — formal-ledger (navy) */
.vbe-page{font-family:'EB Garamond',Georgia,serif;background:#fffdf8;}
.vbe-frame-out{position:absolute;inset:8mm;border:2px solid #0A2540;pointer-events:none;z-index:2}
.vbe-frame-in{position:absolute;inset:10.5mm;border:0.5pt solid #D4A017;pointer-events:none;z-index:2}
.vbe-wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:130pt;font-weight:900;color:#0A2540;opacity:.025;font-family:'Cormorant Garamond',Georgia,serif;pointer-events:none;z-index:0;letter-spacing:-4px;}
.vbe-ct{position:absolute;inset:13mm;display:flex;flex-direction:column;overflow:hidden;z-index:1}
.vbe-hdr{flex-shrink:0;text-align:center;padding-bottom:5px;}
.vbe-crest{width:60px;height:60px;border-radius:50%;background:#0A2540;border:2px solid #D4A017;display:flex;align-items:center;justify-content:center;color:#D4A017;font-weight:900;font-size:16px;margin:0 auto 5px;font-family:'Cormorant Garamond',Georgia,serif;box-shadow:0 0 0 3px #fffdf8,0 0 0 4.5px #D4A017;}
.vbe-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:18pt;font-weight:700;color:#0A2540;letter-spacing:.8px;line-height:1.1;margin-bottom:2px;}
.vbe-tagline{font-size:6pt;text-transform:uppercase;letter-spacing:.22em;color:#D4A017;margin-bottom:4px;}
.vbe-drule{display:flex;flex-direction:column;gap:2.5px;margin:3px 0 4px;}
.vbe-drule::before,.vbe-drule::after{content:'';height:1.5px;background:#D4A017;opacity:.8;}
.vbe-ids{font-size:6.5pt;color:#444;letter-spacing:.04em;line-height:1.6;}
.vbe-addr{font-size:6pt;color:#666;line-height:1.5;margin-top:1px;}
.vbe-strip{background:#f5f3ee;border-top:1.5px solid #D4A017;border-bottom:1.5px solid #D4A017;padding:4px 10px;margin:5px 0;font-size:7.5pt;color:#1a1f29;text-align:center;line-height:1.7;flex-shrink:0;}
.vbe-strip b{color:#0A2540;font-weight:700;}
.vbe-ft{border-top:1px solid #D4A017;padding-top:3px;margin-top:5px;font-size:5.5pt;color:#888;display:flex;justify-content:space-between;flex-shrink:0;}

/* LAYOUT 3: BCT — editorial-dark (charcoal) */
.bct-page{font-family:'Jost',Arial,sans-serif;background:#f8f9fa;display:flex;flex-direction:column;}
.bct-hband{background:#1C2630;padding:6mm 8mm 5mm;display:flex;align-items:center;gap:6mm;flex-shrink:0;}
.bct-seal{width:54px;height:54px;border-radius:50%;border:2.5px solid #B0843A;background:rgba(176,132,58,.1);display:flex;align-items:center;justify-content:center;color:#B0843A;font-weight:900;font-size:15px;flex-shrink:0;font-family:'Fraunces',Georgia,serif;}
.bct-ht{flex:1;}
.bct-hname{font-family:'Fraunces',Georgia,serif;font-size:16pt;font-weight:900;color:#fff;letter-spacing:1.8px;text-transform:uppercase;line-height:1;margin-bottom:3px;}
.bct-htagline{font-size:6pt;letter-spacing:.2em;text-transform:uppercase;color:#B0843A;}
.bct-hids{font-size:5.5pt;color:rgba(255,255,255,.58);line-height:1.6;text-align:right;max-width:52mm;flex-shrink:0;}
.bct-crule{height:2px;background:#B0843A;flex-shrink:0;}
.bct-wrule{height:1px;background:#2d3e50;opacity:.6;flex-shrink:0;margin-top:1px;}
.bct-body{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:4mm 8mm 3mm;min-height:0;}
.bct-bid{border-left:3px solid #B0843A;padding:3px 8px;margin-bottom:5px;font-size:7pt;color:#1e2c38;line-height:1.7;flex-shrink:0;}
.bct-bid b{color:#1C2630;font-weight:600;}

var firms=loadFirms(), selF=0, selDocs={}, pastOn=false, prevOpen=false, editIdx=0;

function lsG(k,d){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}}
function lsS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DATA_VER=4;
function loadFirms(){
  if(lsG('gem_data_ver',0)!==DATA_VER){
    localStorage.removeItem('gem_firms');
    lsS('gem_data_ver',DATA_VER);
  }
  var s=lsG('gem_firms',null);
  if(!s||s.length!==FD.length)return JSON.parse(JSON.stringify(FD));
  return s.map(function(sf,i){return Object.assign({},FD[i],sf);});
}

/* ============================================================
   DATES
   ============================================================ */
var MONS=['January','February','March','April','May','June','July',
          'August','September','October','November','December'];
function ord(n){
  n=parseInt(n,10);
  var s=['th','st','nd','rd'],v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}
function docDate(d){return ord(d.getDate())+' '+MONS[d.getMonth()]+' '+d.getFullYear();}
function fmtD(s){
  if(!s)return '';
  var p=s.split('-');
  if(p.length===3)return ord(parseInt(p[2],10))+' '+MONS[parseInt(p[1],10)-1]+' '+p[0];
  return s;
}

    return '<div class="fcard '+sel+'" style="--fprim:'+f.prim+';--fgold:'+f.gold+'"'+

      '<div class="fcard-prop">'+(f.prop?xe(f.prop):'<em style="color:#475569">Tap Edit Firm</em>')+'</div>'+
      wHtml+
    '</div>';
  }).join('');
}

function missFields(f){
  var m=[];
  if(!f.prop)m.push('Proprietor');
  if(!f.addr)m.push('Address');
  if(!f.gstin)m.push('GSTIN');
  return m;
}

  var stored=lsG('gem_sig_'+f.id,null);
  if(stored){
    if(thumb){thumb.src=stored;thumb.style.display='block';}
    if(clrBtn)clrBtn.style.display='inline-block';
  } else {
    if(thumb){thumb.src='';thumb.style.display='none';}
    if(clrBtn)clrBtn.style.display='none';
  }
}

function loadSig(input){
  if(!input.files||!input.files[0])return;
  var f=firms[selF];

   ============================================================ */
function togglePreview(){
  prevOpen=!prevOpen;
  var btn=document.getElementById('prev-btn');
  var area=document.getElementById('preview-area');
  var shell=document.getElementById('app-shell');
  if(prevOpen){
    saveInputs(); renderPreview();
    area.classList.add('on');
    shell.style.display='none';
    btn.textContent='← Back to Editor';
    btn.classList.add('on');
  } else {
    area.classList.remove('on');
    shell.style.display='block';
    btn.textContent='👁 Preview Documents';
    btn.classList.remove('on');
  }
}

function doPrint(){
  saveInputs(); renderPreview();
  document.getElementById('preview-area').classList.add('on');
  // Reset transforms before printing (critical for correct PDF size)
  resetForPrint();
  setTimeout(function(){window.print();}, 150);
}

function resetForPrint(){
  document.querySelectorAll('.doc-page').forEach(function(p){
    p.style.transform='none'; p.style.width=''; p.style.height='';
  });
  document.querySelectorAll('.pgwrap').forEach(function(w){
    w.style.height=''; w.style.overflow='';
  });
}

// Also handle browser-native beforeprint / afterprint
window.addEventListener('beforeprint', function(){ resetForPrint(); });
window.addEventListener('afterprint',  function(){ if(prevOpen) scalePages(); });

function renderPreview(){
  var f=firms[selF], inp=getInp();
  var keys=DOCS.filter(function(d){return selDocs[d.k];}).map(function(d){return d.k;});
  var tot=keys.length;
  if(!tot){
    document.getElementById('preview-pages').innerHTML=
      '<div style="padding:28px;text-align:center;color:#475569;font-size:13px">'+
      'No documents selected.<br>Please tick at least one document above.</div>';
    return;
  }
  document.getElementById('preview-pages').innerHTML=keys.map(function(k,i){
    return '<div class="pgwrap">'+genDoc(k,f,inp,i+1,tot)+'</div>';
  }).join('');
  scalePages();
}

function scalePages(){
  var area=document.getElementById('preview-area');
  if(!area) return;
  var cw=area.offsetWidth-24; // minus 12px padding each side
  if(cw<80) cw=400;
  var pw=794; // 210mm @ 96dpi
  var ph=1122; // 297mm @ 96dpi
  var sc=cw/pw;
  document.querySelectorAll('.pgwrap').forEach(function(wrap){
    var pg=wrap.querySelector('.doc-page');
    if(pg){
      pg.style.transform='scale('+sc.toFixed(4)+')';
      pg.style.transformOrigin='top left';
      wrap.style.height=Math.round(ph*sc)+'px';
      wrap.style.overflow='hidden';
    }
  });
}

/* ============================================================

function xe(s){
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ============================================================

  ];
  if(f.obc) rows.push(['Social Category','Other Backward Class (OBC)']);
  rows.push(['Registered Address', xe(f.addr)||'&mdash;']);

/* ============================================================
   SUBMISSIONS I – VI
   ============================================================ */

    ];

  else if(num===3){

      'That neither our firm nor its Proprietor is presently undergoing, or has at any time been subject to, any proceeding by way of liquidation, winding-up, court receivership, voluntary arrangement, insolvency, or any analogous proceeding under any statute in force in India or elsewhere.',

      'That this declaration is made voluntarily and in good faith, in fulfilment of the Buyer\'s due-diligence requirement relating to the financial standing and legal eligibility of the Bidder.',
      'That the statements made herein are true and correct to the best of our knowledge and belief; the undersigned bears full personal and professional responsibility for the accuracy thereof.',
    ];
    closing='This declaration is subscribed to on behalf of the firm by its duly authorised Proprietor &amp; Signatory.';
  }
  else if(num===4){
    cs=[
      'That we have read, carefully examined, and thoroughly understood all provisions of the Bid Document, including the General Terms &amp; Conditions, the Special Terms &amp; Conditions, all Schedules, and every Buyer-added Bid-Specific Additional Term or Condition (ATC) as appearing on the GeM portal; we accept the same unconditionally, without reservation, exception, or deviation of any nature.',

    (note?'<div class="doc-note"><b>Note:&ensp;</b>'+note+'</div>':'')+

  return page(f,inp,body,ey,n,tot);

/* ============================================================
   EMD EXEMPTION REQUEST
   ============================================================ */
function genEMD(f,inp,n,tot){
  var udyam=f.udyam?'<b>'+xe(f.udyam)+'</b>':'[Udyam No. — update via Edit Firm]';
  var rows='';
  if(inp.e1) rows+='<tr><td>Schedule 1</td><td><b>&#x20B9; '+xe(inp.e1)+'/-</b></td></tr>';
  if(inp.e2) rows+='<tr><td>Schedule 2</td><td><b>&#x20B9; '+xe(inp.e2)+'/-</b></td></tr>';
  if(!rows)  rows='<tr><td colspan="2" style="text-align:center;color:#999;font-style:italic">EMD amount not entered — please fill in the form</td></tr>';

  var cs=[
    'That M/s '+xe(f.name)+' is a duly registered Micro &amp; Small Enterprise vide Udyam Registration No. '+udyam+', which certificate is valid and subsisting as on the date of bid opening; a self-attested copy is enclosed herewith for ready reference.',
    'That in terms of Clause 11 of the GeM General Terms &amp; Conditions, read with the Public Procurement Policy for Micro and Small Enterprises (MSEs) Order, 2012, as amended, all MSEs registered under the MSMED Act, 2006 are exempt from furnishing Earnest Money Deposit (EMD) in procurement by Government buyers. This firm respectfully invokes and claims the benefit of the said statutory exemption against the present Bid.',
    'That the quantum of EMD applicable to this Bid, from which exemption is sought by this firm on account of its MSE status, is as under:'+
      '<table class="etbl" style="margin:6px 0">'+
        '<thead><tr><th>Schedule / Lot</th><th>EMD Amount</th></tr></thead>'+
        '<tbody>'+rows+'</tbody>'+
      '</table>',
    'That the enclosed Udyam Registration Certificate constitutes conclusive and sufficient documentary evidence of this firm\'s MSE status for the purposes of the aforesaid exemption, in terms of the Office Memorandum of the Ministry of MSME and the GeM GTC.',
    'That notwithstanding the foregoing, in the event this application for exemption is determined to be inadmissible under the specific terms, scope, or conditions of this Bid (including, without limitation, where the Bid document restricts exemption exclusively to manufacturers of the bid item), this firm unconditionally undertakes to deposit the full applicable EMD forthwith, upon such determination, and without causing any delay to the bid process.',
    'That each and every statement and declaration contained herein is true and correct to the best of our knowledge and belief; we acknowledge personal responsibility for the accuracy of all particulars set out above.',
  ];

  var body=
    '<div class="doc-ey">EMD Exemption Request &nbsp;&bull;&nbsp; '+xe(f.name)+'</div>'+
    '<div class="doc-ttl">Earnest Money Deposit — Exemption under MSE / Udyam</div>'+
    '<div class="doc-div"><span class="doc-dmd"></span></div>'+
    toLine(f,inp)+
    '<div class="doc-intro">With reference to GeM Bid No.&ensp;<b>'+(inp.ref||'&mdash;')+'</b>'+(inp.bd?'&ensp;dated&ensp;<b>'+inp.bd+'</b>':'')+
      ', we, <b>M/s '+xe(f.name)+'</b>, do hereby most respectfully submit the following application for exemption from Earnest Money Deposit, on the grounds and particulars set out below:'+
    '</div>'+
    clauses(f,cs)+
    '<div class="doc-note"><b>Note:&ensp;</b>This exemption application is preferred exclusively on the basis of the firm\'s valid Udyam (MSE) registration. In the event that the Bid\'s specific provisions, or any applicable Government order, limits the EMD exemption to manufacturers of the bid item, this firm, being a registered trader / supplier (non-manufacturer), shall promptly furnish the applicable EMD deposit as directed, without objection or delay.</div>'+
    '<div class="doc-closing">We earnestly request that this application for EMD exemption may be favourably considered and duly accepted in terms of the applicable policy and law.</div>'+
    sigBlock(f,inp);

  return page(f,inp,body,'EMD Exemption Request',n,tot);
}

/* ============================================================
   FIRM EDIT MODAL
   ============================================================ */
var FLDS=[
  {k:'name', l:'Firm Name',               t:'text'},
  {k:'prop', l:'Proprietor Name',         t:'text'},
  {k:'sign', l:'Signature Name (CAPITALS)',t:'text'},
  {k:'addr', l:'Registered Address',      t:'text'},
  {k:'place',l:'Place / City',            t:'text'},
  {k:'phone',l:'Mobile',                  t:'tel'},
  {k:'email',l:'Email',                   t:'email'},
  {k:'gstin',l:'GSTIN',                   t:'text'},
  {k:'udyam',l:'Udyam Reg. No.',          t:'text'},
  {k:'gem',  l:'GeM Seller ID',           t:'text'},
  {k:'bank', l:'Bank Name & Branch',      t:'text'},
  {k:'acc',  l:'Account No.',             t:'text'},
  {k:'ifsc', l:'IFSC Code',               t:'text'},
];

function openEdit(){
  editIdx=selF;
  var f=firms[editIdx];
  document.getElementById('edit-modal-ttl').textContent='Edit: '+f.name;
  var html='<div style="display:grid;gap:10px">';
  FLDS.forEach(function(fld){
    html+='<div>'+
      '<label class="ilbl" for="ef-'+fld.k+'">'+fld.l+'</label>'+
      '<input class="inp" id="ef-'+fld.k+'" type="'+fld.t+'" value="'+xe(f[fld.k]||'')+'">'+
    '</div>';
  });
  html+='<div style="display:grid;gap:8px;padding:4px 0;margin-top:4px">'+
    mkChk('mse',  'MSE (Micro & Small Enterprise)', f.mse)+
    mkChk('woman','Woman-Owned Enterprise',         f.woman)+
    mkChk('obc',  'OBC Category',                  f.obc)+
  '</div></div>';
  document.getElementById('edit-fields').innerHTML=html;
  document.getElementById('edit-modal').classList.add('on');
}

function mkChk(k,lbl,val){
  return '<label class="chkrow">'+
    '<input type="checkbox" id="ef-'+k+'" '+(val?'checked':'')+'>'+lbl+'</label>';
}

function saveEdit(){
  var f=firms[editIdx];
  FLDS.forEach(function(fld){
    var el=document.getElementById('ef-'+fld.k);
    if(el)f[fld.k]=el.value.trim();
  });
  ['mse','woman','obc'].forEach(function(k){
    var el=document.getElementById('ef-'+k); if(el)f[k]=el.checked;
  });
  lsS('gem_firms',firms);
  document.getElementById('edit-modal').classList.remove('on');
  renderFirmGrid(); renderWarn();
  if(prevOpen) renderPreview();
}

function closeEdit(){
  document.getElementById('edit-modal').classList.remove('on');
}
function closeEditBg(ev){
  if(ev.target===document.getElementById('edit-modal')) closeEdit();
}

/* ============================================================
   INIT
   ============================================================ */
(function init(){
  selF=lsG('gem_selfirm',0);
  if(selF<0||selF>=firms.length) selF=0;

  var sd=lsG('gem_docs',null);
  if(sd){ selDocs=sd; }
  else  { DOCS.forEach(function(d){ selDocs[d.k]=(d.k!=='emd'); }); }

  renderFirmGrid();
  renderWarn();
  renderDocList();
  renderSigUI();
  loadInputs();

  document.getElementById('app-shell').addEventListener('input', saveInputs);
  window.addEventListener('resize', function(){ if(prevOpen) scalePages(); });
})();

window.selFirm       = selFirm;
window.setPreset     = setPreset;
window.onChk         = onChk;
window.togglePast    = togglePast;
window.togglePreview = togglePreview;
window.doPrint       = doPrint;
window.openEdit      = openEdit;
window.saveEdit      = saveEdit;
window.closeEdit     = closeEdit;
window.closeEditBg   = closeEditBg;
window.loadSig       = loadSig;
window.clearSig      = clearSig;

})();
</script>
