<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>GeM Bid Docs — VBE</title>
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#050a14;color:#e2e8f0;min-height:100vh;-webkit-tap-highlight-color:transparent}

/* ===== APP SHELL ===== */
#app-shell{max-width:480px;margin:0 auto;padding-bottom:130px}

/* ===== HEADER ===== */
.gem-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#0d1526;border-bottom:1px solid #1e3a5f;position:sticky;top:0;z-index:50}
.gem-hdr-back{color:#f59e0b;text-decoration:none;font-size:22px;line-height:1;padding:2px 6px 2px 0}
.gem-hdr-info{flex:1}
.gem-hdr-title{font-size:16px;font-weight:700;color:#f1f5f9;letter-spacing:.01em}
.gem-hdr-sub{font-size:10px;color:#475569;margin-top:1px}
.gem-edit-btn{background:none;border:1px solid #1e3a5f;border-radius:8px;color:#94a3b8;padding:6px 11px;font-size:12px;cursor:pointer;touch-action:manipulation;transition:border-color .15s}
.gem-edit-btn:active{border-color:#f59e0b;color:#f59e0b}

/* ===== SECTION LABEL ===== */
.sec-lbl{padding:14px 16px 6px;font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#475569}

/* ===== FIRM GRID ===== */
.firm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 4px}
.firm-card{border:2px solid #1e3a5f;border-radius:12px;padding:11px 10px;cursor:pointer;transition:border-color .18s,background .18s;background:#0d1526;touch-action:manipulation;position:relative}
.firm-card.sel{border-color:var(--fgold);background:color-mix(in srgb,var(--fprim) 12%,transparent)}
.firm-badge{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;margin-bottom:7px;border:2px solid var(--fgold);background:var(--fprim);color:var(--fgold);letter-spacing:.3px}
.firm-name{font-size:11.5px;font-weight:700;color:#e2e8f0;line-height:1.3}
.firm-prop{font-size:10px;color:#64748b;margin-top:2px;line-height:1.3}
.firm-miss{font-size:9.5px;color:#f59e0b;margin-top:5px;line-height:1.3;display:none}
.firm-card.sel .firm-miss{display:block}

/* ===== WARN BANNER ===== */
.warn-bar{margin:6px 16px;padding:9px 13px;background:#7c2d1220;border:1px solid #f59e0b50;border-radius:8px;font-size:11.5px;color:#fbbf24;display:none;line-height:1.4}
.warn-bar.on{display:block}

/* ===== DOC SELECTOR ===== */
.preset-row{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 8px}
.pset{padding:6px 13px;border-radius:20px;border:1px solid #1e3a5f;background:transparent;color:#94a3b8;font-size:11px;cursor:pointer;touch-action:manipulation;transition:background .15s,color .15s}
.pset:active,.pset:focus{background:#1e3a5f;color:#e2e8f0;outline:none}
.doc-list{padding:0 16px 4px;display:grid;gap:6px}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#0d1526;border:1px solid #1e3a5f;border-radius:10px;cursor:pointer;touch-action:manipulation}
.doc-item input[type=checkbox]{accent-color:#f59e0b;width:17px;height:17px;cursor:pointer;flex-shrink:0}
.doc-item-ttl{font-size:13px;font-weight:600;color:#e2e8f0}
.doc-item-sub{font-size:10px;color:#64748b}

/* ===== INPUTS ===== */
.inp-grid{padding:0 16px;display:grid;gap:10px}
.inp-lbl{font-size:10.5px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;display:block}
.inp{background:#0d1526;border:1px solid #1e3a5f;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:14px;width:100%;outline:none;transition:border-color .15s;-webkit-appearance:none}
.inp:focus{border-color:#f59e0b50;box-shadow:0 0 0 2px #f59e0b1a}
.inp::placeholder{color:#334155}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.inp-box{background:#0d152680;border:1px solid #1e3a5f;border-radius:10px;padding:12px;margin-top:4px}
.inp-box-hdr{font-size:10.5px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.tog{width:34px;height:20px;border-radius:10px;border:none;background:#0a1020;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;touch-action:manipulation;outline:none}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px #0004}
.tog.on{background:#f59e0b}
.tog.on::after{left:17px}
#past-fields{display:none;margin-top:10px}

/* ===== ACTION BAR ===== */
#gem-actions{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:10px 16px 14px;background:linear-gradient(transparent,#050a14 28%);z-index:40;display:flex;flex-direction:column;gap:7px}
.btn-pri{padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;touch-action:manipulation;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;transition:opacity .15s;letter-spacing:.01em}
.btn-pri:active{opacity:.85}
.btn-sec{background:#0d1526;border:1px solid #1e3a5f;color:#94a3b8;padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation;width:100%;transition:border-color .15s,color .15s}
.btn-sec.on{border-color:#f59e0b;color:#f59e0b}

/* ===== PREVIEW AREA ===== */
#preview-area{display:none;padding:12px 16px 0;max-width:480px;margin:0 auto}
#preview-area.on{display:block}
.pg-wrap{background:#fff;border-radius:4px;overflow:hidden;margin-bottom:14px;box-shadow:0 4px 28px #000b;position:relative}

/* ===== FIRM EDIT MODAL ===== */
.modal-bg{position:fixed;inset:0;background:#000c;z-index:60;display:none;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal-sheet{background:#0d1526;border-radius:20px 20px 0 0;padding:20px 16px 24px;max-width:480px;width:100%;max-height:92vh;overflow-y:auto;border-top:1px solid #1e3a5f}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:700;color:#f1f5f9}
.modal-x{font-size:22px;color:#64748b;cursor:pointer;line-height:1;padding:4px;touch-action:manipulation}
.chk-row{display:flex;align-items:center;gap:8px;font-size:13px;color:#94a3b8;cursor:pointer;touch-action:manipulation;padding:2px 0}
.chk-row input{accent-color:#f59e0b;width:16px;height:16px;cursor:pointer}
.save-btn{width:100%;margin-top:16px;padding:13px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;touch-action:manipulation;color:#000}

/* ===== PRINT ===== */
@media print{
  body{background:#fff !important;margin:0;padding:0}
  #app-shell,#gem-actions,#preview-area .pg-wrap + style,
  .gem-hdr,.firm-grid,.warn-bar,.sec-lbl,.preset-row,.doc-list,
  .inp-grid,.inp-box,.modal-bg{display:none !important}
  #app-shell{display:none !important}
  #preview-area{display:block !important;padding:0 !important;max-width:none !important;margin:0 !important}
  .pg-wrap{margin:0 !important;box-shadow:none !important;border-radius:0 !important;overflow:visible !important}
  #gem-actions{display:none !important}
  @page{size:A4;margin:0}
}

/* ===== DOCUMENT STYLES ===== */
.doc-page{
  width:210mm;height:297mm;position:relative;
  font-family:Georgia,Cambria,'Times New Roman',Times,serif;
  background:#fff;color:#1a1a1a;overflow:hidden;
  page-break-after:always;break-after:page;
}
.doc-ob{position:absolute;inset:8mm;border:2.5px solid var(--fprim);pointer-events:none;z-index:1}
.doc-ib{position:absolute;inset:11mm;border:1px solid var(--fgold);pointer-events:none;z-index:1}
.doc-dm{position:absolute;width:9px;height:9px;background:var(--fgold);transform:rotate(45deg);z-index:2}
.doc-dm.tl{top:7.25mm;left:7.25mm}
.doc-dm.tr{top:7.25mm;right:7.25mm}
.doc-dm.bl{bottom:7.25mm;left:7.25mm}
.doc-dm.br{bottom:7.25mm;right:7.25mm}
.doc-ct{position:absolute;inset:13.5mm;display:flex;flex-direction:column}

/* Header */
.doc-seal{width:60px;height:60px;border-radius:50%;background:var(--fprim);border:2.5px solid var(--fgold);display:flex;align-items:center;justify-content:center;color:var(--fgold);font-weight:900;font-size:16px;margin:0 auto 6px;letter-spacing:.5px;font-family:Georgia,serif}
.doc-fname{text-align:center;font-size:15pt;font-weight:bold;color:var(--fprim);letter-spacing:.4px;line-height:1.2;margin-bottom:3px}
.doc-tline{text-align:center;font-size:6.5pt;text-transform:uppercase;letter-spacing:.13em;color:var(--fgold);margin-bottom:5px}
.doc-div{display:flex;align-items:center;justify-content:center;gap:5px;margin:4px 0}
.doc-div::before,.doc-div::after{content:'';flex:1;height:1px;background:var(--fgold);opacity:.65}
.doc-dmd{width:7px;height:7px;background:var(--fgold);transform:rotate(45deg);display:inline-block}
.doc-ids{text-align:center;font-size:6.5pt;color:#444;margin-bottom:2px;letter-spacing:.02em;line-height:1.5}
.doc-addr{text-align:center;font-size:6.5pt;color:#555;line-height:1.5;margin-bottom:2px}

/* Bid strip */
.doc-strip{background:#f7f7f7;border:1px solid #e0e0e0;border-radius:3px;padding:5px 10px;margin:6px 0;font-size:7.5pt;color:#333;text-align:center;line-height:1.6;flex-shrink:0}
.doc-strip b{color:var(--fprim)}

/* Body */
.doc-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.doc-ey{font-size:7pt;text-transform:uppercase;letter-spacing:.1em;color:var(--fgold);margin-bottom:3px}
.doc-ttl{font-size:12.5pt;font-weight:bold;text-transform:uppercase;color:var(--fprim);letter-spacing:.03em;margin-bottom:5px;line-height:1.25}
.doc-to{font-size:8pt;color:#333;margin-bottom:6px;border-left:3px solid var(--fgold);padding-left:8px;line-height:1.5}
.doc-intro{font-size:8pt;font-style:italic;color:#444;margin-bottom:8px;line-height:1.55}
.doc-cls{list-style:none;display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.doc-cl{display:flex;gap:7px;font-size:7.5pt;line-height:1.55;color:#222;align-items:flex-start}
.doc-cn{width:20px;height:20px;border-radius:50%;background:var(--fprim);color:#fff;font-size:6.5pt;font-weight:bold;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1.5px}
.doc-ct2{flex:1}
.doc-note{background:#fffbf0;border:1px solid var(--fgold);border-radius:3px;padding:6px 9px;font-size:6.5pt;color:#555;font-style:italic;margin:5px 0;line-height:1.5}
.doc-note b{color:var(--fprim);font-style:normal}
.doc-closing{font-size:8pt;font-style:italic;color:#444;margin-top:5px;line-height:1.45}

/* Signature */
.doc-sig{display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto;padding-top:8px;border-top:1px solid #ddd;flex-shrink:0}
.doc-sig-l{font-size:7.5pt;color:#555;line-height:1.7}
.doc-sig-r{text-align:right}
.doc-sig-for{font-size:7.5pt;color:#555;margin-bottom:18px}
.doc-sig-line{border-top:1px solid #333;padding-top:4px;font-size:8.5pt;font-weight:bold;color:#1a1a1a}
.doc-sig-sub{font-size:7pt;color:#666}

/* Footer */
.doc-ft{border-top:1px solid var(--fgold);padding-top:3px;margin-top:6px;font-size:6pt;color:#888;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;opacity:.8}

/* Cover extras */
.cov-box{border:2px solid var(--fprim);border-radius:4px;padding:12px 14px;margin:10px 0}
.cov-row{display:flex;gap:8px;padding:4px 0;font-size:8pt;color:#333;border-bottom:1px solid #eee;line-height:1.45}
.cov-row:last-child{border:none}
.cov-lbl{font-weight:bold;color:var(--fprim);min-width:95px;flex-shrink:0;font-size:7.5pt}

/* Profile table */
.ptbl{width:100%;border-collapse:collapse;font-size:7.5pt;margin:7px 0}
.ptbl td{padding:4.5px 8px;border:1px solid #ddd;vertical-align:top;line-height:1.45}
.ptbl td:first-child{font-weight:bold;color:var(--fprim);background:#f8f8f8;width:38%}
.pidx{width:100%;border-collapse:collapse;font-size:7.5pt;margin-top:8px}
.pidx th{background:var(--fprim);color:#fff;padding:5px 8px;text-align:left;font-weight:bold}
.pidx td{padding:4.5px 8px;border:1px solid #ddd;vertical-align:top;line-height:1.4}
.pidx tr:nth-child(even) td{background:#f9f9f9}
.pidx td:first-child{text-align:center;font-weight:bold;color:var(--fprim);width:10%}

/* EMD table */
.etbl{width:100%;border-collapse:collapse;font-size:8pt;margin:6px 0}
.etbl th{background:var(--fprim);color:#fff;padding:5px 10px;text-align:left;font-weight:bold;font-size:7.5pt}
.etbl td{padding:5px 10px;border:1px solid #ddd;font-size:8pt}
</style>
</head>
<body>

<!-- ===== APP SHELL ===== -->
<div id="app-shell">
  <div class="gem-hdr">
    <a href="./index.html" class="gem-hdr-back" title="Back">&#8592;</a>

        <input class="inp" id="i-dd" type="date">
      </div>

      <label class="inp-lbl" for="i-item">Requirement / Item *</label>

    </div>
    <div>
      <label class="inp-lbl" for="i-buyer">Buyer (Organisation)</label>
      <input class="inp" id="i-buyer" placeholder="e.g. 68 Field Regiment C/o 99 APO" autocomplete="off">
    </div>
    <div class="inp-row">
      <div>
        <label class="inp-lbl" for="i-off">Buyer Officer</label>
        <input class="inp" id="i-off" placeholder="GSO-1" autocomplete="off">
      </div>
      <div>
        <label class="inp-lbl" for="i-con">Consignee</label>
        <input class="inp" id="i-con" placeholder="Unit / Depot" autocomplete="off">
      </div>
    </div>
    <div class="inp-row">
      <div>
        <label class="inp-lbl" for="i-place">Place</label>
        <input class="inp" id="i-place" placeholder="Barmer" autocomplete="off">
      </div>
      <div>
        <label class="inp-lbl" for="i-date">Document Date</label>
        <input class="inp" id="i-date" placeholder="25th June 2026" autocomplete="off">
      </div>
    </div>

    <div class="inp-box">
      <div class="inp-box-hdr">EMD Details <span style="font-size:10px;color:#64748b;font-weight:400;margin-left:4px">(for EMD Exemption doc)</span></div>
      <div class="inp-row">
        <div>
          <label class="inp-lbl" for="i-e1">Schedule 1 (₹)</label>
          <input class="inp" id="i-e1" placeholder="0" inputmode="numeric" autocomplete="off">
        </div>
        <div>
          <label class="inp-lbl" for="i-e2">Schedule 2 (₹)</label>
          <input class="inp" id="i-e2" placeholder="0" inputmode="numeric" autocomplete="off">
        </div>
      </div>
    </div>

    <div class="inp-box">
      <div class="inp-box-hdr">
        <button class="tog" id="past-tog" onclick="togglePast()" type="button" aria-label="Toggle past performance"></button>
        Past Performance <span style="font-size:10px;color:#64748b;font-weight:400;margin-left:4px">(optional — adds clauses to S-I)</span>
      </div>
      <div id="past-fields">
        <div class="inp-row" style="margin-bottom:8px">
          <div>
            <label class="inp-lbl" for="i-pcn">GeM Contract No.</label>
            <input class="inp" id="i-pcn" placeholder="GEM/2025/B/xxxxx" autocomplete="off">
          </div>
          <div>
            <label class="inp-lbl" for="i-pcd">Contract Date</label>
            <input class="inp" id="i-pcd" type="date">
          </div>
        </div>
        <div style="margin-bottom:8px">
          <label class="inp-lbl" for="i-pfam">Product Family</label>
          <input class="inp" id="i-pfam" placeholder="e.g. Office Furniture" autocomplete="off">
        </div>
        <div style="margin-bottom:8px">
          <label class="inp-lbl" for="i-pitm">Supplied Item</label>
          <input class="inp" id="i-pitm" placeholder="e.g. Office Chairs" autocomplete="off">
        </div>
        <div>
          <label class="inp-lbl" for="i-pto">Supplied To (Consignee)</label>
          <input class="inp" id="i-pto" placeholder="Unit / Depot" autocomplete="off">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== PREVIEW AREA ===== -->
<div id="preview-area">
  <div id="preview-pages"></div>
</div>

<!-- ===== ACTION BAR ===== -->
<div id="gem-actions">
  <button class="btn-sec" id="prev-btn" onclick="togglePreview()" type="button">&#128065;&#xFE0E; Preview Documents</button>
  <button class="btn-pri" onclick="doPrint()" type="button">&#128438; Print / Save PDF</button>
</div>

<!-- ===== FIRM EDIT MODAL ===== -->
<div class="modal-bg" id="edit-modal" onclick="closeEdit(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <div class="modal-title" id="edit-modal-title">Edit Firm</div>
      <span class="modal-x" onclick="closeEdit()" style="touch-action:manipulation">&#x2715;</span>
    </div>
    <div id="edit-fields"></div>
    <button class="save-btn" onclick="saveEdit()" type="button">&#10003; Save Changes</button>
  </div>
</div>

/* ===== DATES ===== */
var MONS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function ord(n){n=parseInt(n,10);var s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function docDate(d){return ord(d.getDate())+' '+MONS[d.getMonth()]+' '+d.getFullYear();}
function fmtD(s){
  if(!s)return '';
  var p=s.split('-');
  if(p.length===3)return ord(parseInt(p[2],10))+' '+MONS[parseInt(p[1],10)-1]+' '+p[0];
  return s;
}

function renderPreview(){
  var f=firms[selF],inp=getInp();
  var keys=DOCS.filter(function(d){return selDocs[d.k];}).map(function(d){return d.k;});
  var total=keys.length;
  if(!total){
    document.getElementById('preview-pages').innerHTML='<div style="padding:24px;text-align:center;color:#64748b;font-size:13px">No documents selected.<br>Please check at least one document above.</div>';
    return;
  }
  var html=keys.map(function(k,idx){
    return '<div class="pg-wrap">'+genDoc(k,f,inp,idx+1,total)+'</div>';
  }).join('');
  document.getElementById('preview-pages').innerHTML=html;
  scalePages();
}

function scalePages(){
  var area=document.getElementById('preview-area');
  if(!area)return;
  var cw=area.offsetWidth-32; // minus padding
  if(cw<50)cw=400;
  var pw=794; // 210mm @ 96dpi
  var sc=cw/pw;
  var ph=1122; // 297mm @ 96dpi
  document.querySelectorAll('.pg-wrap').forEach(function(wrap){
    var page=wrap.querySelector('.doc-page');
    if(page){
      page.style.transform='scale('+sc+')';
      page.style.transformOrigin='top left';
      wrap.style.height=Math.round(ph*sc)+'px';
    }
  });
}

      'That we shall furnish, wherever required, the OEM\'s certificate specifying the percentage of local content and the place(s) of local value addition, in support of any purchase preference claimed.',
      'That we are conscious of the consequences attaching to any incorrect declaration of local content under the said Order, and we accept the same.',
      'That the particulars stated above are true and correct to the best of our knowledge and belief.',
    ];
    note='The precise local-content percentage may kindly be read from the OEM\'s certificate before the Class-I claim is finalised; the applicable class may be amended accordingly.';
    closing='This declaration is made in sincere compliance with the Public Procurement (Preference to Make-in-India) Order, 2017.';
  }
  else if(num===6){
    clauses=[
      'That our firm is an Indian entity and does not attract any restriction applicable to bidders from a country sharing a land border with India under GeM GTC Clause 26, and that no registration with the Competent Authority is attracted in our case.',
      'That we are fully eligible to participate in this Bid in our own right.',
      'That the goods to be supplied shall be genuine, brand-new and unused, drawn from an authorised distributor / dealer / channel partner of the OEM, with the requisite chain / GST documents furnished at delivery.',
      'That we accept that any incorrect declaration or non-compliance herein shall constitute valid ground for termination of the contract and such further action as may be warranted in law.',
      'That every statement made herein is true and correct to the best of our knowledge and belief.',
    ];
    closing='This declaration is made in compliance with GeM General Terms &amp; Conditions and the Bid Document requirements.';
  }

  var body=
    '<div class="doc-ey">'+ey+'</div>'+
    '<div class="doc-ttl">'+ttl+'</div>'+
    '<div class="doc-div"><span class="doc-dmd"></span></div>'+
    toLine(f,inp)+
    '<div class="doc-intro">We, M/s '+nm+', hereby solemnly affirm and declare as under:</div>'+
    cls(clauses)+
    (note?'<div class="doc-note"><b>Note:&nbsp;</b>'+note+'</div>':'')+
    (closing?'<div class="doc-closing">'+closing+'</div>':'')+
    sig(f,inp);

  return page(f,inp,body,lbl,n,tot);
}

/* ===== EMD ===== */
function genEMD(f,inp,n,tot){
  var udyam=f.udyam?'<b>'+e(f.udyam)+'</b>':'[Udyam No. — Update Firm Profile]';
  var emdRows='';
  if(inp.e1)emdRows+='<tr><td>Schedule 1</td><td><b>&#x20B9;&nbsp;'+e(inp.e1)+'/-</b></td></tr>';
  if(inp.e2)emdRows+='<tr><td>Schedule 2</td><td><b>&#x20B9;&nbsp;'+e(inp.e2)+'/-</b></td></tr>';
  if(!emdRows)emdRows='<tr><td colspan="2" style="text-align:center;color:#888;font-style:italic">EMD amount not entered &mdash; please fill in the form</td></tr>';

  var clauses=[
    'That M/s '+e(f.name)+' is a duly registered Micro &amp; Small Enterprise vide Udyam Registration No. '+udyam+', valid and subsisting as on the date of bid opening.',
    'That, in keeping with the GeM General Terms &amp; Conditions and the Public Procurement Policy for MSEs, 2012, bidders registered as MSEs are exempted from payment of Earnest Money Deposit (EMD), and we respectfully seek the benefit of the said exemption against this Bid.',
    'That the EMD applicable to the Bid, from which exemption is sought, is as under:<table class="etbl" style="margin:6px 0"><thead><tr><th>Schedule</th><th>EMD Amount</th></tr></thead><tbody>'+emdRows+'</tbody></table>',
    'That a copy of our valid Udyam Registration Certificate is enclosed herewith in support of this request.',
    'That, in the event this exemption is found inadmissible under the specific terms of the Bid, we respectfully undertake to deposit the applicable EMD as required.',
    'That the particulars stated above are true and correct to the best of our knowledge and belief.',
  ];

  var body=
    '<div class="doc-ey">EMD Exemption Request</div>'+
    '<div class="doc-ttl">Earnest Money Deposit<br>Exemption under MSE / Udyam</div>'+
    '<div class="doc-div"><span class="doc-dmd"></span></div>'+
    toLine(f,inp)+
    '<div class="doc-intro">With reference to Bid No.&nbsp;<b>'+(inp.ref||'&mdash;')+'</b>'+(inp.bd?' dated <b>'+inp.bd+'</b>':'')+', we respectfully submit the following in the matter of Earnest Money Deposit:</div>'+
    cls(clauses)+
    '<div class="doc-note"><b>Note:&nbsp;</b>This exemption is sought solely on the basis of valid MSE (Udyam) registration. Should the Bid\'s specific terms confine EMD exemption to manufacturers of the bid item, the bidder shall deposit the applicable EMD accordingly.</div>'+
    '<div class="doc-closing">We request that this application for EMD exemption may kindly be considered and accepted in its true spirit.</div>'+
    sig(f,inp);

  return page(f,inp,body,'EMD Exemption Request',n,tot);
}

/* ===== FIRM EDIT MODAL ===== */
var FLDS=[
  {k:'name',l:'Firm Name',t:'text'},
  {k:'prop',l:'Proprietor Name',t:'text'},
  {k:'sign',l:'Signature Name (CAPITALS)',t:'text'},
  {k:'addr',l:'Registered Address',t:'text'},
  {k:'place',l:'Place (City)',t:'text'},
  {k:'phone',l:'Mobile',t:'tel'},
  {k:'email',l:'Email',t:'email'},
  {k:'gstin',l:'GSTIN',t:'text'},
  {k:'udyam',l:'Udyam Reg. No.',t:'text'},
  {k:'gem',l:'GeM Seller ID',t:'text'},
  {k:'bank',l:'Bank Name & Branch',t:'text'},
  {k:'acc',l:'Account No.',t:'text'},
  {k:'ifsc',l:'IFSC Code',t:'text'},
];

function openEdit(){
  editIdx=selF;
  var f=firms[editIdx];
  document.getElementById('edit-modal-title').textContent='Edit: '+f.name;
  var html='<div style="display:grid;gap:10px">';
  FLDS.forEach(function(fld){
    html+='<div><label class="inp-lbl" for="ef-'+fld.k+'">'+fld.l+'</label>'+
      '<input class="inp" id="ef-'+fld.k+'" type="'+fld.t+'" value="'+e(f[fld.k]||'')+'"></div>';
  });
  html+='<div style="display:grid;gap:8px;padding:4px 0">'+
    chkRow('mse','MSE (Micro & Small Enterprise)',f.mse)+
    chkRow('woman','Woman-Owned Enterprise',f.woman)+
    chkRow('obc','OBC Category',f.obc)+
  '</div></div>';
  document.getElementById('edit-fields').innerHTML=html;
  document.getElementById('edit-modal').classList.add('on');
}

function chkRow(k,lbl,val){
  return '<label class="chk-row"><input type="checkbox" id="ef-'+k+'" '+(val?'checked':'')+'>'+lbl+'</label>';
}

function saveEdit(){
  var f=firms[editIdx];
  FLDS.forEach(function(fld){
    var el=document.getElementById('ef-'+fld.k);
    if(el)f[fld.k]=el.value.trim();
  });
  ['mse','woman','obc'].forEach(function(k){
    var el=document.getElementById('ef-'+k);
    if(el)f[k]=el.checked;
  });
  lsS('gem_firms',firms);
  document.getElementById('edit-modal').classList.remove('on');
  renderFirmGrid();
  renderWarn();
  if(prevOpen)renderPreview();
}

function closeEdit(ev){
  if(ev&&ev.target!==document.getElementById('edit-modal'))return;
  document.getElementById('edit-modal').classList.remove('on');
}

/* ===== INIT ===== */
(function init(){
  selF=lsG('gem_selfirm',0);
  if(selF<0||selF>=firms.length)selF=0;
  var sd=lsG('gem_docs',null);
  if(sd){selDocs=sd;}
  else{DOCS.forEach(function(d){selDocs[d.k]=(d.k!=='emd');});}
  renderFirmGrid();
  renderWarn();
  renderDocList();
  loadInputs();

  // persist on any input change
  document.getElementById('app-shell').addEventListener('input',function(){saveInputs();});
  window.addEventListener('resize',function(){if(prevOpen)scalePages();});
})();

})();
</script>
