<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#eef2f6;color:#0f172a;font-family:'Noto Sans Devanagari',sans-serif;min-height:100dvh;max-width:480px;margin:0 auto;padding-bottom:60px}
.topbar{background:linear-gradient(135deg,#6d28d9,#8b5cf6);color:#fff;padding:14px 16px;border-radius:0 0 18px 18px;box-shadow:0 8px 22px rgba(124,58,237,.34)}
.topbar h1{font-size:17px;font-weight:900}
.topbar .sub{font-size:11px;opacity:.9;margin-top:2px}
.vbe-menu-btn{border:none;background:rgba(255,255,255,.2);color:#fff;font-size:16px;border-radius:9px;padding:7px 12px;font-weight:900;cursor:pointer;font-family:inherit}
.login-note{text-align:center;padding:60px 20px;color:#64748b;font-size:14px}

/* month switch */
.mswitch{display:flex;align-items:center;justify-content:center;gap:14px;margin:14px 12px 4px}
.mswitch button{border:none;background:#fff;color:#6d28d9;width:38px;height:38px;border-radius:12px;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 4px 10px -4px rgba(15,23,42,.25);font-family:inherit}
.mswitch button:disabled{opacity:.35}
.mswitch .mlabel{font-size:15px;font-weight:900;min-width:130px;text-align:center}

/* hero 3D */
.hero{margin:12px;border-radius:22px;padding:18px 16px 16px;color:#fff;position:relative;overflow:hidden;
  background:linear-gradient(150deg,#4c1d95 0%,#6d28d9 55%,#7c3aed 100%);
  box-shadow:0 20px 38px -16px rgba(109,40,217,.6),0 4px 10px rgba(15,23,42,.18),inset 0 1px 0 rgba(255,255,255,.25)}
.hero::after{content:"";position:absolute;top:-40%;right:-15%;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.2),transparent 70%)}
.hero .cap{font-size:12px;font-weight:800;opacity:.92}
.hero .net{font-size:34px;font-weight:900;margin:6px 0 2px;letter-spacing:-.02em}
.hero .netsub{font-size:12px;font-weight:700;opacity:.92}
.hero .split{display:flex;gap:10px;margin-top:14px}
.hcell{flex:1;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:11px}
.hcell .k{font-size:11px;opacity:.92;font-weight:700}
.hcell .v{font-size:17px;font-weight:900;margin-top:3px;white-space:nowrap}

.samajh{margin:0 12px;background:#faf5ff;border:1px solid #e9d5ff;border-radius:14px;padding:12px 14px;font-size:13px;font-weight:700;color:#5b21b6;line-height:1.5;display:flex;gap:9px;align-items:flex-start}
.samajh .em{font-size:18px;flex:0 0 auto}

.card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;margin:14px 12px 0;padding:14px;box-shadow:0 12px 26px -16px rgba(15,23,42,.24),0 2px 6px rgba(15,23,42,.05)}
.card h2{font-size:13px;font-weight:900;color:#334155;margin-bottom:11px;display:flex;align-items:center;gap:6px}
.bar-row{margin-bottom:11px}
.bar-row:last-child{margin-bottom:0}
.bar-top{display:flex;justify-content:space-between;font-size:12.5px;font-weight:800;margin-bottom:4px;gap:8px}
.bar-top .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-top .amt{white-space:nowrap;font-weight:900}
.bar-track{height:9px;border-radius:99px;background:#f1f5f9;overflow:hidden}
.bar-fill{height:100%;border-radius:99px}
.fw-out{background:linear-gradient(90deg,#fb7185,#e11d48)}
.fw-in{background:linear-gradient(90deg,#34d399,#059669)}
.fw-cat{background:linear-gradient(90deg,#a78bfa,#7c3aed)}
.frow{display:flex;align-items:center;gap:11px;padding:10px 2px;border-bottom:1px solid #f1f5f9;cursor:pointer}
.frow:last-child{border-bottom:none}
.frow:active{background:#f8fafc}
.fic{flex:0 0 auto;width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:15px;background:linear-gradient(145deg,#fecdd3,#f43f5e);color:#7f1d1d}
.frow .mid{flex:1;min-width:0}
.frow .t1{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frow .t2{font-size:10.5px;color:#94a3b8;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frow .amt{font-size:14px;font-weight:900;color:#e11d48;white-space:nowrap}
.net-pill{font-size:11px;font-weight:900;padding:2px 9px;border-radius:99px;white-space:nowrap}
.np-pos{background:#dcfce7;color:#166534}.np-neg{background:#fee2e2;color:#b91c1c}
.empty{text-align:center;padding:40px 20px;color:#94a3b8;font-size:13px;line-height:1.7}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;padding:11px 22px;border-radius:12px;font-size:13px;font-weight:800;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;max-width:90%;text-align:center}
.toast.show{opacity:1}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, initializeFirestore, persistentLocalCache, collection, doc, getDoc, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB_CFG = {
  apiKey:'AIzaSyDdrWFkm7hizUpkNIozOANiG5SDFWNLo6s',
  authDomain:'manoj-business-os.firebaseapp.com',
  projectId:'manoj-business-os',
  storageBucket:'manoj-business-os.firebasestorage.app',
  messagingSenderId:'574587426179',
  appId:'1:574587426179:web:9c88a4062f53e32aa4d2b6'
};
const app = initializeApp(FB_CFG, 'vbe-kharcha');
const auth = getAuth(app);
let db; try{ db = initializeFirestore(app,{localCache:persistentLocalCache()}); }catch(e){ db = getFirestore(app); }

let ME=null, EXP=[], RCT=[], OFF=0; // OFF = कितने महीने पीछे (0 = इस महीना)
const CAT_LABELS={kaccha:'🥬 कच्चा माल',fuel:'⛽ पेट्रोल-डीज़ल',army:'🎖️ Army खरीद',repair:'🔧 Repair',salary:'💵 सैलरी',other:'📦 अन्य','':'—'};
const HMON=['जनवरी','फ़रवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितंबर','अक्तूबर','नवंबर','दिसंबर'];

function fmt(n){ return '₹'+Math.round(+(n||0)).toLocaleString('hi-IN'); }
function esc(s){ return String(s??'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function monthKey(off){ const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-off); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function monthName(off){ const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-off); return HMON[d.getMonth()]+' '+d.getFullYear(); }
function hdate(iso){ const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return iso||''; return d.getDate()+' '+HMON[d.getMonth()].slice(0,4); }

onAuthStateChanged(auth, async u=>{
  if(!u) return;
  const a = await getDoc(doc(db,'vbe_admins',u.uid));
  let ok = a.exists();
  if(!ok){ const s = await getDoc(doc(db,'vbe_users',u.uid)); ok = s.exists() && s.data().role==='staff'; }
  if(!ok){ document.getElementById('s-wait').innerHTML='❌ सिर्फ admin/staff'; return; }
  ME={uid:u.uid};
  document.getElementById('s-wait').style.display='none';
  document.getElementById('s-app').style.display='block';
  await loadAll();
});

async function loadAll(){
  // पिछले 13 महीने का डेटा एक बार (महीना बदलने पर दुबारा query नहीं)
  const since = monthKey(12)+'-01';
  const [exSnap, rcSnap] = await Promise.all([
    getDocs(query(collection(db,'vbe_expenses'), where('date','>=',since))).catch(()=>({forEach:()=>{}})),
    getDocs(query(collection(db,'vbe_receipts'), where('date','>=',since))).catch(()=>({forEach:()=>{}}))
  ]);
  EXP=[]; exSnap.forEach(d=>{ const e=d.data(); EXP.push({date:e.date||'', amount:+e.total||0, firm:e.firm||'—', vendor:e.vendor||'—',
    cat:e.category||'', account:e.paymentSource||'', utr:e.utr||'', gstin:e.partyGstin||'', items:e.items||[], photo:e.billPhotoUrl||'', notes:e.notes||'', id:d.id}); });
  RCT=[]; rcSnap.forEach(d=>{ const r=d.data(); if(r.direction!=='in') return; RCT.push({date:r.date||'', amount:+r.amount||0, party:r.party||'—', firm:r.firm||'', account:r.paymentSource||'', utr:r.utr||''}); });
  render();
}

window.stepMonth=function(dir){ // ‹ = पुराना (OFF+1), › = नया (OFF-1)
  const n=OFF - dir; if(n<0||n>12) return; OFF=n; render();
};

function sumBy(arr, keyFn){ const m={}; arr.forEach(x=>{ const k=keyFn(x)||'—'; m[k]=(m[k]||0)+x.amount; }); return m; }

function render(){
  const mk=monthKey(OFF);
  document.getElementById('m-label').textContent = OFF===0?('इस महीना · '+monthName(0)) : OFF===1?('पिछला · '+monthName(1)) : monthName(OFF);
  document.getElementById('m-prev').disabled = OFF>=12;
  document.getElementById('m-next').disabled = OFF<=0;

  const ex = EXP.filter(e=>e.date.startsWith(mk));
  const rc = RCT.filter(r=>r.date.startsWith(mk));
  const out = ex.reduce((s,e)=>s+e.amount,0);
  const inc = rc.reduce((s,r)=>s+r.amount,0);
  const net = inc-out;

  // पिछले महीने से तुलना
  const pmk=monthKey(OFF+1);
  const pout=EXP.filter(e=>e.date.startsWith(pmk)).reduce((s,e)=>s+e.amount,0);
  const pinc=RCT.filter(r=>r.date.startsWith(pmk)).reduce((s,r)=>s+r.amount,0);
  const pnet=pinc-pout;

  document.getElementById('hero-wrap').innerHTML = `
    <div class="hero">
      <div class="cap">📅 ${esc(monthName(OFF))} — बचत (आमदनी − खर्च)</div>
      <div class="net" style="color:${net>=0?'#d1fae5':'#fecdd3'}">${net>=0?'+':'−'}${fmt(Math.abs(net))}</div>
      <div class="netsub">${net>=0?'इस महीने बचत हुई':'इस महीने खर्च ज़्यादा रहा'}</div>
      <div class="split">
        <div class="hcell"><div class="k">💰 आमदनी</div><div class="v">${fmt(inc)}</div></div>
        <div class="hcell"><div class="k">💸 खर्च</div><div class="v">${fmt(out)}</div></div>
      </div>
    </div>`;

  // समझ (plain Hindi)
  let sam='';
  if(!ex.length && !rc.length){ sam='इस महीने का कोई हिसाब अभी दर्ज नहीं है। Statement या बिल डालते ही यहाँ दिखेगा।'; }
  else{
    const diff=net-pnet;
    const cmp = pnet===0 ? '' : (diff>=0? `पिछले महीने से ₹${Math.abs(Math.round(diff)).toLocaleString('hi-IN')} बेहतर।` : `पिछले महीने से ₹${Math.abs(Math.round(diff)).toLocaleString('hi-IN')} कम।`);
    const firmOut=sumBy(ex,e=>e.firm); const topFirm=Object.entries(firmOut).sort((a,b)=>b[1]-a[1])[0];
    sam = `${net>=0?'बचत':'घाटा'} ${fmt(Math.abs(net))}${cmp?(' · '+cmp):''}` + (topFirm?` सबसे ज़्यादा खर्च <b>${esc(topFirm[0])}</b> में (${fmt(topFirm[1])})।`:'');
  }
  document.getElementById('samajh-wrap').innerHTML = `<div class="samajh"><span class="em">${net>=0?'💡':'⚠️'}</span><div>${sam}</div></div>`;

  // firm-wise: खर्च + आमदनी → net per firm
  const firms={};
  ex.forEach(e=>{ (firms[e.firm]=firms[e.firm]||{out:0,in:0}).out+=e.amount; });
  rc.forEach(r=>{ const f=r.firm||'—'; (firms[f]=firms[f]||{out:0,in:0}).in+=r.amount; });
  const fList=Object.entries(firms).sort((a,b)=>(b[1].out+b[1].in)-(a[1].out+a[1].in));
  const fmax=Math.max(1,...fList.map(f=>Math.max(f[1].out,f[1].in)));
  document.getElementById('firm-wrap').innerHTML = fList.length? `<div class="card"><h2>🏢 किस बिज़नेस में कितना</h2>${
    fList.map(([nm,v])=>{ const fn=v.in-v.out; return `<div class="bar-row">
      <div class="bar-top"><span class="nm">${esc(nm)}</span><span class="net-pill ${fn>=0?'np-pos':'np-neg'}">${fn>=0?'+':'−'}${fmt(Math.abs(fn))}</span></div>
      ${v.out?`<div class="bar-track"><div class="bar-fill fw-out" style="width:${Math.round(v.out/fmax*100)}%"></div></div>`:''}
      ${v.in?`<div class="bar-track" style="margin-top:3px"><div class="bar-fill fw-in" style="width:${Math.round(v.in/fmax*100)}%"></div></div>`:''}
      <div style="font-size:10px;color:#94a3b8;margin-top:3px">${v.in?('आया '+fmt(v.in)):''}${v.in&&v.out?' · ':''}${v.out?('गया '+fmt(v.out)):''}</div>
    </div>`; }).join('')}</div>`:'';

  // category-wise खर्च
  const cats=sumBy(ex,e=>CAT_LABELS[e.cat]??e.cat);
  const cList=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const cmax=Math.max(1,...cList.map(c=>c[1]));
  document.getElementById('cat-wrap').innerHTML = cList.length? `<div class="card"><h2>🧾 खर्च किस चीज़ पर</h2>${
    cList.map(([nm,v])=>`<div class="bar-row"><div class="bar-top"><span class="nm">${esc(nm)}</span><span class="amt" style="color:#7c3aed">${fmt(v)}</span></div><div class="bar-track"><div class="bar-fill fw-cat" style="width:${Math.round(v/cmax*100)}%"></div></div></div>`).join('')}</div>`:'';

  // top 6 सबसे बड़े खर्च
  const big=[...ex].sort((a,b)=>b.amount-a.amount).slice(0,6);
  window._BIG=big;
  document.getElementById('big-wrap').innerHTML = big.length? `<div class="card"><h2>🔻 सबसे बड़े खर्च</h2>${
    big.map((e,i)=>`<div class="frow" onclick="openBig(${i})">
      <div class="fic">💸</div>
      <div class="mid"><div class="t1">${esc(e.vendor)}</div><div class="t2">${hdate(e.date)} · ${esc(e.firm)}${e.account?(' · '+esc(e.account)):''}</div></div>
      <div class="amt">−${fmt(e.amount)}</div>
    </div>`).join('')}</div>`:'';

  document.getElementById('empty').style.display = (!ex.length&&!rc.length)?'block':'none';
  document.getElementById('empty').innerHTML = (!ex.length&&!rc.length)?'📭 इस महीने का कोई हिसाब नहीं मिला।<br>‹ › से दूसरा महीना देखें।':'';
}

window.openBig=function(i){
  const e=(window._BIG||[])[i]; if(!e) return;
  document.getElementById('tm-title').textContent='💸 खर्च का विवरण';
  const line=(k,v)=> v?`<div style="display:flex;justify-content:space-between;padding:7px 2px;border-bottom:1px solid #f1f5f9;font-size:13px"><span style="color:#64748b">${k}</span><span style="font-weight:700;text-align:right;max-width:62%">${esc(v)}</span></div>`:'';
  const rows=[`<div style="font-size:20px;font-weight:900;color:#e11d48">−${fmt(e.amount)}</div>`,
    `<div style="font-size:15px;font-weight:800;margin-top:4px">${esc(e.vendor)}</div>`,'<div style="margin-top:10px">',
    line('तारीख', hdate(e.date)), line('🏢 Firm', e.firm), line('🏦 खाता', e.account), line('🔖 UTR', e.utr), line('GSTIN', e.gstin),'</div>'];
  if(e.items && e.items.length){ rows.push('<div style="margin-top:12px;font-weight:900;font-size:13px">📦 सामान</div><div style="margin-top:5px">'+
    e.items.map(it=>`<div style="display:flex;justify-content:space-between;padding:6px 2px;border-bottom:1px solid #f6f7f9;font-size:12.5px"><span>${esc(it.name)} <span style="color:#94a3b8">${it.qty||''}${esc(it.unit||'')}${it.rate?(' × ₹'+it.rate):''}</span></span><b>₹${Math.round(it.amount||0).toLocaleString('hi-IN')}</b></div>`).join('')+'</div>'); }
  if(e.photo){ rows.push(`<div style="margin-top:12px;font-weight:900;font-size:13px">🧾 बिल फोटो</div><img src="${esc(e.photo)}" style="max-width:100%;border-radius:12px;margin-top:6px" loading="lazy">`); }
  document.getElementById('tm-body').innerHTML=rows.join('');
  document.getElementById('txn-modal').style.display='block';
};
window.closeTxn=function(){ document.getElementById('txn-modal').style.display='none'; };
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'; clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),2600); }
</script>
</body>
</html>
