<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>VBE — Market List 🛒</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#050a14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#050a14;color:#e2e8f0;font-family:'Noto Sans Devanagari',system-ui,sans-serif;min-height:100vh;padding-bottom:80px}
.hdr{background:linear-gradient(135deg,#0a1628,#0d1f3c);border-bottom:1px solid rgba(16,185,129,.2);padding:14px 16px 12px;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hdr-ico{font-size:26px;line-height:1}
.hdr-title{flex:1}
.hdr-title h1{font-size:15px;font-weight:900;background:linear-gradient(90deg,#10b981,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.hdr-title p{font-size:10px;color:#64748b;margin-top:2px}
.badge-strip{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.badge-pend{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.badge-done{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.2)}
.wrap{max-width:480px;margin:0 auto;padding:0 12px}

/* ── ADD FORM ── */
.add-card{background:linear-gradient(135deg,#0a1a28,#0d1f38);border:1px solid rgba(16,185,129,.2);border-radius:18px;padding:16px;margin:14px 0 10px}
.add-card h2{font-size:12px;font-weight:800;color:#10b981;letter-spacing:.5px;margin-bottom:12px}
.inp-row{display:flex;flex-direction:column;gap:8px}
.inp-group{display:flex;flex-direction:column;gap:4px}
.inp-label{font-size:10px;font-weight:700;color:#64748b}
.inp{background:#050e1c;border:1px solid #1e3a5f;border-radius:10px;color:#e2e8f0;font-size:14px;font-family:inherit;padding:11px 13px;width:100%;outline:none;transition:border .15s}
.inp:focus{border-color:#10b981;box-shadow:0 0 0 2px rgba(16,185,129,.12)}
.inp::placeholder{color:#334155}
.inp-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-add{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#065f46,#10b981);color:#fff;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;margin-top:4px;letter-spacing:.3px;transition:transform .12s,opacity .12s;touch-action:manipulation}
.btn-add:active{transform:scale(.96);opacity:.85}
.btn-add:disabled{opacity:.4;pointer-events:none}

/* ── LIST ── */
.section-hdr{font-size:10px;font-weight:800;color:#475569;letter-spacing:1.5px;padding:12px 0 6px;text-transform:uppercase}
.staff-group{margin-bottom:14px}
.staff-name-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.staff-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0}
.staff-name-txt{font-size:13px;font-weight:800;color:#94a3b8}
.staff-count{background:rgba(251,191,36,.12);color:#fbbf24;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px}

.item-card{background:#0a1628;border:1px solid #1e3a5f;border-radius:12px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;transition:opacity .2s}
.item-card.bought{opacity:.4}
.item-check{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:12px;border:1.5px solid #334155;background:#050e1c}
.item-check.done{background:#065f46;border-color:#10b981;color:#10b981}
.item-body{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:700;color:#e2e8f0;line-height:1.3}
.item-name.bought-txt{text-decoration:line-through;color:#475569}
.item-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;align-items:center}
.item-qty{background:rgba(99,102,241,.12);color:#818cf8;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.item-note{font-size:10px;color:#64748b}
.item-time{font-size:9px;color:#334155;margin-top:3px}
.item-del{background:transparent;border:none;color:#334155;font-size:16px;cursor:pointer;padding:4px;touch-action:manipulation;line-height:1;flex-shrink:0;margin-top:-2px}
.item-del:active{color:#ef4444}

/* ── BOUGHT SECTION ── */
.section-toggle{display:flex;align-items:center;gap:6px;width:100%;background:transparent;border:none;color:#475569;font-size:11px;font-weight:700;cursor:pointer;padding:8px 0;font-family:inherit;text-align:left;touch-action:manipulation}
.section-toggle .arr{font-size:10px;transition:transform .2s}
.section-toggle.open .arr{transform:rotate(90deg)}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:#334155}
.empty-ico{font-size:36px;margin-bottom:10px}
.empty-txt{font-size:13px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;border:1px solid #334155;border-radius:12px;padding:10px 18px;font-size:12px;font-weight:700;color:#e2e8f0;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;max-width:calc(100% - 32px);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ONLINE STATUS ── */
.offline-bar{display:none;background:#7f1d1d;color:#fca5a5;text-align:center;padding:6px;font-size:10px;font-weight:700;letter-spacing:.5px}
.offline-bar.show{display:block}

/* ── NAME MODAL ── */
.name-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;align-items:flex-end;justify-content:center}
.name-modal.open{display:flex}
.name-box{background:#0d1526;border:1px solid #1e3a5f;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:480px}
.name-box h3{font-size:16px;font-weight:900;color:#f59e0b;margin-bottom:6px;text-align:center}
.name-box p{font-size:12px;color:#64748b;text-align:center;margin-bottom:20px}
.name-box .inp{font-size:16px;padding:14px;margin-bottom:12px;text-align:center;font-weight:800;color:#10b981}
.btn-name{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#92400e,#f59e0b);color:#fff;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;touch-action:manipulation}

/* ── LOADING ── */
.spinner{text-align:center;padding:30px;color:#334155;font-size:12px}
</style>
</head>
<body>

<div class="offline-bar" id="offline-bar">🔴 इंटरनेट नहीं — Offline</div>

<div class="hdr">
  <div class="wrap">
    <div class="hdr-top">
      <div class="hdr-ico">🛒</div>
      <div class="hdr-title">
        <h1>VBE Market List</h1>
        <p>Vande Bharat Enterprises — खरीदारी की ज़रूरत</p>
      </div>
    </div>
    <div class="badge-strip">
      <span class="badge badge-pend" id="count-pend">⏳ 0 बाकी</span>
      <span class="badge badge-done" id="count-done">✅ 0 खरीदे</span>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- Add Form -->
  <div class="add-card">
    <h2>➕ नई ज़रूरत जोड़ें</h2>
    <div class="inp-row">
      <div class="inp-group">
        <span class="inp-label">आपका नाम *</span>
        <input class="inp" id="inp-name" placeholder="जैसे: विक्रम, मनोज, कैलाश..." maxlength="30" autocomplete="off">
      </div>
      <div class="inp-group">
        <span class="inp-label">क्या चाहिए? *</span>
        <input class="inp" id="inp-item" placeholder="जैसे: चीनी, तेल, साबुन..." maxlength="100" autocomplete="off">
      </div>
      <div class="inp-row2">
        <div class="inp-group">
          <span class="inp-label">मात्रा (optional)</span>
          <input class="inp" id="inp-qty" placeholder="2 kg, 3 box..." maxlength="30" autocomplete="off">
        </div>
        <div class="inp-group">
          <span class="inp-label">नोट (optional)</span>
          <input class="inp" id="inp-note" placeholder="कोई खास बात..." maxlength="60" autocomplete="off">
        </div>
      </div>
      <button class="btn-add" id="btn-add" onclick="addItem()">+ जोड़ो</button>
    </div>
  </div>

  <!-- Pending items -->
  <div id="pend-section">
    <div class="section-hdr">⏳ बाकी है</div>
    <div id="pend-list"><div class="spinner">लोड हो रहा है...</div></div>
  </div>

  <!-- Bought items (collapsible) -->
  <div id="done-section" style="display:none">
    <button class="section-toggle" id="done-toggle" onclick="toggleDone()">
      <span class="arr">▶</span> ✅ खरीद लिए गए
      <span id="done-count-lbl" style="margin-left:4px"></span>
    </button>
    <div id="done-list" style="display:none"></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { initializeAppCheck, ReCaptchaV3Provider } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js';
import { initializeFirestore, persistentLocalCache, persistentSingleTabManager,
         collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey:            "AIzaSyBCe5DKNKcthOl4umprfRm2QBfbVaFORg8",
  authDomain:        "vbe-order-tracker-60324.firebaseapp.com",
  projectId:         "vbe-order-tracker-60324",
  storageBucket:     "vbe-order-tracker-60324.firebasestorage.app",
  messagingSenderId: "894023456122",
  appId:             "1:894023456122:web:6ee548f0913c887c67f2c3"
};

const app  = initializeApp(firebaseConfig, 'marketApp');
// VBE App Check — Firebase Console → App Check → Register → reCAPTCHA v3 key भरो
const VBE_AC_KEY = '6Le-OEEtAAAAAA2NtdNcdZx435flhQF_gY4Z_hYY'; // ← यहाँ site key डालो, खाली = disabled
if(VBE_AC_KEY) initializeAppCheck(app, { provider: new ReCaptchaV3Provider(VBE_AC_KEY), isTokenAutoRefreshEnabled: true });
const db   = initializeFirestore(app,{localCache:persistentLocalCache({tabManager:persistentSingleTabManager()})});
const auth = getAuth(app);

let _items = [];
let _myName = localStorage.getItem('vbe_mkt_name') || '';
let _doneOpen = false;
let _ready = false;

// ── OFFLINE ──
window.addEventListener('online',  () => document.getElementById('offline-bar').classList.remove('show'));
window.addEventListener('offline', () => document.getElementById('offline-bar').classList.add('show'));
if(!navigator.onLine) document.getElementById('offline-bar').classList.add('show');

// ── AUTH ──
signInAnonymously(auth).catch(() => {});
onAuthStateChanged(auth, user => {
  if (user && !_ready) {
    _ready = true;
    listenItems();
    prefillName();
  }
});

function prefillName() {
  const inp = document.getElementById('inp-name');
  if (_myName) {
    inp.value = _myName;
  }
}

// ── REAL-TIME LISTENER ──
function listenItems() {
  const q = query(collection(db, 'vbe_market_list'), orderBy('createdAt', 'desc'));
  onSnapshot(q, snap => {
    _items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, err => {
    console.error('market list error:', err);
    document.getElementById('pend-list').innerHTML =
      '<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">Firestore rules में<br><code>vbe_market_list</code> allow करो</div></div>';
  });
}

// ── RENDER ──
function render() {
  const pending = _items.filter(x => x.status !== 'bought');
  const bought  = _items.filter(x => x.status === 'bought');

  document.getElementById('count-pend').textContent = '⏳ ' + pending.length + ' बाकी';
  document.getElementById('count-done').textContent = '✅ ' + bought.length + ' खरीदे';

  renderGroup('pend-list', pending, false);
  if (bought.length) {
    document.getElementById('done-section').style.display = '';
    document.getElementById('done-count-lbl').textContent = '(' + bought.length + ')';
    if (_doneOpen) renderGroup('done-list', bought, true);
  } else {
    document.getElementById('done-section').style.display = 'none';
  }
}

function renderGroup(elId, items, isBought) {
  const el = document.getElementById(elId);
  if (!items.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">🎉</div><div class="empty-txt">सब ठीक है!</div></div>';
    return;
  }

  // Group by staff name
  const groups = {};
  items.forEach(x => {
    const name = x.staffName || 'अज्ञात';
    if (!groups[name]) groups[name] = [];
    groups[name].push(x);
  });

  const colors = ['#f59e0b','#10b981','#6366f1','#ec4899','#ef4444','#8b5cf6','#14b8a6'];
  let html = '';
  Object.keys(groups).forEach((name, gi) => {
    const col = colors[gi % colors.length];
    const initials = name.slice(0,1).toUpperCase();
    const isMe = name === _myName;
    html += `<div class="staff-group">
      <div class="staff-name-hdr">
        <div class="staff-avatar" style="background:${col}22;color:${col};border:1.5px solid ${col}44">${initials}</div>
        <span class="staff-name-txt">${escH(name)}</span>
        ${isMe ? '<span style="font-size:9px;color:#f59e0b;font-weight:800">● आप</span>' : ''}
        <span class="staff-count">${groups[name].length}</span>
      </div>`;
    groups[name].forEach(item => {
      const canDel = isMe && !isBought;
      const timeStr = item.createdAt ? relTime(item.createdAt) : '';
      html += `<div class="item-card${isBought ? ' bought' : ''}" id="ic-${item.id}">
        <div class="item-check${isBought ? ' done' : ''}">${isBought ? '✓' : '·'}</div>
        <div class="item-body">
          <div class="item-name${isBought ? ' bought-txt' : ''}">${escH(item.item)}</div>
          <div class="item-meta">
            ${item.qty ? `<span class="item-qty">📦 ${escH(item.qty)}</span>` : ''}
            ${item.note ? `<span class="item-note">💬 ${escH(item.note)}</span>` : ''}
          </div>
          <div class="item-time">${timeStr}</div>
        </div>
        ${canDel ? `<button class="item-del" onclick="delItem('${item.id}')" title="हटाओ">✕</button>` : ''}
      </div>`;
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

// ── ADD ITEM ──
window.addItem = async function() {
  const nameEl = document.getElementById('inp-name');
  const itemEl = document.getElementById('inp-item');
  const qtyEl  = document.getElementById('inp-qty');
  const noteEl = document.getElementById('inp-note');
  const btn    = document.getElementById('btn-add');

  const name = nameEl.value.trim();
  const item = itemEl.value.trim();
  if (!name) { nameEl.focus(); toast('⚠️ अपना नाम लिखो'); return; }
  if (!item) { itemEl.focus(); toast('⚠️ क्या चाहिए यह लिखो'); return; }

  btn.disabled = true;
  btn.textContent = '⏳ जोड़ा जा रहा है...';

  try {
    await addDoc(collection(db, 'vbe_market_list'), {
      item,
      qty:       qtyEl.value.trim(),
      note:      noteEl.value.trim(),
      staffName: name,
      status:    'pending',
      createdAt: new Date().toISOString()
    });
    // Save name, clear item fields
    localStorage.setItem('vbe_mkt_name', name);
    _myName = name;
    itemEl.value = '';
    qtyEl.value  = '';
    noteEl.value = '';
    itemEl.focus();
    toast('✅ जोड़ दिया!');
  } catch (e) {
    toast('❌ नहीं जोड़ा: ' + (e.message || 'Error'));
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '+ जोड़ो';
  }
};

// ── DELETE (own items only) ──
window.delItem = async function(id) {
  if (!confirm('इस item को हटाएं?')) return;
  try {
    await deleteDoc(doc(db, 'vbe_market_list', id));
    toast('🗑 हटा दिया');
  } catch(e) {
    toast('❌ नहीं हटा: ' + e.message);
  }
};

// ── TOGGLE BOUGHT SECTION ──
window.toggleDone = function() {
  _doneOpen = !_doneOpen;
  const list = document.getElementById('done-list');
  const tog  = document.getElementById('done-toggle');
  list.style.display = _doneOpen ? '' : 'none';
  tog.classList.toggle('open', _doneOpen);
  if (_doneOpen) {
    renderGroup('done-list', _items.filter(x => x.status === 'bought'), true);
  }
};

// ── HELPERS ──
function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function relTime(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  const m = Math.floor(ms / 60000);
  if (m < 1)  return 'अभी';
  if (m < 60) return m + ' मिनट पहले';
  const h = Math.floor(m / 60);
  if (h < 24) return h + ' घंटे पहले';
  return Math.floor(h/24) + ' दिन पहले';
}

// ── TOAST ──
window.toast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
};

// Enter key support
document.getElementById('inp-item').addEventListener('keydown', e => { if (e.key === 'Enter') window.addItem(); });
</script>
</body>
</html>
