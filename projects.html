var DEFAULT_DOCS=[

  {id:'j07',name:'318 Workshop',addr:'जालीपा कैंट'},{id:'j08',name:'74 Armd Regt',addr:'जालीपा कैंट'},
  {id:'j09',name:'60 Armd Regt',addr:'जालीपा कैंट'},{id:'j10',name:'18 MAC',addr:'जालीपा कैंट'},
  {id:'j11',name:'5 MAC',addr:'जालीपा कैंट'},{id:'j12',name:'414 Engr',addr:'जालीपा कैंट'},
  {id:'j13',name:'6340 DBS',addr:'जालीपा कैंट'},{id:'j14',name:'6340 (74)',addr:'जालीपा कैंट'},
  {id:'j15',name:'32 ELent',addr:'जालीपा कैंट'},{id:'j16',name:'110 Brigade',addr:'जालीपा कैंट'},
  {id:'j17',name:'110 Signals',addr:'जालीपा कैंट'},{id:'j18',name:'694 Tatra',addr:'जालीपा कैंट'},

];

var STATUS_MAP={
  pending:{label:'⏳ Pending',cls:'b-pending'},
  active:{label:'🔵 Active',cls:'b-active'},
  later:{label:'🕐 Later',cls:'b-later'},
  urgent:{label:'🔴 Urgent',cls:'b-urgent'},
  completed:{label:'✅ Completed',cls:'b-done'},
  on_hold:{label:'⏸ On Hold',cls:'b-pending'},
};

async function loadAll(){
  try{
    var pSnap=await window._getDocs(window._col(window._db,'vbe_projects'));
    _projects=[];
    pSnap.forEach(function(d){_projects.push(Object.assign({id:d.id},d.data()));});
    _projects.sort(function(a,b){return (b.value||0)-(a.value||0);});

    try{
      var sSnap=await window._getDocs(window._col(window._db,'vbe_staff'));
      _staff=[];sSnap.forEach(function(d){_staff.push(d.data());});
    }catch(e){}

    _units=HARDCODED_UNITS.slice();
    try{
      var cuSnap=await window._getDocs(window._col(window._db,'fvhq_custom_units'));
      cuSnap.forEach(function(d){
        var u=d.data();
        if(!_units.find(function(x){return x.id===u.id;}))
          _units.push({id:u.id,name:u.name,addr:u.addr||'अन्य',custom:true});
      });
    }catch(e){}

    try{
      var cSnap=await window._getDocs(window._col(window._db,'fvhq_contacts'));
      _contacts={};cSnap.forEach(function(d){_contacts[d.id]=d.data().list||[];});
    }catch(e){}

    render();
    notif('✅ Load हो गया','ok');
  }catch(e){
    document.getElementById('body').innerHTML='<div class="loading" style="color:#ef4444">❌ Load नहीं हुआ<br><br><button onclick="loadAll()" style="background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:8px;padding:8px 16px;cursor:pointer">🔄 Retry</button></div>';
  }
}

function setTab(t){
  _tab=t;
  ['all','active','later','urgent','done'].forEach(function(x){
    document.getElementById('tab-'+x).className='tab '+(x===t?'on':'off');
  });
  render();
}

function formatVal(v){
  if(v>=100000) return (v/100000).toFixed(1)+'L';
  if(v>=1000) return (v/1000).toFixed(1)+'K';
  return v;
}

function render(){
  var list=_projects.slice();
  if(_tab==='active') list=list.filter(function(p){return p.status==='active';});
  if(_tab==='later')  list=list.filter(function(p){return p.status==='later';});
  if(_tab==='urgent') list=list.filter(function(p){return p.status==='urgent';});
  if(_tab==='done')   list=list.filter(function(p){return p.status==='completed';});

  var total=_projects.length;
  var totalVal=_projects.reduce(function(s,p){return s+(p.value||0);},0);
  var active=_projects.filter(function(p){return p.status==='active'||p.status==='urgent';}).length;

  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="sv" style="color:#f59e0b">'+total+'</div><div class="sl">कुल Projects</div></div>'+
    '<div class="stat"><div class="sv" style="color:#6366f1">'+active+'</div><div class="sl">Active</div></div>'+
    '<div class="stat"><div class="sv" style="color:#10b981;font-size:14px">&#8377;'+formatVal(totalVal)+'</div><div class="sl">Total Value</div></div>';

  if(!list.length){
    document.getElementById('body').innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:12px">&#127959;&#65039;</div><div style="font-size:14px;font-weight:800;color:#475569;margin-bottom:6px">कोई Project नहीं</div><div style="font-size:12px;color:#334155">नीचे + button से नया project add करें</div></div>';

function projectCard(p){
  var st=STATUS_MAP[p.status]||STATUS_MAP.pending;
  var prog=parseInt(p.progress||0);
  var days=p.deadline?Math.ceil((new Date(p.deadline)-new Date())/(86400000)):null;
  var logs=p.logs||[];
  var docs=p.docs||{};
  var docKeys=p.docNames||DEFAULT_DOCS;
  var docsOk=docKeys.filter(function(d){return docs[d]==='ok';}).length;
  var isLater=p.status==='later';

  var badges='<span class="badge '+st.cls+'">'+st.label+'</span>';
  if(p.gemNo) badges+='<span class="badge b-gem">&#128203; GeM</span>';
  if(days!==null) badges+='<span class="badge b-days">'+(days>0?'&#9200; '+days+'d बाकी':'&#9888;&#65039; Overdue')+'</span>';
  if(p.staffName) badges+='<span class="badge" style="background:#0a1a2a;color:#10b981">&#128100; '+p.staffName+'</span>';

  var recentLogs=logs.slice(-2).reverse().map(function(l){
    return '<div class="log-item">'+
      '<div class="log-date">'+new Date(l.date).toLocaleDateString('hi-IN',{day:'numeric',month:'short'})+'</div>'+
      '<div><div class="log-text">'+l.text+'</div>'+(l.by?'<div class="log-by">&#128100; '+l.by+'</div>':'')+'</div>'+
    '</div>';
  }).join('');

  var docHtml=docKeys.map(function(d){
    var s=docs[d]||'pending';
    return '<div class="doc-row">'+
      '<div style="font-size:11px;color:#e2e8f0;flex:1">'+d+'</div>'+
      '<select onchange="updateDocStatus(\''+p.id+'\',\''+d.replace(/'/g,"\\'")+'\'  ,this.value)" style="background:#1e293b;border:1px solid #1e3a5f;color:#e2e8f0;border-radius:6px;padding:3px 6px;font-size:10px;cursor:pointer;font-family:inherit">'+
        '<option value="pending" '+(s==='pending'?'selected':'')+'>&#9203; बाकी</option>'+
        '<option value="ok" '+(s==='ok'?'selected':'')+'>&#9989; है</option>'+
        '<option value="no" '+(s==='no'?'selected':'')+'>&#10060; नहीं</option>'+
      '</select>'+
    '</div>';
  }).join('');

  var detailHtml='';
  if(p.gemNo||p.staffName||p.contact||p.source||p.deadline){
    detailHtml='<div class="sec">'+
      '<div class="sec-title">&#8505;&#65039; PROJECT DETAILS</div>'+
      (p.gemNo?'<div class="doc-row"><div style="font-size:11px;color:#e2e8f0">&#127991;&#65039; GeM/Tender</div><div style="font-size:11px;color:#a5b4fc;font-weight:700">'+p.gemNo+'</div></div>':'')+
      (p.staffName?'<div class="doc-row"><div style="font-size:11px;color:#e2e8f0">&#128100; Staff</div><div style="font-size:11px;color:#10b981;font-weight:700">'+p.staffName+'</div></div>':'')+
      (p.contact?'<div class="doc-row"><div style="font-size:11px;color:#e2e8f0">&#128222; Contact</div><div style="font-size:11px;color:#10b981">'+p.contact+'</div></div>':'')+
      (p.source?'<div class="doc-row"><div style="font-size:11px;color:#e2e8f0">&#127978; सामान</div><div style="font-size:11px;color:#94a3b8">'+p.source+'</div></div>':'')+
      (p.start?'<div class="doc-row"><div style="font-size:11px;color:#e2e8f0">&#128197; Start</div><div style="font-size:11px;color:#94a3b8">'+p.start+'</div></div>':'')+
      (p.deadline?'<div class="doc-row"><div style="font-size:11px;color:#e2e8f0">&#128197; Deadline</div><div style="font-size:11px;color:'+(days!==null&&days<0?'#ef4444':'#94a3b8')+'">'+p.deadline+'</div></div>':'')+
    '</div>';
  }

  return '<div class="pc '+(p.status==='urgent'?'urgent':p.status==='active'?'active':p.status==='completed'?'completed':p.status==='later'?'later-p':'')+'" id="pc-'+p.id+'">'+
    '<div class="pc-hdr" onclick="toggleProject(\''+p.id+'\')">'+
      '<div class="pc-top">'+
        '<div>'+
          '<div class="pc-unit">&#128205; '+(p.unit||'Unit नहीं')+'</div>'+
          '<div class="pc-name">'+(p.name||'—')+'</div>'+
        '</div>'+
        '<div class="pc-value">&#8377;'+formatVal(p.value||0)+'</div>'+

      (p.desc?'<div class="pc-desc">'+p.desc.substring(0,80)+(p.desc.length>80?'...':'')+'</div>':'')+
      '<div class="pc-badges">'+badges+'</div>'+

    '<div class="prog-wrap">'+

      '<div class="prog-bg"><div class="prog-fill" style="width:'+prog+'%"></div></div>'+

      '<div class="sec">'+
        '<div class="sec-title">&#128221; DAILY LOG '+(logs.length?'('+logs.length+')':'')+'</div>'+
        (logs.length?recentLogs:'<div class="no-log">अभी कोई log नहीं</div>')+
        (logs.length>2?'<div style="font-size:10px;color:#6366f1;margin-top:6px;cursor:pointer" onclick="showAllLogs(\''+p.id+'\')">+'+(logs.length-2)+' और logs &#8594;</div>':'')+
      '</div>'+
      '<div class="sec">'+
        '<div class="sec-title">&#128196; DOCUMENTS ('+docsOk+'/'+docKeys.length+')</div>'+
        docHtml+
      '</div>'+
      detailHtml+
      '<div class="act-section">'+
        '<button class="abtn ab-log" onclick="openLogModal(\''+p.id+'\')">&#128221; Log</button>'+
        '<button class="abtn ab-prog" onclick="quickProgress(\''+p.id+'\')">&#128202; %</button>'+
        '<button class="abtn ab-wa" onclick="sendProjectWA(\''+p.id+'\')">&#128241; WA</button>'+
        (isLater
          ?'<button class="abtn ab-active" onclick="moveToActive(\''+p.id+'\')">&#128293; Active करो</button>'
          :'<button class="abtn ab-later" onclick="moveToLater(\''+p.id+'\')">&#128336; Later</button>')+
        '<button class="abtn ab-edit" onclick="openProjectModal(\''+p.id+'\')">&#9999;&#65039;</button>'+
        '<button class="abtn ab-del" onclick="deleteProject(\''+p.id+'\')">&#128465;&#65039;</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

async function saveProject(){
  var unit=document.getElementById('p-unit').value.trim();
  var name=document.getElementById('p-name').value.trim();
  var value=parseInt(document.getElementById('p-value').value)||0;
  if(!unit||!name){notif('❌ Unit और Project नाम जरूरी है','err');return;}

  // Save any pending doc name edits
  var inputs=document.querySelectorAll('#docs-checklist input');
  inputs.forEach(function(inp,i){if(_currentDocKeys[i]!==undefined)_currentDocKeys[i]=inp.value;});

  var docs=getCurrentDocs();
  var unitId=document.getElementById('p-unit-sel').value;
  var staffName=document.getElementById('p-staff-sel').value;

  var data={
    unit:unit, name:name, value:value, unitId:unitId,
    desc:document.getElementById('p-desc').value.trim(),
    gemNo:document.getElementById('p-gem').value.trim(),
    start:document.getElementById('p-start').value,
    deadline:document.getElementById('p-deadline').value,
    status:document.getElementById('p-status').value,
    progress:parseInt(document.getElementById('p-prog').value)||0,
    source:document.getElementById('p-source').value.trim(),
    staffName:staffName,
    contact:document.getElementById('p-contact').value.trim(),
    docs:docs,
    docNames:_currentDocKeys.slice(),
    updatedAt:new Date().toISOString(),
  };

  try{
    if(_editId){
      var existing=_projects.find(function(p){return p.id===_editId;});
      await window._setDoc(window._doc(window._db,'vbe_projects',_editId),Object.assign({},existing,data));
      var idx=_projects.findIndex(function(p){return p.id===_editId;});
      if(idx>=0) _projects[idx]=Object.assign({},_projects[idx],data);
      notif('✅ Project update हो गया','ok');
    } else {
      var id='PRJ'+Date.now().toString(36).toUpperCase();
      var newP=Object.assign({id:id},data,{logs:[],createdAt:new Date().toISOString()});
      await window._setDoc(window._doc(window._db,'vbe_projects',id),newP);
      _projects.unshift(newP);
      notif('✅ नया Project add हो गया','ok');
    }
    closeProjectModal();
    _projects.sort(function(a,b){return (b.value||0)-(a.value||0);});
    render();

    // ── Contact auto-save — अगर unit select है और contact field भरा है ──
    if(unitId && data.contact){
      try{
        var contactText = data.contact.trim();
        // Parse "Name — 9876543210" format
        var parts = contactText.split('—').map(function(x){return x.trim();});
        var cName = parts[0]||contactText;
        var cPhone = (parts[1]||'').replace(/\D/g,'').slice(-10);
        if(cName){
          var existList = _contacts[unitId]||[];
          var alreadyExists = existList.some(function(c){
            return c.name===cName||(cPhone&&c.phone===cPhone);
          });
          if(!alreadyExists){
            var newCt = {name:cName, phone:cPhone, role:'Project Contact', note:'Auto-saved from project: '+data.name};
            var updList = existList.concat([newCt]);
            await window._setDoc(window._doc(window._db,'fvhq_contacts',unitId),{list:updList});
            _contacts[unitId] = updList;
            notif('👤 Contact auto-save: '+cName,'ok');
          }
        }
      }catch(e){ console.warn('contact auto-save:',e); }
    }
  }catch(e){notif('❌ Save नहीं हुआ — '+e.message,'err');}
}

async function saveLog(){
  var projId=document.getElementById('log-proj-id').value;
  var text=document.getElementById('log-text').value.trim();
  var date=document.getElementById('log-date').value;
  var by=document.getElementById('log-by').value.trim();
  var prog=document.getElementById('log-prog').value;
  if(!text){notif('❌ Log text जरूरी है','err');return;}
  var p=_projects.find(function(x){return x.id===projId;});if(!p)return;
  var logs=(p.logs||[]).concat([{text:text,date:date,by:by,prog:parseInt(prog)||p.progress,time:new Date().toISOString()}]);
  var progress=prog?parseInt(prog):p.progress;
  try{
    await window._setDoc(window._doc(window._db,'vbe_projects',projId),Object.assign({},p,{logs:logs,progress:progress,updatedAt:new Date().toISOString()}));
    p.logs=logs;p.progress=progress;
    closeLogModal();render();
    notif('✅ Log save हो गया','ok');
  }catch(e){notif('❌ Save नहीं हुआ','err');}
}

async function quickProgress(projId){
  var p=_projects.find(function(x){return x.id===projId;});if(!p)return;
  var val=prompt('"'+p.name+'" का Progress % (अभी: '+(p.progress||0)+'%):',p.progress||0);
  if(val===null)return;
  var prog=Math.min(100,Math.max(0,parseInt(val)||0));
  try{
    await window._setDoc(window._doc(window._db,'vbe_projects',projId),Object.assign({},p,{progress:prog,updatedAt:new Date().toISOString()}));
    p.progress=prog;render();
    notif('✅ Progress '+prog+'% update हुई','ok');
  }catch(e){notif('❌ Update नहीं हुआ','err');}
}

  var st=STATUS_MAP[p.status]||STATUS_MAP.pending;
  var docKeys=p.docNames||DEFAULT_DOCS;
  var docs=p.docs||{};
  var docsOk=docKeys.filter(function(d){return docs[d]==='ok';}).length;
  var lines=[
    '🏗️ *Project Update — Vande Bharat Enterprises*','',
    '📍 *Unit:* '+p.unit,
    '📋 *Project:* '+p.name,
    '💰 *Value:* ₹'+(p.value||0).toLocaleString('hi-IN'),
    st.label,'📊 *Progress:* '+(p.progress||0)+'%',
    p.deadline?'📅 *Deadline:* '+p.deadline:'',
    p.gemNo?'🏷️ *GeM/Tender:* '+p.gemNo:'',
    p.staffName?'👤 *Staff:* '+p.staffName:'',
    '','📄 *Documents:* '+docsOk+'/'+docKeys.length+' ready','',
  ];
  if(logs.length){lines.push('📝 *Recent Progress:*');logs.forEach(function(l){lines.push('• '+l.date+': '+l.text);});lines.push('');}
  lines.push('—');lines.push('Vande Bharat Enterprises | Jalipa Cantt, Barmer');
  window.open('https://wa.me/?text='+encodeURIComponent(lines.filter(function(l){return l!=='';}).join('\n')));
}

async function deleteProject(projId){
  if(!confirm('यह project delete करें?'))return;
  try{
    await window._deleteDoc(window._doc(window._db,'vbe_projects',projId));
    _projects=_projects.filter(function(p){return p.id!==projId;});
    render();notif('🗑️ Deleted','info');
  }catch(e){notif('❌ Delete नहीं हुआ','err');}
}

function showAllLogs(projId){
  var p=_projects.find(function(x){return x.id===projId;});if(!p||!p.logs)return;
  var logs=p.logs.slice().reverse();
  document.getElementById('all-logs-content').innerHTML=logs.map(function(l){
    return '<div style="padding:8px 0;border-bottom:1px solid #0a0f1e">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:3px">'+
      '<span style="font-size:10px;color:#475569">'+l.date+'</span>'+
      (l.prog?'<span style="font-size:10px;color:#f59e0b;font-weight:800">'+l.prog+'%</span>':'')+
      '</div>'+
      '<div style="font-size:12px;color:#e2e8f0">'+l.text+'</div>'+
      (l.by?'<div style="font-size:10px;color:#6366f1;margin-top:2px">👤 '+l.by+'</div>':'')+
    '</div>';
  }).join('');
  document.getElementById('all-logs-title').textContent=p.name+' — सभी Logs';
  document.getElementById('m-all-logs').classList.add('open');
}

function notif(msg,type){
  type=type||'info';
  var el=document.getElementById('notif');
  el.textContent=msg;el.className='notif show '+type;
  setTimeout(function(){el.classList.remove('show');},2500);
}
</script>
</body>
</html>
